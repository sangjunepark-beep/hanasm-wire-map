<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HANASM · 와이어 맵 v0.8</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --purple-1: #c084fc; --purple-2: #a855f7; --purple-3: #7c3aed;
  --blue-1: #93c5fd;   --blue-2: #60a5fa;   --blue-3: #3b82f6;
  --cyan: #22d3ee; --pink: #f472b6; --amber: #fbbf24;
  --green: #34d399; --orange: #fb923c; --red: #f87171;
  --bg-0: #050614; --bg-1: #08091c; --bg-2: #0d0f24;
  --line: rgba(167,139,250,0.22);
  --line-2: rgba(96,165,250,0.26);
  --text-1: #f3f4fb; --text-2: #c5c9e0; --text-3: #8a8fad;
}
html, body {
  height: 100vh; width: 100vw; overflow: hidden;
  background: var(--bg-0);
  font-family: "JetBrains Mono", "Inter", "Pretendard", "Noto Sans KR", monospace, system-ui;
  color: var(--text-1);
  -webkit-font-smoothing: antialiased;
  letter-spacing: 0.01em;
  font-weight: 500;
}
body {
  background:
    radial-gradient(ellipse at 25% 30%, rgba(167,139,250,0.08), transparent 60%),
    radial-gradient(ellipse at 75% 70%, rgba(96,165,250,0.07), transparent 60%),
    radial-gradient(circle at 50% 50%, rgba(34,211,238,0.025), transparent 55%),
    linear-gradient(180deg, #050614 0%, #07091b 50%, #050614 100%);
}
body::before {
  content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 1;
  background-image:
    linear-gradient(rgba(167,139,250,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(96,165,250,0.025) 1px, transparent 1px);
  background-size: 80px 80px; background-position: center;
  mask-image: radial-gradient(ellipse at center, black 20%, transparent 75%);
}

/* TOP BAR */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  padding: 16px 24px;
  display: flex; justify-content: space-between; align-items: center;
  pointer-events: none;
}
.title { display: flex; gap: 12px; align-items: baseline; pointer-events: auto; }
.title h1 {
  font-size: 14px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.18em;
  background: linear-gradient(90deg, var(--purple-1), var(--blue-1));
  -webkit-background-clip: text; background-clip: text; color: transparent;
}
.title .ver {
  font-size: 10px; padding: 3px 8px;
  background: rgba(167,139,250,0.15); color: var(--purple-1);
  border: 1px solid rgba(167,139,250,0.4);
  font-weight: 700; letter-spacing: 0.1em;
  clip-path: polygon(6px 0, 100% 0, 100% calc(100% - 6px), calc(100% - 6px) 100%, 0 100%, 0 6px);
}
.title .date { font-size: 11px; color: var(--text-3); letter-spacing: 0.05em; }
.hint {
  font-size: 10.5px; color: var(--text-2); font-weight: 500;
  background: rgba(8,9,28,0.78);
  padding: 8px 14px;
  border: 1px solid var(--line);
  pointer-events: auto;
  backdrop-filter: blur(20px);
  letter-spacing: 0.06em; text-transform: uppercase;
  clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);
}

/* LEGEND / CONTROLS */
.legend, .controls {
  position: fixed; bottom: 18px; z-index: 100;
  background: rgba(8,9,28,0.78);
  border: 1px solid var(--line);
  padding: 12px 14px;
  font-size: 11px;
  backdrop-filter: blur(20px);
  clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
}
.legend { left: 18px; }
.controls { right: 18px; display: flex; gap: 8px; align-items: center; padding: 8px 12px; }
.legend .row { display: flex; align-items: center; gap: 10px; margin: 5px 0; color: var(--text-2); font-weight: 500; letter-spacing: 0.04em; }
.legend .sw {
  width: 10px; height: 10px;
  background: var(--c, var(--text-3));
  box-shadow: 0 0 8px var(--c, var(--text-3));
  clip-path: polygon(3px 0, 100% 0, 100% calc(100% - 3px), calc(100% - 3px) 100%, 0 100%, 0 3px);
}
.controls button {
  background: transparent; border: 1px solid var(--line-2);
  color: var(--blue-1);
  padding: 6px 14px; font-size: 10.5px;
  font-family: inherit; cursor: pointer; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  transition: all 0.18s ease;
  clip-path: polygon(6px 0, 100% 0, 100% calc(100% - 6px), calc(100% - 6px) 100%, 0 100%, 0 6px);
}
.controls button:hover {
  background: rgba(96,165,250,0.12); color: var(--text-1);
  border-color: var(--blue-2);
  box-shadow: 0 0 16px rgba(96,165,250,0.4);
}

/* STAGE */
.stage {
  position: fixed; inset: 0; z-index: 2; overflow: hidden;
  cursor: grab;
}
.stage.dragging { cursor: grabbing; }
.stage.dragging .world { transition: none !important; }
.world {
  position: absolute; left: 0; top: 0;
  width: 2400px; height: 1400px;
  transform-origin: 0 0;
  transition: transform 0.7s cubic-bezier(.4,.0,.15,1);
}

/* WIRES */
svg.wires {
  position: absolute; left: 0; top: 0;
  width: 2400px; height: 1400px;
  pointer-events: none; overflow: visible;
}
svg.wires path {
  fill: none; stroke-linecap: round; stroke-linejoin: round;
  opacity: 0.85;
  stroke-width: 2;
  filter: drop-shadow(0 0 8px currentColor);
  transition: opacity 0.3s, stroke-width 0.3s;
}
svg.wires path.flow {
  stroke-dasharray: 6 8;
  animation: flow 2.5s linear infinite;
}
@keyframes flow { to { stroke-dashoffset: -28; } }

/* NODES */
.node {
  position: absolute; cursor: pointer;
  transform: translate(-50%,-50%);
  z-index: 10; user-select: none;
}
.node .frame {
  position: relative; padding: 1.5px;
  background: linear-gradient(135deg, var(--c1, var(--blue-2)), var(--c2, var(--purple-2)));
  clip-path: polygon(12px 0%, 100% 0%, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0% 100%, 0% 12px);
  filter:
    drop-shadow(0 0 14px var(--c1, var(--blue-2)))
    drop-shadow(0 0 26px var(--c2, var(--purple-2)))
    drop-shadow(0 0 42px var(--c1, var(--blue-2)));
  transition: filter 0.3s ease;
}
.node .core {
  display: flex; align-items: center; gap: 12px;
  background: linear-gradient(180deg, rgba(68,72,118,0.96), rgba(48,52,92,0.97));
  padding: 14px 22px;
  font-size: 15px; font-weight: 700;
  color: var(--text-1);
  white-space: nowrap;
  letter-spacing: 0.02em;
  clip-path: polygon(11px 0%, 100% 0%, 100% calc(100% - 11px), calc(100% - 11px) 100%, 0% 100%, 0% 11px);
  position: relative;
}

/* 1차 클릭 = 빛 (바운스 제거, 글로우만) */
.node.lit .frame {
  filter:
    drop-shadow(0 0 22px var(--c1, var(--blue-2)))
    drop-shadow(0 0 40px var(--c2, var(--purple-2)));
}

/* 2차 클릭 = 확대 */
.node.zoomed .frame {
  filter:
    drop-shadow(0 0 24px var(--c1, var(--blue-2)))
    drop-shadow(0 0 48px var(--c2, var(--purple-2)));
}

.node:hover { z-index: 50; }
.node:hover .frame {
  filter:
    drop-shadow(0 0 22px var(--c1, var(--blue-2)))
    drop-shadow(0 0 44px var(--c2, var(--purple-2)))
    drop-shadow(0 0 60px var(--c1, var(--blue-2)));
}

.dot {
  width: 8px; height: 8px; flex-shrink: 0;
  background: var(--c, var(--text-3));
  box-shadow: 0 0 10px var(--c, var(--text-3));
  clip-path: polygon(2px 0, 100% 0, 100% calc(100% - 2px), calc(100% - 2px) 100%, 0 100%, 0 2px);
}

.node .sub {
  font-size: 11px; color: var(--text-3); font-weight: 600;
  margin-top: 7px; text-align: center;
  letter-spacing: 0.12em; text-transform: uppercase;
}

/* === Expanded === */
.expanded {
  display: none;
  margin-top: 12px;
  background: rgba(8,9,28,0.88);
  border: 1px solid var(--line);
  padding: 14px;
  max-width: 320px;
  backdrop-filter: blur(20px);
  clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
  animation: expandIn 0.35s cubic-bezier(.2,.8,.2,1);
}
@keyframes expandIn {
  from { opacity: 0; transform: translateY(-8px) scale(0.95); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
.node.zoomed .expanded { display: block; }
.expanded .label {
  font-size: 9.5px; color: var(--text-3);
  letter-spacing: 0.18em; text-transform: uppercase;
  font-weight: 700; margin-bottom: 8px;
}
.expanded .desc {
  font-size: 11.5px; color: var(--text-2);
  line-height: 1.55; letter-spacing: 0.02em;
  margin-bottom: 10px;
}
.member-grid { display: flex; flex-direction: column; gap: 5px; }
.member-chip {
  display: flex; align-items: center; justify-content: space-between;
  gap: 8px; padding: 6px 10px;
  background: rgba(167,139,250,0.06);
  border: 1px solid var(--line);
  font-size: 11px; color: var(--text-1); font-weight: 600;
  cursor: pointer;
  transition: all 0.18s;
  letter-spacing: 0.02em;
  clip-path: polygon(5px 0, 100% 0, 100% calc(100% - 5px), calc(100% - 5px) 100%, 0 100%, 0 5px);
}
.member-chip:hover {
  background: rgba(167,139,250,0.16);
  border-color: var(--purple-2);
  box-shadow: 0 0 12px rgba(167,139,250,0.3);
}
.member-chip .mname { display: flex; align-items: center; gap: 6px; }
.member-chip .role-tag { font-size: 9px; color: var(--text-3); font-weight: 600; }
.member-chip .badge {
  font-size: 9px; padding: 2px 7px;
  font-weight: 700; letter-spacing: 0.05em;
  text-transform: uppercase;
  clip-path: polygon(3px 0, 100% 0, 100% calc(100% - 3px), calc(100% - 3px) 100%, 0 100%, 0 3px);
}
.member-chip .badge.has  { background: rgba(34,211,238,0.18); color: var(--cyan); }
.member-chip .badge.none { background: rgba(138,143,173,0.16); color: var(--text-3); }

/* === Variants === */
.node.ceo .frame { --c1: var(--cyan); --c2: var(--purple-1); }
.node.ceo .core  { font-size: 18px; padding: 18px 28px; }

.node.biz-personal .frame { --c1: var(--blue-2); --c2: var(--cyan); }
.node.biz-personal .core  { font-size: 16px; padding: 15px 24px; }

.node.biz-corp .frame { --c1: var(--purple-2); --c2: var(--pink); }
.node.biz-corp .core  { font-size: 16px; padding: 15px 24px; }

.node.ch-personal .frame { --c1: var(--blue-1); --c2: var(--blue-3); }
.node.ch-corp .frame     { --c1: var(--purple-1); --c2: var(--purple-3); }

.node.dept .frame { --c1: var(--dc, var(--blue-2)); --c2: var(--dc2, var(--purple-2)); }
.node.dept .core  { font-size: 14px; padding: 13px 20px; }

.node.erp .frame {
  --c1: var(--cyan); --c2: var(--blue-2); padding: 2px;
  filter:
    drop-shadow(0 0 18px var(--cyan))
    drop-shadow(0 0 32px var(--blue-2))
    drop-shadow(0 0 48px var(--cyan));
}
.node.erp .core { font-size: 17px; padding: 16px 26px; letter-spacing: 0.06em; }

/* System nodes (Playauto, Ecount, Claude, GPT) */
.node.sys .core { font-size: 13.5px; padding: 12px 18px; }
.node.sys-playauto .frame { --c1: #fb923c; --c2: #fbbf24; }
.node.sys-ecount   .frame { --c1: #34d399; --c2: #22d3ee; }
.node.sys-claude20 .frame { --c1: #d97706; --c2: #f97316; }
.node.sys-claude5  .frame { --c1: #a855f7; --c2: #d97706; }
.node.sys-gpt      .frame { --c1: #10b981; --c2: #22d3ee; }

/* === Dim non-focus === */
.world.has-focus .node:not(.lit):not(.zoomed) { filter: saturate(0.3) brightness(0.5); }
.world.has-focus svg.wires path:not(.focus-wire) { opacity: 0.04; }
.world.has-focus svg.wires path.focus-wire { opacity: 0.95; stroke-width: 2.3 !important; }

/* === Task Panel === */
.task-panel {
  position: fixed; top: 70px; right: 18px; bottom: 80px;
  width: 380px;
  background: rgba(8,9,28,0.94);
  border: 1px solid var(--purple-2);
  padding: 0;
  z-index: 220;
  backdrop-filter: blur(30px);
  box-shadow: -10px 0 40px rgba(0,0,0,0.55), 0 0 30px rgba(168,85,247,0.2);
  display: flex; flex-direction: column;
  transform: translateX(420px); opacity: 0;
  transition: all 0.4s cubic-bezier(.2,.7,.2,1);
  pointer-events: none;
  clip-path: polygon(16px 0, 100% 0, 100% calc(100% - 16px), calc(100% - 16px) 100%, 0 100%, 0 16px);
}
.task-panel.show { transform: translateX(0); opacity: 1; pointer-events: auto; }
.task-panel .tp-head { padding: 18px 20px 14px; border-bottom: 1px solid var(--line); }
.task-panel .tp-head .tp-name {
  font-size: 15px; font-weight: 800; letter-spacing: 0.04em;
  background: linear-gradient(90deg, var(--blue-1), var(--purple-1));
  -webkit-background-clip: text; background-clip: text; color: transparent;
  margin-bottom: 3px;
}
.task-panel .tp-head .tp-role {
  font-size: 10px; color: var(--text-3);
  letter-spacing: 0.15em; text-transform: uppercase; font-weight: 600;
}
.task-panel .tp-stats { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
.task-panel .tp-stats .st {
  font-size: 9.5px; padding: 3px 8px;
  font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase;
  clip-path: polygon(3px 0, 100% 0, 100% calc(100% - 3px), calc(100% - 3px) 100%, 0 100%, 0 3px);
}
.task-panel .tp-stats .st.active  { background: rgba(52,211,153,0.18); color: var(--green); }
.task-panel .tp-stats .st.routine { background: rgba(167,139,250,0.18); color: var(--purple-1); }
.task-panel .tp-stats .st.hold    { background: rgba(251,146,60,0.20); color: var(--orange); }
.task-panel .tp-stats .st.planned { background: rgba(138,143,173,0.20); color: var(--text-3); }

.task-panel .tp-body { flex: 1; overflow-y: auto; padding: 14px 20px 20px; }
.task-panel .tp-body::-webkit-scrollbar { width: 4px; }
.task-panel .tp-body::-webkit-scrollbar-thumb { background: var(--line-2); }
.task-panel .tp-empty {
  text-align: center; padding: 40px 20px;
  color: var(--text-3); font-size: 12px;
  line-height: 1.7; letter-spacing: 0.02em;
}
.task-panel .tp-empty .ic { font-size: 26px; margin-bottom: 12px; color: var(--purple-1); letter-spacing: 0.2em; }
.task-group { margin-bottom: 14px; }
.task-group h4 {
  font-size: 10px; color: var(--text-3); font-weight: 700;
  letter-spacing: 0.18em; text-transform: uppercase;
  padding: 6px 0; margin-bottom: 6px;
  border-bottom: 1px dashed var(--line);
  display: flex; justify-content: space-between; align-items: center;
}
.task-group h4 .cnt {
  font-size: 10px; padding: 1px 7px;
  background: rgba(255,255,255,0.05); color: var(--text-2);
  clip-path: polygon(3px 0, 100% 0, 100% calc(100% - 3px), calc(100% - 3px) 100%, 0 100%, 0 3px);
}
.task-item {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 6px 0;
  font-size: 11px; color: var(--text-2);
  line-height: 1.5; letter-spacing: 0.015em;
}
.task-item .tdot {
  width: 6px; height: 6px; margin-top: 5px;
  background: var(--st-c, var(--text-3));
  flex-shrink: 0;
  clip-path: polygon(2px 0, 100% 0, 100% calc(100% - 2px), calc(100% - 2px) 100%, 0 100%, 0 2px);
  box-shadow: 0 0 6px var(--st-c, var(--text-3));
}
.task-item .tname { flex: 1; }
.task-item .tname b { color: var(--text-3); font-weight: 600; font-size: 10px; margin-left: 6px; }
.task-item .prio {
  font-size: 9px; padding: 1px 5px;
  font-weight: 800; letter-spacing: 0.05em;
  flex-shrink: 0; margin-top: 3px;
  clip-path: polygon(2px 0, 100% 0, 100% calc(100% - 2px), calc(100% - 2px) 100%, 0 100%, 0 2px);
}
.task-item .prio.h { background: rgba(248,113,113,0.20); color: var(--red); }
.task-item .prio.m { background: rgba(251,191,36,0.20); color: var(--amber); }
.task-item .prio.l { background: rgba(138,143,173,0.20); color: var(--text-3); }

.task-group.s-active  .tdot, .task-group.s-active  h4 { --st-c: var(--green); color: var(--green); }
.task-group.s-routine .tdot, .task-group.s-routine h4 { --st-c: var(--purple-1); color: var(--purple-1); }
.task-group.s-hold    .tdot, .task-group.s-hold    h4 { --st-c: var(--orange); color: var(--orange); }
.task-group.s-planned .tdot, .task-group.s-planned h4 { --st-c: var(--blue-1); color: var(--blue-1); }

.task-panel .close-x {
  position: absolute; top: 14px; right: 16px;
  cursor: pointer; color: var(--text-3);
  font-size: 14px; padding: 4px;
}
.task-panel .close-x:hover { color: var(--text-1); }
</style>
</head>
<body>

<div class="topbar">
  <div class="title">
    <h1>HANASM · WIRE MAP</h1>
    <span class="ver">v0.8</span>
    <span class="date" id="today"></span>
  </div>
  <div class="hint">클릭 = 빛 · 더블 = 확대 · 드래그 = 이동 · 휠 = 줌</div>
</div>

<div class="stage" id="stage">
  <div class="world" id="world">
    <svg class="wires" id="wires" viewBox="0 0 2400 1400"></svg>
  </div>
</div>

<div class="legend">
  <div class="row"><span class="sw" style="--c:#22d3ee"></span> CEO</div>
  <div class="row"><span class="sw" style="--c:#60a5fa"></span> 개인사업자 · 스마트스토어</div>
  <div class="row"><span class="sw" style="--c:#a855f7"></span> 법인사업자 · 자사몰·오픈마켓</div>
  <div class="row"><span class="sw" style="--c:#c4b5fd"></span> 부서</div>
</div>

<div class="controls">
  <button id="btnFit">RESET</button>
</div>

<aside class="task-panel" id="taskPanel">
  <span class="close-x" id="taskClose">✕</span>
  <div class="tp-head">
    <div class="tp-name" id="tpName"></div>
    <div class="tp-role" id="tpRole"></div>
    <div class="tp-stats" id="tpStats"></div>
  </div>
  <div class="tp-body" id="tpBody"></div>
</aside>

<script>
const STAGE_W = 2400, STAGE_H = 1400;
const CX = STAGE_W / 2, CY = STAGE_H / 2;

// ============ TASKS ============
const TASKS = {
  parksj: [
    { name:"네이버 광고 운영·입찰 조정", status:"정기", prio:"h" },
    { name:"SEO 개선 / 검색 노출 최적화", status:"진행중", prio:"h" },
    { name:"데이터 분석 · 매출 전략", status:"정기", prio:"h" },
    { name:"AI · 자동화 도입 검토", status:"진행중", prio:"m" },
    { name:"상품 · 상세페이지 기획", status:"정기", prio:"h" },
    { name:"개발팀 커뮤니케이션", status:"상시", prio:"m" },
    { name:"팀 업무 분장 · 관리", status:"상시", prio:"m" },
    { name:"신규몰(로켓출력공장) 운영", status:"진행중", prio:"h" }
  ],
  hwangki: [
    { name:"상세페이지 디자인 (개인·법인 전 채널)", status:"정기", prio:"h" },
    { name:"랜딩페이지 디자인", status:"정기", prio:"h" },
    { name:"배너 디자인 (광고·프로모션)", status:"정기", prio:"h" },
    { name:"디자인 시안 검수·디렉팅", status:"상시", prio:"h" },
    { name:"신상품 등록용 디자인", status:"정기", prio:"m" },
    { name:"상세페이지 개선·리뉴얼", status:"진행중", prio:"m" }
  ],
  kimeh: [
    { name:"상세페이지 디자인", status:"정기", prio:"h" },
    { name:"랜딩페이지 디자인", status:"정기", prio:"m" },
    { name:"배너 디자인", status:"정기", prio:"m" },
    { name:"신상품 디자인 작업", status:"정기", prio:"m" },

let camX = 0, camY = 0, camS = 1;

function placeNode(node, x, y, cls) {
  const div = document.createElement('div');
  div.className = `node ${cls}`;
  div.dataset.id = node.id;
  div.style.left = x + 'px';
  div.style.top = y + 'px';
  if (node.color)  div.style.setProperty('--dc', node.color);
  if (node.color2) div.style.setProperty('--dc2', node.color2);

  const frame = document.createElement('div'); frame.className = 'frame';
  const core = document.createElement('div'); core.className = 'core';
  if (node.brand) {
    const dot = document.createElement('span'); dot.className = 'dot';
    dot.style.setProperty('--c', node.brand);
    core.appendChild(dot);
  }
  const txt = document.createElement('span'); txt.textContent = node.name;
  core.appendChild(txt);
  frame.appendChild(core);
  div.appendChild(frame);

  if (node.sub) {
    const sub = document.createElement('div'); sub.className = 'sub'; sub.textContent = node.sub;
    div.appendChild(sub);
  }

  const exp = document.createElement('div'); exp.className = 'expanded';
  if (node.desc) {
    const lbl = document.createElement('div'); lbl.className = 'label'; lbl.textContent = 'INFO';
    const dsc = document.createElement('div'); dsc.className = 'desc'; dsc.textContent = node.desc;
    exp.appendChild(lbl); exp.appendChild(dsc);
  }
  if (node.members) {
    const lbl = document.createElement('div'); lbl.className = 'label';
    lbl.textContent = `MEMBERS · ${node.members.length}`;
    exp.appendChild(lbl);
    const grid = document.createElement('div'); grid.className = 'member-grid';
    node.members.forEach(m => {
      const chip = document.createElement('div');
      chip.className = 'member-chip';
      chip.dataset.dept = node.id;
      chip.dataset.member = m.name;
      chip.innerHTML = `<span class="mname">${m.name} <span class="role-tag">${m.role}</span></span>
                       <span class="badge ${m.tasks ? 'has' : 'none'}">${m.tasks ? '업무 ' + m.tasks.length : '수집 대기'}</span>`;
      chip.addEventListener('click', (e) => {
        e.stopPropagation();
        showTasks(node.id, m.name);
      });
      grid.appendChild(chip);
    });
    exp.appendChild(grid);
  }
  div.appendChild(exp);

  world.appendChild(div);
  POS[node.id] = { x, y, el: div, node };
  div.addEventListener('click', (e) => {
    e.stopPropagation();
    if (recentlyDragged) return;
    nodeClick(node.id);
  });
}

function spreadY(items, gap) {

  return items.map((it, i) => ({ it, y: CY - total/2 + i*gap }));
}

  const frame = el.querySelector('.frame');
  if (frame) return { w: frame.offsetWidth || 120, h: frame.offsetHeight || 50 };
  return { w: el.offsetWidth || 120, h: el.offsetHeight || 50 };
}
function edge(id, side) {
  const r = POS[id]; if (!r) return { x: 0, y: 0 };
  const { w, h } = nodeSize(id);
  if (side === 'right') return { x: r.x + w/2, y: r.y };
  if (side === 'left')  return { x: r.x - w/2, y: r.y };
  if (side === 'top')   return { x: r.x, y: r.y - h/2 + 6 };
  if (side === 'bot')   return { x: r.x, y: r.y + h/2 - 6 };
  return { x: r.x, y: r.y };
}
function orthoPath(p1, p2, mode) {
  const r = 10;
  if (mode === 'H') {
    const midX = (p1.x + p2.x) / 2;
    const dirX1 = Math.sign(midX - p1.x);
    const dirY = Math.sign(p2.y - p1.y);
    const dirX2 = Math.sign(p2.x - midX);
    if (Math.abs(p2.y - p1.y) < 2) return `M${p1.x},${p1.y} L${p2.x},${p2.y}`;
    return `M${p1.x},${p1.y} L${midX - r*dirX1},${p1.y} Q${midX},${p1.y} ${midX},${p1.y + r*dirY} L${midX},${p2.y - r*dirY} Q${midX},${p2.y} ${midX + r*dirX2},${p2.y} L${p2.x},${p2.y}`;
  } else {
    const midY = (p1.y + p2.y) / 2;
    const dirY1 = Math.sign(midY - p1.y);
    const dirX = Math.sign(p2.x - p1.x);
    const dirY2 = Math.sign(p2.y - midY);
    if (Math.abs(p2.x - p1.x) < 2) return `M${p1.x},${p1.y} L${p2.x},${p2.y}`;
    return `M${p1.x},${p1.y} L${p1.x},${midY - r*dirY1} Q${p1.x},${midY} ${p1.x + r*dirX},${midY} L${p2.x - r*dirX},${midY} Q${p2.x},${midY} ${p2.x},${midY + r*dirY2} L${p2.x},${p2.y}`;
  }
}
function drawWire(fromId, toId, color, opts={}) {
  const a = POS[fromId], b = POS[toId];
  if (!a || !b) return;
  const dx = b.x - a.x, dy = b.y - a.y;
  const mode = Math.abs(dy) > Math.abs(dx) * 1.2 ? 'V' : 'H';
  const fSide = mode === 'V' ? (dy > 0 ? 'bot' : 'top') : (dx > 0 ? 'right' : 'left');
  const tSide = mode === 'V' ? (dy > 0 ? 'top' : 'bot') : (dx > 0 ? 'left' : 'right');
  const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  path.setAttribute('d', orthoPath(edge(fromId, fSide), edge(toId, tSide), mode));
  path.setAttribute('stroke', color);
  path.style.color = color;
  if (opts.flow) path.classList.add('flow');
  path.setAttribute('stroke-width', opts.width || 1.4);
  if (opts.opacity != null) path.style.opacity = opts.opacity;
  path.dataset.from = fromId;
  path.dataset.to = toId;
  wires.appendChild(path);
}
function drawAllWires() {
  wires.innerHTML = '';
  drawWire('ceo', 'personal', '#60a5fa', { width: 2.0, flow: true });
  drawWire('ceo', 'corp',     '#a855f7', { width: 2.0, flow: true });
  DATA.personalChannels.forEach(c => drawWire('personal', c.id, '#60a5fa', { width: 1.5, flow: true }));
  DATA.corpChannels.forEach(c => drawWire('corp', c.id, '#a855f7', { width: 1.5, flow: true }));
  drawWire('self-mall', 'erp', '#22d3ee', { width: 2.2, flow: true });
  drawWire('cs', 'playauto', '#fb923c', { width: 1.6, flow: true });
  drawWire('cs', 'ecount',   '#34d399', { width: 1.4, flow: true });
  drawWire('fin', 'ecount',  '#34d399', { width: 1.6, flow: true });
  depts.forEach(d => d.links.forEach(t => drawWire(d.id, t, d.color, { width: 1.0, opacity: 0.30 })));
}

// ============ CAMERA ============
function applyCam() {
  world.style.transform = `translate(${camX}px, ${camY}px) scale(${camS})`;
}
function fitView() {
  const vw = window.innerWidth, vh = window.innerHeight;
  // 가로 여백 240(좌우 legend/controls 영역 + 패딩), 세로 여백 200(상단 topbar + 하단 패딩)
  const sx = (vw - 280) / STAGE_W;
  const sy = (vh - 220) / STAGE_H;
  camS = Math.min(sx, sy) * 0.92; // 추가 8% 여유
  camX = (vw - STAGE_W * camS) / 2;
  camY = (vh - STAGE_H * camS) / 2;
  applyCam();
}
function cameraTo(id) {
  const r = POS[id]; if (!r) return;
  const vw = window.innerWidth, vh = window.innerHeight;
  let zoom;
  if (id === 'ceo') zoom = 1.4;
  else if (id === 'personal' || id === 'corp') zoom = 1.3;
  else if (depts.find(x => x.id === id)) zoom = 1.3;
  else zoom = 1.9;
  const isDept = !!depts.find(x => x.id === id);
  camS = zoom;
  camX = vw/2 - r.x * camS;
  camY = (isDept ? vh*0.35 : vh*0.5) - r.y * camS;
  applyCam();
}

// ============ INTERACTION ============
let currentId = null, currentStage = 0;
const taskPanel = document.getElementById('taskPanel');

function nodeClick(id) {
  if (currentId === id && currentStage === 1) {
    setStage(id, 2);
  } else if (currentId === id && currentStage === 2) {
    closeAll();
  } else {
    setStage(id, 1);
  }
}

function setStage(id, stage) {
  document.querySelectorAll('.node.lit, .node.zoomed').forEach(n => n.classList.remove('lit', 'zoomed'));
  document.querySelectorAll('svg.wires path.focus-wire').forEach(p => p.classList.remove('focus-wire'));
  taskPanel.classList.remove('show');

  if (!id) {
    world.classList.remove('has-focus');
    currentId = null; currentStage = 0;
    fitView();
    return;
  }

  world.classList.add('has-focus');
  currentId = id;
  currentStage = stage;
  const rec = POS[id]; if (!rec) return;

  const connected = new Set([id]);
  const isDept = !!depts.find(x => x.id === id);
  const isDeptNode = (nid) => !!depts.find(x => x.id === nid);

  if (isDept) {
    // 부서 클릭 → BFS로 와이어 따라 모든 연결 노드 (다른 부서 제외, CEO 포함)
    let frontier = new Set([id]);
    for (let step = 0; step < 4; step++) {
      const next = new Set();
      wires.querySelectorAll('path').forEach(p => {
        const f = p.dataset.from, t = p.dataset.to;
        if (frontier.has(f) && !connected.has(t) && (!isDeptNode(t) || t === id)) next.add(t);
        if (frontier.has(t) && !connected.has(f) && (!isDeptNode(f) || f === id)) next.add(f);
      });
      next.forEach(n => connected.add(n));
      if (next.size === 0) break;
      frontier = next;
    }
    connected.add('ceo');
  } else {
    // 비부서 노드 클릭 → 직접 연결만
    wires.querySelectorAll('path').forEach(p => {
      if (p.dataset.from === id || p.dataset.to === id) {
        connected.add(p.dataset.from); connected.add(p.dataset.to);
      }
    });
  }

  // 와이어 강조: connected 노드 두 개를 잇는 모든 wire
  wires.querySelectorAll('path').forEach(p => {
    if (connected.has(p.dataset.from) && connected.has(p.dataset.to)) {
      p.classList.add('focus-wire');
    }
  });

  if (stage === 1) {
    connected.forEach(cid => POS[cid]?.el.classList.add('lit'));
  } else if (stage === 2) {
    connected.forEach(cid => POS[cid]?.el.classList.add('lit'));
    rec.el.classList.remove('lit');
    rec.el.classList.add('zoomed');
    cameraTo(id);
  }
}

function closeAll() { setStage(null); }

// ============ TASKS ============
function showTasks(deptId, memberName) {
  const d = depts.find(x => x.id === deptId);
  if (!d) return;
  const m = d.members.find(x => x.name === memberName);
  if (!m) return;

  document.getElementById('tpName').textContent = `${m.name} ${m.role}`;
  document.getElementById('tpRole').textContent = `${d.name} · ${m.title || ''}`;

  const stats = { active: 0, routine: 0, hold: 0, planned: 0 };
  const groups = { '진행중': [], '정기': [], '상시': [], '보류': [], '예정': [] };
  if (m.tasks) {
    m.tasks.forEach(t => {
      const k = t.status === '상시' ? '정기' : t.status;
      if (!groups[k]) groups[k] = [];
      groups[k].push(t);
      if (t.status === '진행중') stats.active++;
      else if (t.status === '보류') stats.hold++;
      else if (t.status === '예정') stats.planned++;
      else stats.routine++;
    });
  }

  const statsEl = document.getElementById('tpStats');
  if (m.tasks) {
    statsEl.innerHTML = `
      ${stats.active  ? `<span class="st active">진행중 ${stats.active}</span>` : ''}
      ${stats.routine ? `<span class="st routine">정기 ${stats.routine}</span>` : ''}
      ${stats.hold    ? `<span class="st hold">보류 ${stats.hold}</span>` : ''}
      ${stats.planned ? `<span class="st planned">예정 ${stats.planned}</span>` : ''}
    `;
  } else {
    statsEl.innerHTML = '';
  }

  const body = document.getElementById('tpBody');
  if (!m.tasks) {
    body.innerHTML = `
      <div class="tp-empty">
        <div class="ic">◇</div>
        업무 인터뷰 대기 중<br>
        <span style="font-size:10px; color:var(--text-3); letter-spacing:0.1em;">박상준 차장에게 전달 필요</span>
      </div>`;
  } else {
    let html = '';
    const order = [
      { key:'진행중', cls:'s-active',  label:'진행중' },
      { key:'정기',   cls:'s-routine', label:'정기 / 상시' },
      { key:'보류',   cls:'s-hold',    label:'보류' },
      { key:'예정',   cls:'s-planned', label:'예정' }
    ];
    order.forEach(({key, cls, label}) => {
      if (groups[key] && groups[key].length) {
        html += `<div class="task-group ${cls}"><h4>${label} <span class="cnt">${groups[key].length}</span></h4>`;
        groups[key].forEach(t => {
          const prio = t.prio || 'l';
          const prioLabel = prio === 'h' ? '상' : prio === 'm' ? '중' : '하';
          html += `<div class="task-item">
            <span class="tdot"></span>
            <span class="tname">${t.name}${t.detail ? ` <b>${t.detail}</b>` : ''}</span>
            <span class="prio ${prio}">${prioLabel}</span>
          </div>`;
        });
        html += `</div>`;
      }
    });
    body.innerHTML = html;
  }
  taskPanel.classList.add('show');
}

// ============ EVENTS ============
document.getElementById('taskClose').addEventListener('click', () => taskPanel.classList.remove('show'));

const stageEl = document.getElementById('stage');
let isDragging = false, dragStart = null;

stageEl.addEventListener('mousedown', (e) => {
  if (e.button !== 0) return;
  if (e.target.closest('.task-panel') || e.target.closest('.controls') || e.target.closest('.topbar') || e.target.closest('.legend')) return;
  dragStart = { camX, camY, x: e.clientX, y: e.clientY };
});

window.addEventListener('mousemove', (e) => {
  if (!dragStart) return;
  const dx = e.clientX - dragStart.x, dy = e.clientY - dragStart.y;
  if (!isDragging && Math.hypot(dx, dy) > 5) { isDragging = true; stageEl.classList.add('dragging'); }
  if (isDragging) { camX = dragStart.camX + dx; camY = dragStart.camY + dy; applyCam(); }
});

window.addEventListener('mouseup', () => {
  if (isDragging) { recentlyDragged = true; setTimeout(() => recentlyDragged = false, 60); stageEl.classList.remove('dragging'); }
  isDragging = false; dragStart = null;
});

stageEl.addEventListener('click', (e) => {
  if (recentlyDragged) { e.stopPropagation(); return; }
  if (e.target.closest('.node') || e.target.closest('.task-panel')) return;
  closeAll();
}, true);

document.getElementById('btnFit').addEventListener('click', closeAll);

stageEl.addEventListener('wheel', (e) => {
  e.preventDefault();
  const factor = e.deltaY > 0 ? 0.9 : 1.1;
  const ns = Math.max(0.3, Math.min(3.5, camS * factor));
  const mx = e.clientX, my = e.clientY;
  const wx = (mx - camX) / camS, wy = (my - camY) / camS;
  camS = ns; camX = mx - wx * camS; camY = my - wy * camS;
  world.style.transition = 'none'; applyCam();
  requestAnimationFrame(() => world.style.transition = '');
}, { passive: false });

document.getElementById('today').textContent = new Date().toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' }).toUpperCase();

function init() {
  fitView(); drawAllWires();
  setTimeout(() => { drawAllWires(); fitView(); }, 200);
  setTimeout(() => { drawAllWires(); fitView(); }, 600);
}
if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init); else init();
window.addEventListener('resize', () => { fitView(); drawAllWires(); });
</script>
