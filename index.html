<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HANASM · 와이어 맵 v0.8</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --purple-1: #c084fc; --purple-2: #a855f7; --purple-3: #7c3aed;
  --blue-1: #93c5fd;   --blue-2: #60a5fa;   --blue-3: #3b82f6;
  --cyan: #22d3ee; --pink: #f472b6; --amber: #fbbf24;
  --green: #34d399; --orange: #fb923c; --red: #f87171;
  --bg-0: #050614; --bg-1: #08091c; --bg-2: #0d0f24;
  --line: rgba(167,139,250,0.22);
  --line-2: rgba(96,165,250,0.26);
  --text-1: #f3f4fb; --text-2: #c5c9e0; --text-3: #8a8fad;
}
html, body {
  height: 100vh; width: 100vw; overflow: hidden;
  background: var(--bg-0);
  font-family: "JetBrains Mono", "Inter", "Pretendard", "Noto Sans KR", monospace, system-ui;
  color: var(--text-1);
  -webkit-font-smoothing: antialiased;
  letter-spacing: 0.01em;
  font-weight: 500;
}
body {
  background:
    radial-gradient(ellipse at 25% 30%, rgba(167,139,250,0.08), transparent 60%),
    radial-gradient(ellipse at 75% 70%, rgba(96,165,250,0.07), transparent 60%),
    radial-gradient(circle at 50% 50%, rgba(34,211,238,0.025), transparent 55%),
    linear-gradient(180deg, #050614 0%, #07091b 50%, #050614 100%);
}
/* grid bg removed for perf */

/* TOP BAR */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  padding: 16px 24px;
  display: flex; justify-content: space-between; align-items: center;
  pointer-events: none;
}
.title { display: flex; gap: 12px; align-items: center; pointer-events: auto; }
.brand-logo {
  height: 16px; width: auto; object-fit: contain;
  filter: drop-shadow(0 0 6px rgba(167,139,250,0.5)) brightness(1.15);
}
.title h1 {
  font-size: 14px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.18em;
  background: linear-gradient(90deg, var(--purple-1), var(--blue-1));
  -webkit-background-clip: text; background-clip: text; color: transparent;
}
.title .ver {
  font-size: 10px; padding: 3px 8px;
  background: rgba(167,139,250,0.15); color: var(--purple-1);
  border: 1px solid rgba(167,139,250,0.4);
  font-weight: 700; letter-spacing: 0.1em;
  clip-path: polygon(6px 0, 100% 0, 100% calc(100% - 6px), calc(100% - 6px) 100%, 0 100%, 0 6px);
}
.title .date { font-size: 11px; color: var(--text-3); letter-spacing: 0.05em; }
.hint {
  display: none;
  font-size: 10.5px; color: var(--text-2); font-weight: 500;
  background: rgba(8,9,28,0.78);
  padding: 8px 14px;
  border: 1px solid var(--line);
  pointer-events: auto;
  /* backdrop-filter removed for perf */
  letter-spacing: 0.06em; text-transform: uppercase;
  clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);
}

/* LEGEND / CONTROLS */
.legend, .controls {
  position: fixed; bottom: 18px; z-index: 100;
  background: rgba(8,9,28,0.78);
  border: 1px solid var(--line);
  padding: 12px 14px;
  font-size: 11px;
  /* backdrop-filter removed for perf */
  clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
}
.legend { left: 18px; }
.controls { right: 18px; display: flex; gap: 8px; align-items: center; padding: 8px 12px; }
.legend .row { display: flex; align-items: center; gap: 10px; margin: 5px 0; color: var(--text-2); font-weight: 500; letter-spacing: 0.04em; }
.legend .sw {
  width: 10px; height: 10px;
  background: var(--c, var(--text-3));
  box-shadow: 0 0 8px var(--c, var(--text-3));
  clip-path: polygon(3px 0, 100% 0, 100% calc(100% - 3px), calc(100% - 3px) 100%, 0 100%, 0 3px);
}
.controls button {
  background: transparent; border: 1px solid var(--line-2);
  color: var(--blue-1);
  padding: 6px 14px; font-size: 10.5px;
  font-family: inherit; cursor: pointer; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  transition: all 0.18s ease;
  clip-path: polygon(6px 0, 100% 0, 100% calc(100% - 6px), calc(100% - 6px) 100%, 0 100%, 0 6px);
}
.controls button:hover {
  background: rgba(96,165,250,0.12); color: var(--text-1);
  border-color: var(--blue-2);
  box-shadow: 0 0 16px rgba(96,165,250,0.4);
}

/* STAGE */
.stage {
  position: fixed; inset: 0; z-index: 2; overflow: hidden;
  cursor: grab;
}
.stage.dragging { cursor: grabbing; }
.stage.dragging .world { transition: none !important; }
.world {
  position: absolute; left: 0; top: 0;
  width: 2400px; height: 1400px;
  transform-origin: 0 0;
  transition: transform 0.5s cubic-bezier(.2,.7,.15,1);
}

/* WIRES */
svg.wires {
  position: absolute; left: 0; top: 0;
  width: 2400px; height: 1400px;
  pointer-events: none; overflow: visible;
}
svg.wires path {
  fill: none; stroke-linecap: round; stroke-linejoin: round;
  opacity: 0.85;
  stroke-width: 2;
  transition: opacity 0.2s;
}
svg.wires path.flow {
  stroke-dasharray: 6 8;
  animation: flow 2.5s linear infinite;
}
@keyframes flow { to { stroke-dashoffset: -28; } }

/* NODES */
.node {
  position: absolute; cursor: pointer;
  transform: translate(-50%,-50%);
  z-index: 10; user-select: none;
}
.node .frame {
  position: relative; padding: 1.5px;
  background: linear-gradient(135deg, var(--c1, var(--blue-2)), var(--c2, var(--purple-2)));
  clip-path: polygon(12px 0%, 100% 0%, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0% 100%, 0% 12px);
  box-shadow: 0 0 12px var(--c1, var(--blue-2));
  transition: box-shadow 0.2s ease;
}
.node .core {
  display: flex; align-items: center; gap: 12px;
  background: linear-gradient(180deg, rgba(68,72,118,0.96), rgba(48,52,92,0.97));
  padding: 14px 22px;
  font-size: 15px; font-weight: 700;
  color: var(--text-1);
  white-space: nowrap;
  letter-spacing: 0.02em;
  clip-path: polygon(11px 0%, 100% 0%, 100% calc(100% - 11px), calc(100% - 11px) 100%, 0% 100%, 0% 11px);
  position: relative;
}

/* 1차 클릭 = 빛 */
.node.lit .frame {
  box-shadow: 0 0 14px var(--c1, var(--blue-2));
}
.node.lit { transform: translate(-50%,-50%) scale(1.04); transition: transform 0.2s ease; }
.world.has-focus svg.wires path.focus-wire {
  opacity: 1 !important;
  stroke-width: 3 !important;
}

/* 2차 클릭 = 정면 시점 (노드 frame만 3D, 패널은 평면 유지) */
.node.zoomed {
  transform: translate(-50%,-50%) scale(1.0) !important;
  z-index: 200 !important;
  transition: transform 0.55s cubic-bezier(.2,.7,.15,1);
}
.node.zoomed .frame {
  transform: perspective(700px) rotateX(8deg);
  transform-origin: center bottom;
  transition: transform 0.55s cubic-bezier(.2,.7,.15,1);
  box-shadow:
    0 0 16px var(--c1, var(--blue-2)),
    0 0 28px var(--c2, var(--purple-2)),
    0 15px 30px rgba(0,0,0,0.55);
}
/* 패널은 회전 X (글씨 정상) */
.node.zoomed .expanded {
  transform: translateY(-50%) !important;
}
.world.has-focus .node:not(.lit):not(.zoomed) {
  opacity: 0.18 !important;
  transition: opacity 0.35s ease;
}
.world.has-focus .node.lit {
  opacity: 1;
}

.node:hover { z-index: 50; }
.node:hover .frame { box-shadow: 0 0 12px var(--c1, var(--blue-2)); }
.node.prelit .frame { box-shadow: 0 0 10px var(--c1, var(--blue-2)); }
svg.wires path.preview-wire {
  opacity: 0.75 !important;
  stroke-width: 2.6 !important;
}

.dot {
  width: 8px; height: 8px; flex-shrink: 0;
  background: var(--c, var(--text-3));
  box-shadow: 0 0 10px var(--c, var(--text-3));
  clip-path: polygon(2px 0, 100% 0, 100% calc(100% - 2px), calc(100% - 2px) 100%, 0 100%, 0 2px);
}

.node .sub {
  font-size: 11px; color: var(--text-3); font-weight: 600;
  margin-top: 7px; text-align: center;
  letter-spacing: 0.12em; text-transform: uppercase;
}

/* === Expanded (줌인 시 옆에 떠오르는 패널) === */
.expanded {
  display: none;
  position: absolute;
  left: calc(100% + 14px); top: 50%;
  transform: translateY(-50%);
  min-width: 200px; max-width: 240px;
  background: rgba(8,9,28,0.92);
  border: 1px solid var(--c1, var(--purple-2));
  padding: 14px 16px;
  /* perf */
  box-shadow: 0 18px 50px rgba(0,0,0,0.6), 0 0 24px color-mix(in srgb, var(--c1, #a855f7) 30%, transparent);
  clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
  animation: expandFly 0.45s cubic-bezier(.2,.8,.2,1);
  z-index: 5;
}
@keyframes expandFly {
  from { opacity: 0; transform: translateY(-50%) translateX(-30px) scale(0.9); }
  to   { opacity: 1; transform: translateY(-50%) translateX(0) scale(1); }
}
.node.zoomed .expanded { display: block; }
.expanded .label {
  font-size: 9.5px; color: var(--text-3);
  letter-spacing: 0.18em; text-transform: uppercase;
  font-weight: 700; margin-bottom: 8px;
}
.expanded .desc {
  font-size: 11.5px; color: var(--text-2);
  line-height: 1.55; letter-spacing: 0.02em;
  margin-bottom: 10px;
}
.desc-section {
  font-size: 10px; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase;
  color: #93c5fd;
  margin-top: 10px; padding: 6px 0 4px;
  border-top: 1px dashed rgba(167,139,250,0.30);
}
.desc-section:first-child { border-top: none; margin-top: 0; padding-top: 0; }
.desc-line { padding: 2px 0 2px 8px; position: relative; }
.desc-line::before {
  content: '·'; position: absolute; left: 0; top: 2px; color: rgba(167,139,250,0.5); font-weight: 700;
}
.member-grid { display: flex; flex-direction: column; gap: 5px; }
.member-chip {
  display: flex; align-items: center; justify-content: space-between;
  gap: 8px; padding: 6px 10px;
  background: rgba(167,139,250,0.06);
  border: 1px solid var(--line);
  font-size: 11px; color: var(--text-1); font-weight: 600;
  cursor: pointer;
  transition: all 0.18s;
  letter-spacing: 0.02em;
  clip-path: polygon(5px 0, 100% 0, 100% calc(100% - 5px), calc(100% - 5px) 100%, 0 100%, 0 5px);
}
.member-chip:hover {
  background: rgba(167,139,250,0.16);
  border-color: var(--purple-2);
  box-shadow: 0 0 12px rgba(167,139,250,0.3);
}
.member-chip .mname { display: flex; align-items: center; gap: 6px; }
.member-chip .role-tag { font-size: 9px; color: var(--text-3); font-weight: 600; }
.member-chip .badge {
  font-size: 9px; padding: 2px 7px;
  font-weight: 700; letter-spacing: 0.05em;
  text-transform: uppercase;
  clip-path: polygon(3px 0, 100% 0, 100% calc(100% - 3px), calc(100% - 3px) 100%, 0 100%, 0 3px);
}
.member-chip .badge.has  { background: rgba(34,211,238,0.18); color: var(--cyan); }
.member-chip .badge.none { background: rgba(138,143,173,0.16); color: var(--text-3); }

/* 진행중 / 예정 mini 카드 (zoomed 노드 옆에 뜸) */
.pl-item {
  display: flex; align-items: center; gap: 7px;
  padding: 5px 8px;
  background: rgba(167,139,250,0.05);
  border-left: 2px solid var(--pl-c, var(--text-3));
  font-size: 10.5px; color: var(--text-2);
  margin: 3px 0;
  letter-spacing: 0.015em;
}
.pl-item .pl-dot {
  width: 6px; height: 6px; flex-shrink: 0;
  background: var(--pl-c, var(--text-3));
  box-shadow: 0 0 5px var(--pl-c, var(--text-3));
}
.pl-item .pl-name { flex: 1; line-height: 1.3; }
.pl-item .pl-by { font-size: 9px; color: var(--text-3); font-weight: 600; }
.pl-item.active   { --pl-c: #34d399; }
.pl-item.planned  { --pl-c: #93c5fd; }
.ad-item {
  display: flex; align-items: center; gap: 7px;
  padding: 5px 9px;
  background: rgba(251,191,36,0.08);
  border-left: 2px solid #fbbf24;
  font-size: 10.5px; color: var(--text-2);
  margin: 3px 0; letter-spacing: 0.015em;
}
.ad-item::before { content:"●"; color:#fbbf24; font-size:8px; }
.ad-item.future::before { color:#94a3b8; }
.ad-item.future { border-left-color:#94a3b8; background:rgba(148,163,184,0.06); }
.ad-item.naver   { border-left-color:#03C75A; background:rgba(3,199,90,0.10); }
.ad-item.naver::before { color:#03C75A; }
.ad-item.adboost { border-left-color:#FF6B00; background:rgba(255,107,0,0.10); }
.ad-item.adboost::before { color:#FF6B00; }
.ad-item.google  { border-left-color:#4285F4; background:rgba(66,133,244,0.08); }
.ad-item.google::before {
  content:""; width:8px; height:8px; border-radius:50%;
  background: conic-gradient(#4285F4 0deg 90deg, #EA4335 90deg 180deg, #FBBC05 180deg 270deg, #34A853 270deg 360deg);
}
.ad-item.coupang { border-left-color:#ED1C24; background:rgba(237,28,36,0.10); }
.ad-item.coupang::before { color:#ED1C24; }
.ad-item.esm     { border-left-color:#00ACE6; background:rgba(0,172,230,0.10); }
.ad-item.esm::before { color:#00ACE6; }
.ad-item.none    { border-left-color:#64748b; background:rgba(100,116,139,0.06); opacity:0.6; }
.ad-item.none::before { color:#64748b; content:"○"; }
.ch-item {
  display: flex; align-items: center; gap: 7px;
  padding: 5px 9px;
  background: rgba(244,114,182,0.08);
  border-left: 2px solid #f472b6;
  font-size: 10.5px; color: var(--text-2);
  margin: 3px 0; letter-spacing: 0.015em;
}
.ch-item::before { content:"●"; color:#f472b6; font-size:8px; }

/* === Variants === */
.node.ceo .frame { --c1: var(--cyan); --c2: var(--purple-1); }
.node.ceo .core  { font-size: 18px; padding: 18px 28px; }
.node.hanasm .frame { --c1: #c084fc; --c2: #60a5fa; padding: 2px; }
.node.hanasm .core { font-size: 17px; padding: 16px 26px; letter-spacing: 0.05em; }

.node.biz-personal .frame { --c1: var(--blue-2); --c2: var(--cyan); }
.node.biz-personal .core  { font-size: 16px; padding: 15px 24px; }

.node.biz-corp .frame { --c1: var(--purple-2); --c2: var(--pink); }
.node.biz-corp .core  { font-size: 16px; padding: 15px 24px; }

.node.ch-personal .frame { --c1: var(--blue-1); --c2: var(--blue-3); }
.node.ch-corp .frame     { --c1: var(--purple-1); --c2: var(--purple-3); }
.node.ch-personal .core, .node.ch-corp .core { min-width: 210px; justify-content: flex-start; }

.node.dept .frame { --c1: var(--dc, var(--blue-2)); --c2: var(--dc2, var(--purple-2)); }
.node.dept .core  { font-size: 14px; padding: 13px 20px; }

.node.erp .frame {
  --c1: var(--cyan); --c2: var(--blue-2); padding: 2px;
  filter:
    drop-shadow(0 0 18px var(--cyan))
    drop-shadow(0 0 32px var(--blue-2))
    drop-shadow(0 0 48px var(--cyan));
}
.node.erp .core { font-size: 17px; padding: 16px 26px; letter-spacing: 0.06em; }

/* System nodes (Playauto, Ecount, Claude, GPT) */
.node.sys .core { font-size: 13.5px; padding: 12px 18px; }
.node.sys-playauto .frame { --c1: #fb923c; --c2: #f97316; }
.node.sys-ecount   .frame { --c1: #34d399; --c2: #22d3ee; }
.node.sys-ig    .frame { --c1: #E1306C; --c2: #f472b6; }
.node.sys-nblog .frame { --c1: #03C75A; --c2: #34d399; }
.node.sys-yt    .frame { --c1: #FF0000; --c2: #f87171; }
.node.sys-call  .frame { --c1: #60a5fa; --c2: #34d399; }
.node.sys-chat  .frame { --c1: #f472b6; --c2: #a855f7; }
.node.sys-nas   .frame { --c1: #22d3ee; --c2: #3b82f6; }
.node.sys-claude20 .frame { --c1: #d97706; --c2: #f97316; }
.node.sys-claude5  .frame { --c1: #a855f7; --c2: #d97706; }
.node.sys-gpt      .frame { --c1: #10b981; --c2: #22d3ee; }

/* === Dim non-focus === */
.world.has-focus .node:not(.lit):not(.zoomed) { filter: saturate(0.15) brightness(0.32); }
.world.has-focus svg.wires path:not(.focus-wire) { opacity: 0.015; }
.world.has-focus svg.wires path.focus-wire { opacity: 0.92; stroke-width: 2.4 !important; filter: drop-shadow(0 0 2px currentColor); }
.world.has-focus svg.wires .dev-region { opacity: 0.15; }

/* === Task Panel === */
.task-panel {
  position: fixed; top: 70px; right: 18px; bottom: 80px;
  width: 380px;
  background: rgba(8,9,28,0.94);
  border: 1px solid var(--purple-2);
  padding: 0;
  z-index: 220;
  /* perf */
  box-shadow: -10px 0 40px rgba(0,0,0,0.55), 0 0 30px rgba(168,85,247,0.2);
  display: flex; flex-direction: column;
  transform: translateX(420px); opacity: 0;
  transition: all 0.4s cubic-bezier(.2,.7,.2,1);
  pointer-events: none;
  clip-path: polygon(16px 0, 100% 0, 100% calc(100% - 16px), calc(100% - 16px) 100%, 0 100%, 0 16px);
}
.task-panel.show { transform: translateX(0); opacity: 1; pointer-events: auto; }
.task-panel .tp-head { padding: 18px 20px 14px; border-bottom: 1px solid var(--line); }
.task-panel .tp-head .tp-name {
  font-size: 15px; font-weight: 800; letter-spacing: 0.04em;
  background: linear-gradient(90deg, var(--blue-1), var(--purple-1));
  -webkit-background-clip: text; background-clip: text; color: transparent;
  margin-bottom: 3px;
}
.task-panel .tp-head .tp-role {
  font-size: 10px; color: var(--text-3);
  letter-spacing: 0.15em; text-transform: uppercase; font-weight: 600;
}
.task-panel .tp-stats { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
.task-panel .tp-stats .st {
  font-size: 9.5px; padding: 3px 8px;
  font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase;
  clip-path: polygon(3px 0, 100% 0, 100% calc(100% - 3px), calc(100% - 3px) 100%, 0 100%, 0 3px);
}
.task-panel .tp-stats .st.active  { background: rgba(52,211,153,0.18); color: var(--green); }
.task-panel .tp-stats .st.routine { background: rgba(167,139,250,0.18); color: var(--purple-1); }
.task-panel .tp-stats .st.hold    { background: rgba(251,146,60,0.20); color: var(--orange); }
.task-panel .tp-stats .st.planned { background: rgba(138,143,173,0.20); color: var(--text-3); }

.task-panel .tp-body { flex: 1; overflow-y: auto; padding: 14px 20px 20px; }
.task-panel .tp-body::-webkit-scrollbar { width: 4px; }
.task-panel .tp-body::-webkit-scrollbar-thumb { background: var(--line-2); }
.task-panel .tp-empty {
  text-align: center; padding: 40px 20px;
  color: var(--text-3); font-size: 12px;
  line-height: 1.7; letter-spacing: 0.02em;
}
.task-panel .tp-empty .ic { font-size: 26px; margin-bottom: 12px; color: var(--purple-1); letter-spacing: 0.2em; }
.task-group { margin-bottom: 14px; }
.task-group h4 {
  font-size: 10px; color: var(--text-3); font-weight: 700;
  letter-spacing: 0.18em; text-transform: uppercase;
  padding: 6px 0; margin-bottom: 6px;
  border-bottom: 1px dashed var(--line);
  display: flex; justify-content: space-between; align-items: center;
}
.task-group h4 .cnt {
  font-size: 10px; padding: 1px 7px;
  background: rgba(255,255,255,0.05); color: var(--text-2);
  clip-path: polygon(3px 0, 100% 0, 100% calc(100% - 3px), calc(100% - 3px) 100%, 0 100%, 0 3px);
}
.task-item {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 6px 0;
  font-size: 11px; color: var(--text-2);
  line-height: 1.5; letter-spacing: 0.015em;
}
.task-item .tdot {
  width: 6px; height: 6px; margin-top: 5px;
  background: var(--st-c, var(--text-3));
  flex-shrink: 0;
  clip-path: polygon(2px 0, 100% 0, 100% calc(100% - 2px), calc(100% - 2px) 100%, 0 100%, 0 2px);
  box-shadow: 0 0 6px var(--st-c, var(--text-3));
}
.task-item .tname { flex: 1; }
.task-item .tname b { color: var(--text-3); font-weight: 600; font-size: 10px; margin-left: 6px; }
.task-item .prio {
  font-size: 9px; padding: 1px 5px;
  font-weight: 800; letter-spacing: 0.05em;

function placeNode(node, x, y, cls) {
  const div = document.createElement('div');
  div.className = `node ${cls}`;
  div.dataset.id = node.id;
  div.style.left = x + 'px';
  div.style.top = y + 'px';
  if (node.color)  div.style.setProperty('--dc', node.color);
  if (node.color2) div.style.setProperty('--dc2', node.color2);

  const frame = document.createElement('div'); frame.className = 'frame';
  const core = document.createElement('div'); core.className = 'core';
  if (node.brand) {
    const dot = document.createElement('span'); dot.className = 'dot';
    dot.style.setProperty('--c', node.brand);
    core.appendChild(dot);
  }
  const txt = document.createElement('span'); txt.textContent = node.name;
  core.appendChild(txt);
  frame.appendChild(core);
  div.appendChild(frame);

  if (node.sub) {
    const sub = document.createElement('div'); sub.className = 'sub'; sub.textContent = node.sub;
    div.appendChild(sub);
  }

  const exp = document.createElement('div'); exp.className = 'expanded';
  if (node.desc) {
    const lbl = document.createElement('div'); lbl.className = 'label'; lbl.textContent = 'INFO';
    exp.appendChild(lbl);
    const dscWrap = document.createElement('div'); dscWrap.className = 'desc';
    node.desc.split('\n').forEach(line => {
      const t = line.trim();
      if (!t) return;
      const row = document.createElement('div');
      if (t.startsWith('■')) {
        row.className = 'desc-section';
        row.textContent = t.replace(/^■\s*/, '');
      } else {
        row.className = 'desc-line';
        row.textContent = t;
      }
      dscWrap.appendChild(row);
    });
    exp.appendChild(dscWrap);
  }
  if (node.channels && node.channels.length) {
    const lbl = document.createElement('div'); lbl.className = 'label'; lbl.style.marginTop = '8px';
    lbl.textContent = '연결 채널 · ' + node.channels.length;
    exp.appendChild(lbl);
    node.channels.forEach(ch => {
      const it = document.createElement('div');
      it.className = 'ch-item';
      it.textContent = ch;
      exp.appendChild(it);
    });
  }
  if (node.ad && node.ad.length) {
    const lbl = document.createElement('div'); lbl.className = 'label'; lbl.style.marginTop = '8px';
    lbl.textContent = `광고 집행 · ${node.ad.length}`;
    exp.appendChild(lbl);
    node.ad.forEach(a => {
      const it = document.createElement('div');
      let cls = 'ad-item';

// ============ WIRES ============
function nodeSize(id) {
  const el = POS[id]?.el; if (!el) return { w: 120, h: 50 };
  const frame = el.querySelector('.frame');
  if (frame) return { w: frame.offsetWidth || 120, h: frame.offsetHeight || 50 };
  return { w: el.offsetWidth || 120, h: el.offsetHeight || 50 };
}
function edge(id, side) {
  const r = POS[id]; if (!r) return { x: 0, y: 0 };
  const { w, h } = nodeSize(id);
  if (side === 'right') return { x: r.x + w/2, y: r.y };
  if (side === 'left')  return { x: r.x - w/2, y: r.y };
  if (side === 'top')   return { x: r.x, y: r.y - h/2 + 6 };
  if (side === 'bot')   return { x: r.x, y: r.y + h/2 - 6 };
  return { x: r.x, y: r.y };
}
function orthoPath(p1, p2, mode) {
  // 동적 control - 거리가 한쪽으로 치우치면 대칭, 비스듬하면 약한 비대칭
  if (mode === 'H') {
    const dx = p2.x - p1.x;
    const adx = Math.abs(dx);
    const ady = Math.abs(p2.y - p1.y);
    // 같은 높이 가까이 → 대칭 부드러운 곡선
    if (ady < 80 || adx < 220) {
      return `M${p1.x},${p1.y} C${p1.x + dx*0.42},${p1.y} ${p2.x - dx*0.42},${p2.y} ${p2.x},${p2.y}`;
    }
    // 비스듬한 경우만 약한 비대칭 (도착지 쪽 0.55)
    return `M${p1.x},${p1.y} C${p1.x + dx*0.35},${p1.y} ${p2.x - dx*0.55},${p2.y} ${p2.x},${p2.y}`;
  } else {
    const dy = p2.y - p1.y;
    const ady = Math.abs(dy);
    const adx = Math.abs(p2.x - p1.x);
    if (adx < 80 || ady < 220) {
      return `M${p1.x},${p1.y} C${p1.x},${p1.y + dy*0.42} ${p2.x},${p2.y - dy*0.42} ${p2.x},${p2.y}`;
    }
    return `M${p1.x},${p1.y} C${p1.x},${p1.y + dy*0.35} ${p2.x},${p2.y - dy*0.55} ${p2.x},${p2.y}`;
  }
}
function drawWire(fromId, toId, color, opts={}, cat=null) {
  const a = POS[fromId], b = POS[toId];
  if (!a || !b) return;
  const dx = b.x - a.x, dy = b.y - a.y;
  const mode = Math.abs(dy) > Math.abs(dx) * 1.2 ? 'V' : 'H';
  const fSide = mode === 'V' ? (dy > 0 ? 'bot' : 'top') : (dx > 0 ? 'right' : 'left');
  const tSide = mode === 'V' ? (dy > 0 ? 'top' : 'bot') : (dx > 0 ? 'left' : 'right');
  const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  path.setAttribute('d', orthoPath(edge(fromId, fSide), edge(toId, tSide), mode));
  path.setAttribute('stroke', color);
  path.style.color = color;
  if (opts.flow) path.classList.add('flow');
  if (opts.dashed) path.setAttribute('stroke-dasharray', '6 6');
  path.setAttribute('stroke-width', opts.width || 1.4);
  if (opts.opacity != null) path.style.opacity = opts.opacity;
  path.dataset.from = fromId;
  path.dataset.to = toId;
  if (cat) path.dataset.cat = cat;
  wires.appendChild(path);
}
function drawRegion(x, y, w, h, color, label) {
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('fill', color + '14');
  rect.setAttribute('stroke', color);
  rect.setAttribute('stroke-width', '2.5');
  rect.setAttribute('stroke-dasharray', '14 10');
  rect.setAttribute('rx', '20');
  rect.style.opacity = '0.55';
  rect.style.filter = `drop-shadow(0 0 18px ${color})`;
  wires.appendChild(rect);

  const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  text.setAttribute('x', x + w/2); text.setAttribute('y', y - 16);
  text.setAttribute('fill', color);
  text.setAttribute('text-anchor', 'middle');
  text.setAttribute('font-size', '28');
  text.setAttribute('font-weight', '800');
  text.setAttribute('letter-spacing', '6');
  text.style.filter = `drop-shadow(0 0 12px ${color})`;
  text.textContent = label;
  wires.appendChild(text);
}

// 개발 클러스터 배경 (자동 bbox)
const DEV_CLUSTER = ['dev', 'erp', 'nas', 'self-mall'];
function drawDevRegion() {
  const pts = DEV_CLUSTER.map(id => POS[id]).filter(Boolean);
  if (pts.length < 2) return;
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  pts.forEach(r => {
    const { w, h } = nodeSize(r.node.id);
    minX = Math.min(minX, r.x - w/2);
    minY = Math.min(minY, r.y - h/2);
    maxX = Math.max(maxX, r.x + w/2);
    maxY = Math.max(maxY, r.y + h/2);
  });
  const padX = 40;
  const padTop = 80;
  const padBottom = 40;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', minX - padX);
  rect.setAttribute('y', minY - padTop);
  rect.setAttribute('width',  (maxX - minX) + padX*2);
  rect.setAttribute('height', (maxY - minY) + padTop + padBottom);
  rect.setAttribute('rx', 28);
  rect.setAttribute('class', 'dev-region');
  // wires SVG의 첫 자식으로 삽입 (배경 깊이)
  wires.insertBefore(rect, wires.firstChild);

  const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  text.setAttribute('x', minX - padX + 22);
  text.setAttribute('y', minY - padTop + 38);
  text.setAttribute('fill', 'rgba(34,211,238,0.55)');
  text.setAttribute('font-size', '14');
  text.setAttribute('font-weight', '800');
  text.setAttribute('letter-spacing', '4');

// ============ CAMERA ============
function applyCam() {
  world.style.transform = `translate(${camX}px, ${camY}px) scale(${camS})`;
}
function fitView() {
  const vw = window.innerWidth, vh = window.innerHeight;
  const isMobile = vw < 768;
  const padX = isMobile ? 30 : 280;
  const padY = isMobile ? 100 : 220;
  const sx = (vw - padX) / STAGE_W;
  const sy = (vh - padY) / STAGE_H;
  let s = Math.min(sx, sy) * (isMobile ? 1.0 : 0.92);
  // 모바일에서 최소 가독 줌 보장 (가로 스크롤은 드래그로 가능)
  if (isMobile) s = Math.max(s, 0.42);
  camS = s;
  camX = (vw - STAGE_W * camS) / 2;
  camY = (vh - STAGE_H * camS) / 2;
  applyCam();
}
function cameraTo(id) {
  const r = POS[id]; if (!r) return;
  const vw = window.innerWidth, vh = window.innerHeight;
  let zoom;
  if (id === 'ceo') zoom = 1.2;
  else if (id === 'personal' || id === 'corp') zoom = 1.15;
  else if (depts.find(x => x.id === id)) zoom = 1.1;  // 부서 패널 자리 위해 살짝 줄임
  else zoom = 1.5;
  const isDept = !!depts.find(x => x.id === id);
  camS = zoom;
  // 노드를 화면 가운데에서 왼쪽으로 살짝 이동 (오른쪽 패널 자리 확보)
  const offsetX = (isDept || id === 'ceo' || id === 'personal' || id === 'corp') ? vw * 0.18 : 0;
  camX = vw/2 - r.x * camS - offsetX;
  camY = (isDept ? vh*0.4 : vh*0.5) - r.y * camS;
  applyCam();
}

// ============ INTERACTION ============
let currentId = null, currentStage = 0;
const taskPanel = document.getElementById('taskPanel');

function nodeClick(id) {
  if (currentId === id && currentStage === 1) {
    setStage(id, 2);
  } else if (currentId === id && currentStage === 2) {
    closeAll();
  } else {
    setStage(id, 1);
  }
}

function setStage(id, stage) {
  document.querySelectorAll('.node.lit, .node.zoomed, .node.bounce').forEach(n => n.classList.remove('lit', 'zoomed', 'bounce'));
  document.querySelectorAll('svg.wires path.focus-wire, svg.wires path.flow').forEach(p => p.classList.remove('focus-wire','flow'));
  taskPanel.classList.remove('show');

  if (!id) {
    world.classList.remove('has-focus');
    currentId = null; currentStage = 0;
    fitView();
    return;
  }

  world.classList.add('has-focus');
  currentId = id;
  currentStage = stage;
  const rec = POS[id]; if (!rec) return;

  const connected = new Set([id]);
  const isDept = !!depts.find(x => x.id === id);
  const isDeptNode = (nid) => !!depts.find(x => x.id === nid);

  // call(전화상담) / sales(외부영업) 클릭 시 cs 통해서 사업자 + 산하 채널 점선 표시
  const isCallOrSales = (id === 'call' || id === 'sales');

  if (isDept) {
    // 부서 클릭 → 직접 연결된 노드만 + 사업자 산하 채널/CEO
    wires.querySelectorAll('path').forEach(p => {
      if (p.dataset.from === id || p.dataset.to === id) {
        connected.add(p.dataset.from); connected.add(p.dataset.to);
      }
    });
    // 사업자 산하 채널 + 점선 애니메이션 와이어 (flow)
    // 디자인팀은 채널 강조 제외 (사용자 요청)
    if (connected.has('personal') && id !== 'design') {
      DATA.personalChannels.forEach(c => {
        connected.add(c.id);
        wires.querySelectorAll(`path[data-from="personal"][data-to="${c.id}"], path[data-from="${c.id}"][data-to="personal"]`).forEach(p => p.classList.add('focus-wire','flow'));
      });
    }
    if (connected.has('corp') && id !== 'design') {
      DATA.corpChannels.forEach(c => {
        connected.add(c.id);
        wires.querySelectorAll(`path[data-from="corp"][data-to="${c.id}"], path[data-from="${c.id}"][data-to="corp"]`).forEach(p => p.classList.add('focus-wire','flow'));
      });
    }
    // ERP 사용 부서 자동 (ERP가 connected에 있으면 CS/디자인/제작실/2공장 자동 추가)
    if (connected.has('erp')) {
      ['cs','design','product','factory2'].forEach(deptId => {
        if (deptId === id) return;
        connected.add(deptId);
        wires.querySelectorAll(`path[data-from="erp"][data-to="${deptId}"], path[data-from="${deptId}"][data-to="erp"]`).forEach(p => p.classList.add('focus-wire','flow'));
      });
    }
    if (connected.has('self-mall')) connected.add('erp');
    connected.add('ceo');

    // sales(외부영업) 클릭 시: cs→personal/corp + 모든 채널 점선 강조
    if (isCallOrSales) {
      connected.add('cs');
      connected.add('personal'); connected.add('corp');
      ['personal','corp'].forEach(t => {
        wires.querySelectorAll(`path[data-from="cs"][data-to="${t}"], path[data-from="${t}"][data-to="cs"]`).forEach(p => p.classList.add('focus-wire','flow'));
      });
      DATA.personalChannels.forEach(c => {
        connected.add(c.id);
        wires.querySelectorAll(`path[data-from="personal"][data-to="${c.id}"], path[data-from="${c.id}"][data-to="personal"]`).forEach(p => p.classList.add('focus-wire','flow'));
      });
      DATA.corpChannels.forEach(c => {
        connected.add(c.id);
        wires.querySelectorAll(`path[data-from="corp"][data-to="${c.id}"], path[data-from="${c.id}"][data-to="corp"]`).forEach(p => p.classList.add('focus-wire','flow'));
      });
    }
  } else {
    // 비부서 노드 클릭 → 직접 연결만
    wires.querySelectorAll('path').forEach(p => {
      if (p.dataset.from === id || p.dataset.to === id) {
        connected.add(p.dataset.from); connected.add(p.dataset.to);
      }
    });
    // NAS 클릭: 부서 7곳 (factory2 제외) 바운스 + flow 와이어 강조
    if (id === 'nas') {
      const nasDepts = ['web', 'cs', 'design', 'dev', 'fin', 'sales', 'product'];
      const nasPrinters = ['prtEpson', 'prtHp', 'prtExt', 'prtUv'];
      [...nasDepts, ...nasPrinters].forEach(targetId => {
        connected.add(targetId);
        // NAS↔타깃 직접 와이어 강조 (출력기는 직접 와이어 없음)
        wires.querySelectorAll(`path[data-from="nas"][data-to="${targetId}"], path[data-from="${targetId}"][data-to="nas"]`).forEach(p => p.classList.add('focus-wire','flow'));
        const el = POS[targetId]?.el;
        if (el) {
          el.classList.remove('bounce');
          void el.offsetWidth;
          el.classList.add('bounce');
          setTimeout(() => el.classList.remove('bounce'), 750);
        }
      });
      // 제작실 → 출력기 점선 와이어도 함께 강조 (NAS 핫폴더 흐름)
      nasPrinters.forEach(pid => {
        wires.querySelectorAll(`path[data-from="product"][data-to="${pid}"], path[data-from="${pid}"][data-to="product"]`).forEach(p => p.classList.add('focus-wire','flow'));
      });
    }
    // call(전화상담) 클릭 시: cs 통해서 사업자 + 산하 채널 점선 강조
    if (id === 'call') {
      connected.add('cs');
      connected.add('personal'); connected.add('corp');
      ['personal','corp'].forEach(t => {
        wires.querySelectorAll(`path[data-from="cs"][data-to="${t}"], path[data-from="${t}"][data-to="cs"]`).forEach(p => p.classList.add('focus-wire','flow'));
      });
      DATA.personalChannels.forEach(c => {
        connected.add(c.id);
        wires.querySelectorAll(`path[data-from="personal"][data-to="${c.id}"], path[data-from="${c.id}"][data-to="personal"]`).forEach(p => p.classList.add('focus-wire','flow'));
      });
      DATA.corpChannels.forEach(c => {
        connected.add(c.id);
        wires.querySelectorAll(`path[data-from="corp"][data-to="${c.id}"], path[data-from="${c.id}"][data-to="corp"]`).forEach(p => p.classList.add('focus-wire','flow'));
      });
    }
  }

  // 와이어 강조: 클릭 노드 직접 연결만 (ch-web은 채널 클릭 시만)
  const isChannel = [...DATA.personalChannels, ...DATA.corpChannels].some(x => x.id === id);
  wires.querySelectorAll('path').forEach(p => {
    if (p.dataset.from === id || p.dataset.to === id) {
      if (p.classList.contains('ch-web') && !isChannel) return;
      p.classList.add('focus-wire');
    }
  });

  if (stage === 1) {
    connected.forEach(cid => POS[cid]?.el.classList.add('lit'));
  } else if (stage === 2) {
    connected.forEach(cid => POS[cid]?.el.classList.add('lit'));
    rec.el.classList.remove('lit');
    rec.el.classList.add('zoomed');
    cameraTo(id);
  }
}

// ============ TASKS ============
function showTasks(deptId, memberName) {
  const d = depts.find(x => x.id === deptId);
  if (!d) return;
  const m = d.members.find(x => x.name === memberName);
  if (!m) return;

  document.getElementById('tpName').textContent = `${m.name} ${m.role}`;
  document.getElementById('tpRole').textContent = `${d.name} · ${m.title || ''}`;

  const stats = { routine: 0, aux: 0 };
  const groups = { '정기': [], '상시': [] };
  if (m.tasks) {
    m.tasks.forEach(t => {
      const k = t.status === '상시' ? '정기' : t.status;
      if (!groups[k]) groups[k] = [];
      groups[k].push(t);
      if (t.status === '진행중') stats.active++;
      else if (t.status === '보류') stats.hold++;
      else if (t.status === '예정') stats.planned++;
      else stats.routine++;
    });
  }

  const statsEl = document.getElementById('tpStats');
  if (m.tasks) {
    statsEl.innerHTML = `
      ${stats.routine ? `<span class="st routine">정기 ${stats.routine}</span>` : ''}
      ${stats.aux     ? `<span class="st active">상시 ${stats.aux}</span>` : ''}
    `;
  } else {
    statsEl.innerHTML = '';
  }

  const body = document.getElementById('tpBody');
  if (!m.tasks) {
    body.innerHTML = `
      <div class="tp-empty">
        <div class="ic">◇</div>
        업무 인터뷰 대기 중<br>
        <span style="font-size:10px; color:var(--text-3); letter-spacing:0.1em;">박상준 차장에게 전달 필요</span>
      </div>`;
  } else {
    let html = '';
    const order = [
      { key:'정기', cls:'s-routine', label:'정기' },
      { key:'상시', cls:'s-active',  label:'상시' }
    ];
    order.forEach(({key, cls, label}) => {
      if (groups[key] && groups[key].length) {
        html += `<div class="task-group ${cls}"><h4>${label} <span class="cnt">${groups[key].length}</span></h4>`;
        groups[key].forEach(t => {
          const prio = t.prio || 'l';
          const prioLabel = prio === 'h' ? '상' : prio === 'm' ? '중' : '하';
          html += `<div class="task-item">
            <span class="tdot"></span>
            <span class="tname">${t.name}${t.detail ? ` <b>${t.detail}</b>` : ''}</span>
            <span class="prio ${prio}">${prioLabel}</span>
          </div>`;
        });
        html += `</div>`;
      }
    });
    body.innerHTML = html;
  }
  // 신규 프로젝트 패널 자동 닫음 (겹침 방지)
  const pp = document.getElementById('projPanel');
  if (pp) pp.classList.remove('show');
  taskPanel.classList.add('show');
}

const stageEl = document.getElementById('stage');
let isDragging = false, dragStart = null;

stageEl.addEventListener('mousedown', (e) => {
  if (e.button !== 0) return;
  if (e.target.closest('.task-panel') || e.target.closest('.controls') || e.target.closest('.topbar') || e.target.closest('.legend')) return;
  dragStart = { camX, camY, x: e.clientX, y: e.clientY };
});

window.addEventListener('mousemove', (e) => {
  if (!dragStart) return;
  const dx = e.clientX - dragStart.x, dy = e.clientY - dragStart.y;
  if (!isDragging && Math.hypot(dx, dy) > 5) { isDragging = true; stageEl.classList.add('dragging'); }
  if (isDragging) { camX = dragStart.camX + dx; camY = dragStart.camY + dy; applyCam(); }
});

window.addEventListener('mouseup', () => {
  if (isDragging) { recentlyDragged = true; setTimeout(() => recentlyDragged = false, 60); stageEl.classList.remove('dragging'); }
  isDragging = false; dragStart = null;
});

// Touch 지원 (모바일)
stageEl.addEventListener('touchstart', (e) => {
  if (e.target.closest('.task-panel') || e.target.closest('.controls') || e.target.closest('.topbar') || e.target.closest('.legend')) return;
  if (e.touches.length === 1) {
    dragStart = { camX, camY, x: e.touches[0].clientX, y: e.touches[0].clientY };
  }
}, { passive: true });
stageEl.addEventListener('touchmove', (e) => {
  if (!dragStart || e.touches.length !== 1) return;
  const dx = e.touches[0].clientX - dragStart.x, dy = e.touches[0].clientY - dragStart.y;
  if (!isDragging && Math.hypot(dx, dy) > 5) { isDragging = true; stageEl.classList.add('dragging'); }
  if (isDragging) { camX = dragStart.camX + dx; camY = dragStart.camY + dy; applyCam(); e.preventDefault(); }
}, { passive: false });
stageEl.addEventListener('touchend', () => {
  if (isDragging) { recentlyDragged = true; setTimeout(() => recentlyDragged = false, 60); stageEl.classList.remove('dragging'); }
  isDragging = false; dragStart = null;
});
// 휠 확대/축소 (마우스 포인터 기준)
stageEl.addEventListener('wheel', (e) => {
  e.preventDefault();
  const factor = e.deltaY > 0 ? 0.9 : 1.1;
  const ns = Math.max(0.3, Math.min(3.5, camS * factor));
  const mx = e.clientX, my = e.clientY;
  const wx = (mx - camX) / camS, wy = (my - camY) / camS;
  camS = ns; camX = mx - wx * camS; camY = my - wy * camS;
  world.style.transition = 'none'; applyCam();
  requestAnimationFrame(() => world.style.transition = '');
}, { passive: false });

stageEl.addEventListener('click', (e) => {
  if (recentlyDragged) { e.stopPropagation(); return; }
  if (e.target.closest('.node') || e.target.closest('.task-panel')) return;
  closeAll();
}, true);

    const st = it.status || 'active';
    const stLabel = st === 'done' ? '✓ 완료' : st === 'stop' ? '⏸ 스톱' : '● 진행';
    const progBar = pct !== null ? '<div class="pi-prog"><div class="pi-prog-bar" style="width:' + pct + '%"></div><span class="pi-prog-num">' + pct + '%</span></div>' : '';
    html += '<div class="proj-item flat-item ' + e.cat + ' st-' + st + '" data-key="' + k + '" data-cat="' + e.cat + '" data-name="' + it.name + '">'
          + '<div class="pi-tag-row"><span class="pi-tag">' + catName + '</span><span class="pi-st">' + stLabel + '</span></div>'
          + '<div class="pi-row">'
          +   '<span class="pi-handle">⋮⋮</span>'
          +   '<span class="pi-num"></span>'
          +   '<span class="pi-name">' + it.name + '</span>'
          +   '<span class="pi-prio ' + it.prio + '">' + label + '</span>'
          + '</div>'
          + progBar
          + descHtml
          + '</div>';
  });
  html += '</div>';
  body.innerHTML = html;

  if (typeof Sortable !== 'undefined') {
    Sortable.create(document.querySelector('.proj-list.flat'), {
      animation: 180, ghostClass: 'sortable-ghost', handle: '.pi-handle',
      onEnd: () => {
        const order = [...document.querySelectorAll('.proj-list.flat .proj-item')].map(x => x.dataset.key);
        localStorage.setItem('hanasm.projects.flat', JSON.stringify(order));
      }
    });
  }
  document.querySelectorAll('.proj-item').forEach(el => {
    el.addEventListener('click', (e) => {
      if (e.target.closest('.pi-handle')) return;
      el.classList.toggle('open');
    });
  });
}

// ===== 카테고리 필터 칩 =====
(function(){
  const chipBar = document.getElementById('chipBar');
  if (!chipBar) return;
  const STATE_KEY = 'hanasm.catFilter';
  function getOff() {
    try { return new Set(JSON.parse(localStorage.getItem(STATE_KEY) || '[]')); }
    catch(e) { return new Set(); }
  }
  function saveOff(set) { localStorage.setItem(STATE_KEY, JSON.stringify([...set])); }
  // 노드 → 카테고리 매핑 (한 노드는 한 카테고리)
  const NODE_CAT = {
    ceo: 'core', hanasm: 'core', personal: 'core', corp: 'core',
    web: 'dept', cs: 'dept', design: 'dept', dev: 'dept', fin: 'dept', sales: 'dept', factory2: 'dept', product: 'dept',
    erp: 'system', playauto: 'system', ecount: 'system', nas: 'system',
    call: 'talk', chat: 'talk',
    ig: 'sns', nblog: 'sns', yt: 'sns',
    prtEpson: 'system', prtHp: 'system', prtExt: 'system', prtUv: 'system',
    'ss-hana': 'channel', 'ss-baron': 'channel', 'ss-rocket': 'channel',
    godo: 'channel', 'self-mall': 'channel', coupang: 'channel', '11st': 'channel', auction: 'channel', gmarket: 'channel'
  };

  function applyFilter() {
    const off = getOff();
    document.querySelectorAll('#chipBar .chip').forEach(c => {
      c.classList.toggle('off', off.has(c.dataset.cat));
    });
    // 와이어
    document.querySelectorAll('svg.wires path[data-cat]').forEach(p => {
      const c = p.dataset.cat;
      const hidden = off.has(c) || (c === 'ch-web' && off.has('channel'));
      p.classList.toggle('cat-off', hidden);
    });
    // 노드
    document.querySelectorAll('.node').forEach(n => {
      const cat = NODE_CAT[n.dataset.id];
      const hidden = cat && off.has(cat);
      n.classList.toggle('cat-off', !!hidden);
    });
  }
  chipBar.querySelectorAll('.chip').forEach(c => {
    c.addEventListener('click', () => {
      const set = getOff();
      const cat = c.dataset.cat;
      if (set.has(cat)) set.delete(cat); else set.add(cat);
      saveOff(set);
      applyFilter();
    });
  });
  window.__applyCatFilter = applyFilter;
  setTimeout(applyFilter, 250);
  setTimeout(applyFilter, 800);
})();

// ===== 편집 모드: 노드 드래그 + 위치 저장 + Undo (최대 10) =====
(function(){
  const editBtn = document.getElementById('editToggle');
  const undoBtn = document.getElementById('undoBtn');
  const undoCnt = document.getElementById('undoCnt');
  if (!editBtn) return;
  const worldEl = document.getElementById('world');
  let editMode = false;
  let nodeDrag = null;
  const UNDO_MAX = 10;
  const undoStack = [];

  function refreshUndoUi() {
    if (undoCnt) undoCnt.textContent = undoStack.length;
    if (undoBtn) {
      undoBtn.style.opacity = undoStack.length ? '1' : '0.45';
      undoBtn.style.pointerEvents = undoStack.length ? 'auto' : 'none';
    }
  }
  function setEditMode(on) {
    editMode = on;
    document.body.classList.toggle('edit-mode', on);
    editBtn.classList.toggle('active', on);
    editBtn.textContent = on ? '✓ 편집 종료' : '✎ 편집';
    if (undoBtn) undoBtn.style.display = on ? '' : 'none';
    refreshUndoUi();
  }
  editBtn.addEventListener('click', () => setEditMode(!editMode));

  function pushUndo(entry) {
    undoStack.push(entry);
    while (undoStack.length > UNDO_MAX) undoStack.shift();
    refreshUndoUi();
  }
  function doUndo() {
    if (!undoStack.length) return;
    const last = undoStack.pop();
    const r = POS[last.id];
    if (r) {
      r.x = last.x; r.y = last.y;
      r.el.style.left = r.x + 'px';
      r.el.style.top  = r.y + 'px';
      try {
        const saved = JSON.parse(localStorage.getItem('hanasm.positions') || '{}');
        saved[last.id] = { x: last.x, y: last.y };
        localStorage.setItem('hanasm.positions', JSON.stringify(saved));
      } catch(err) {}
      if (typeof drawAllWires === 'function') drawAllWires();
    }
    refreshUndoUi();
  }
  if (undoBtn) undoBtn.addEventListener('click', (e) => { e.stopPropagation(); doUndo(); });
  window.addEventListener('keydown', (e) => {
    if (!editMode) return;
    if ((e.ctrlKey || e.metaKey) && (e.key === 'z' || e.key === 'Z')) {
      e.preventDefault();
      doUndo();
    }
  });

  worldEl.addEventListener('mousedown', (e) => {
    if (!editMode) return;
    const nodeEl = e.target.closest('.node');
    if (!nodeEl) return;
    const id = nodeEl.dataset.id;
    if (!id || !POS[id]) return;
    e.stopPropagation();
    e.preventDefault();
    nodeDrag = {
      id,
      sx: e.clientX, sy: e.clientY,
      ox: POS[id].x, oy: POS[id].y,
      moved: false
    };
    nodeEl.style.zIndex = 999;
  }, true);

  window.addEventListener('mousemove', (e) => {
    if (!nodeDrag) return;
    const dx = (e.clientX - nodeDrag.sx) / camS;
    const dy = (e.clientY - nodeDrag.sy) / camS;
    if (!nodeDrag.moved && Math.hypot(dx, dy) > 1) nodeDrag.moved = true;
    const r = POS[nodeDrag.id];
    r.x = nodeDrag.ox + dx;
    r.y = nodeDrag.oy + dy;
    r.el.style.left = r.x + 'px';
    r.el.style.top  = r.y + 'px';
    if (typeof drawAllWires === 'function') drawAllWires();
  });

  window.addEventListener('mouseup', () => {
    if (!nodeDrag) return;
    if (nodeDrag.moved) {
      pushUndo({ id: nodeDrag.id, x: nodeDrag.ox, y: nodeDrag.oy });
      try {
        const saved = JSON.parse(localStorage.getItem('hanasm.positions') || '{}');
        saved[nodeDrag.id] = { x: POS[nodeDrag.id].x, y: POS[nodeDrag.id].y };
        localStorage.setItem('hanasm.positions', JSON.stringify(saved));
      } catch(err) {}
    }
    POS[nodeDrag.id].el.style.zIndex = '';
    nodeDrag = null;
  });
})();

</script>
