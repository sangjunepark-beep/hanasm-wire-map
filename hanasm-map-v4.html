// ============ CAMERA ============
function applyCam() {
  world.style.transform = `translate(${camX}px, ${camY}px) scale(${camS})`;
}
function fitView() {
  const vw = window.innerWidth, vh = window.innerHeight;
  const isMobile = vw < 768;
  // 우측 패널이 열려 있으면 그 폭(460+margin) 만큼 가용 영역에서 제외
  const projPanel = document.getElementById('projPanel');
  const panelOpen = projPanel && projPanel.classList.contains('show');
  const rightReserve = (panelOpen && !isMobile) ? 490 : 0;
  const padX = isMobile ? 30 : 280;
  const padY = isMobile ? 100 : 220;
  const availW = Math.max(400, vw - padX - rightReserve);
  const sx = availW / STAGE_W;
  const sy = (vh - padY) / STAGE_H;
  let s = Math.min(sx, sy) * (isMobile ? 1.0 : 0.92);
  if (isMobile) s = Math.max(s, 0.42);
  camS = s;
  // 카메라 X: 가용 영역 중심에 맞춤 (우측 패널 자리 빼고)
  camX = (vw - rightReserve - STAGE_W * camS) / 2;
  camY = (vh - STAGE_H * camS) / 2;
  applyCam();
}
function cameraTo(id) {
  const r = POS[id]; if (!r) return;
  const vw = window.innerWidth, vh = window.innerHeight;
  let zoom;
  if (id === 'ceo') zoom = 1.2;
  else if (id === 'personal' || id === 'corp') zoom = 1.15;
  else if (depts.find(x => x.id === id)) zoom = 1.1;  // 부서 패널 자리 위해 살짝 줄임
  else zoom = 1.5;
  const isDept = !!depts.find(x => x.id === id);
  camS = zoom;
  // 노드를 화면 가운데에서 왼쪽으로 살짝 이동 (오른쪽 패널 자리 확보)
  const offsetX = (isDept || id === 'ceo' || id === 'personal' || id === 'corp') ? vw * 0.18 : 0;
  camX = vw/2 - r.x * camS - offsetX;
  camY = (isDept ? vh*0.4 : vh*0.5) - r.y * camS;
  applyCam();
}

// ============ INTERACTION ============
let currentId = null, currentStage = 0;
const taskPanel = document.getElementById('taskPanel');

function nodeClick(id) {
  if (currentId === id && currentStage === 1) {
    setStage(id, 2);
  } else if (currentId === id && currentStage === 2) {
    closeAll();
  } else {
    setStage(id, 1);
  }
}

function setStage(id, stage) {
  document.querySelectorAll('.node.lit, .node.zoomed, .node.bounce').forEach(n => n.classList.remove('lit', 'zoomed', 'bounce'));
  document.querySelectorAll('svg.wires path.focus-wire, svg.wires path.flow').forEach(p => p.classList.remove('focus-wire','flow'));
  taskPanel.classList.remove('show');

  if (!id) {
    world.classList.remove('has-focus');
    currentId = null; currentStage = 0;
    fitView();
    return;
  }

  world.classList.add('has-focus');
  currentId = id;
  currentStage = stage;
  const rec = POS[id]; if (!rec) return;

  const connected = new Set([id]);
  const isDept = !!depts.find(x => x.id === id);
  const isDeptNode = (nid) => !!depts.find(x => x.id === nid);

  // call(전화상담) / sales(외부영업) 클릭 시 cs 통해서 사업자 + 산하 채널 점선 표시
  const isCallOrSales = (id === 'call' || id === 'sales');

  if (isDept) {
    // 부서 클릭 → 직접 연결된 노드만 + 사업자 산하 채널/대표
    wires.querySelectorAll('path').forEach(p => {
      if (p.dataset.from === id || p.dataset.to === id) {
        connected.add(p.dataset.from); connected.add(p.dataset.to);
      }
    });
    // 사업자 산하 채널 + 점선 애니메이션 와이어 (flow)
    // 디자인팀은 채널 강조 제외 (사용자 요청)
    if (connected.has('personal') && id !== 'design') {
      DATA.personalChannels.forEach(c => {
        connected.add(c.id);
        wires.querySelectorAll(`path[data-from="personal"][data-to="${c.id}"], path[data-from="${c.id}"][data-to="personal"]`).forEach(p => p.classList.add('focus-wire','flow'));
      });
    }
    if (connected.has('corp') && id !== 'design') {
      DATA.corpChannels.forEach(c => {
        connected.add(c.id);
        wires.querySelectorAll(`path[data-from="corp"][data-to="${c.id}"], path[data-from="${c.id}"][data-to="corp"]`).forEach(p => p.classList.add('focus-wire','flow'));
      });
    }
    // ERP 사용 부서 자동 (ERP가 connected에 있으면 CS/디자인/제작실/2공장 자동 추가)
    if (connected.has('erp')) {
      ['cs','design','product','factory2'].forEach(deptId => {
        if (deptId === id) return;
        connected.add(deptId);
        wires.querySelectorAll(`path[data-from="erp"][data-to="${deptId}"], path[data-from="${deptId}"][data-to="erp"]`).forEach(p => p.classList.add('focus-wire','flow'));
      });
    }
    if (connected.has('self-mall')) connected.add('erp');
    connected.add('ceo');

    // sales(외부영업) 클릭 시: cs→personal/corp + 모든 채널 점선 강조
    if (isCallOrSales) {
      connected.add('cs');
      connected.add('personal'); connected.add('corp');
      ['personal','corp'].forEach(t => {
        wires.querySelectorAll(`path[data-from="cs"][data-to="${t}"], path[data-from="${t}"][data-to="cs"]`).forEach(p => p.classList.add('focus-wire','flow'));
      });
      DATA.personalChannels.forEach(c => {
        connected.add(c.id);
        wires.querySelectorAll(`path[data-from="personal"][data-to="${c.id}"], path[data-from="${c.id}"][data-to="personal"]`).forEach(p => p.classList.add('focus-wire','flow'));
      });
      DATA.corpChannels.forEach(c => {
        connected.add(c.id);
        wires.querySelectorAll(`path[data-from="corp"][data-to="${c.id}"], path[data-from="${c.id}"][data-to="corp"]`).forEach(p => p.classList.add('focus-wire','flow'));
      });
    }
  } else {
    // 비부서 노드 클릭 → 직접 연결만
    wires.querySelectorAll('path').forEach(p => {
      if (p.dataset.from === id || p.dataset.to === id) {
        connected.add(p.dataset.from); connected.add(p.dataset.to);
      }
    });
    // NAS 클릭: 부서 7곳 (factory2 제외) 바운스 + flow 와이어 강조
    if (id === 'nas') {
      const nasDepts = ['web', 'cs', 'design', 'dev', 'fin', 'sales', 'product'];
      const nasPrinters = ['prtEpson', 'prtHp', 'prtExt', 'prtUv'];
      [...nasDepts, ...nasPrinters].forEach(targetId => {
        connected.add(targetId);
        // NAS↔타깃 직접 와이어 강조 (출력기는 직접 와이어 없음)
        wires.querySelectorAll(`path[data-from="nas"][data-to="${targetId}"], path[data-from="${targetId}"][data-to="nas"]`).forEach(p => p.classList.add('focus-wire','flow'));
        const el = POS[targetId]?.el;
        if (el) {
          el.classList.remove('bounce');
          void el.offsetWidth;
          el.classList.add('bounce');
          setTimeout(() => el.classList.remove('bounce'), 750);
        }
      });
      // 제작실 → 출력기 점선 와이어도 함께 강조 (NAS 핫폴더 흐름)
      nasPrinters.forEach(pid => {
        wires.querySelectorAll(`path[data-from="product"][data-to="${pid}"], path[data-from="${pid}"][data-to="product"]`).forEach(p => p.classList.add('focus-wire','flow'));
      });
    }
    // call(전화상담) 클릭 시: cs 통해서 사업자 + 산하 채널 점선 강조
    if (id === 'call') {
      connected.add('cs');
      connected.add('personal'); connected.add('corp');
      ['personal','corp'].forEach(t => {
        wires.querySelectorAll(`path[data-from="cs"][data-to="${t}"], path[data-from="${t}"][data-to="cs"]`).forEach(p => p.classList.add('focus-wire','flow'));
      });
      DATA.personalChannels.forEach(c => {
        connected.add(c.id);
        wires.querySelectorAll(`path[data-from="personal"][data-to="${c.id}"], path[data-from="${c.id}"][data-to="personal"]`).forEach(p => p.classList.add('focus-wire','flow'));
      });
      DATA.corpChannels.forEach(c => {
        connected.add(c.id);
        wires.querySelectorAll(`path[data-from="corp"][data-to="${c.id}"], path[data-from="${c.id}"][data-to="corp"]`).forEach(p => p.classList.add('focus-wire','flow'));
      });
    }
  }

  // 와이어 강조: 클릭 노드 직접 연결만 (ch-web은 채널 클릭 시만)
  const isChannel = [...DATA.personalChannels, ...DATA.corpChannels].some(x => x.id === id);
  wires.querySelectorAll('path').forEach(p => {
    if (p.dataset.from === id || p.dataset.to === id) {
      if (p.classList.contains('ch-web') && !isChannel) return;
      p.classList.add('focus-wire');
    }
  });

  if (stage === 1) {
    connected.forEach(cid => POS[cid]?.el.classList.add('lit'));
  } else if (stage === 2) {
    connected.forEach(cid => POS[cid]?.el.classList.add('lit'));
    rec.el.classList.remove('lit');
    rec.el.classList.add('zoomed');
    cameraTo(id);
    if (isDept && typeof renderDeptProjects === 'function') {
      // 부서 확대 시 우측 프로젝트 패널 자동 닫기 (중복 표시 방지)
      const pp = document.getElementById('projPanel');
      if (pp) pp.classList.remove('show');
      renderDeptProjects(id);
      // 패널 위치 보정 - 위쪽 잘림 방지 (2회 측정: 콘텐츠 높이 확정 후 재보정)
      const adjustExpanded = () => {
        const expEl = rec.el.querySelector('.expanded');
        if (!expEl) return;
        const r = expEl.getBoundingClientRect();
        const safeTop = 60;
        const safeBottom = window.innerHeight - 30;
        let delta = 0;
        if (r.top < safeTop) delta = safeTop - r.top;
        else if (r.bottom > safeBottom) delta = safeBottom - r.bottom;
        if (delta !== 0) {
          expEl.style.transform = `translateY(calc(-50% + ${delta}px))`;
        }
      };
      requestAnimationFrame(adjustExpanded);
      setTimeout(adjustExpanded, 80);  // 콘텐츠 height inline 박힌 다음 재측정
    }
  }
}

function closeAll() { setStage(null); }

// ============ TASKS ============
function showTasks(deptId, memberName) {
  const d = depts.find(x => x.id === deptId);
  if (!d) return;
  const m = d.members.find(x => x.name === memberName);
  if (!m) return;

  document.getElementById('tpName').textContent = `${m.name} ${m.role}`;
  document.getElementById('tpRole').textContent = `${d.name} · ${m.title || ''}`;

  const stats = { routine: 0, aux: 0, active: 0, hold: 0, planned: 0 };
  const groups = { '정기': [], '상시': [] };
  if (m.tasks) {
    m.tasks.forEach(t => {
      const k = t.status === '상시' ? '정기' : t.status;
      if (!groups[k]) groups[k] = [];
      groups[k].push(t);
      if (t.status === '진행중') stats.active++;
      else if (t.status === '보류') stats.hold++;
      else if (t.status === '예정') stats.planned++;
      else stats.routine++;
    });
  }

  const statsEl = document.getElementById('tpStats');
  if (m.tasks) {
    statsEl.innerHTML = `
      ${stats.active   ? `<span class="st active">진행중 ${stats.active}</span>` : ''}
      ${stats.planned  ? `<span class="st planned">예정 ${stats.planned}</span>` : ''}
      ${stats.hold     ? `<span class="st hold">잠정중단 ${stats.hold}</span>` : ''}
      ${stats.routine  ? `<span class="st routine">정기 ${stats.routine}</span>` : ''}
      ${stats.aux      ? `<span class="st active">상시 ${stats.aux}</span>` : ''}
    `;
  } else {
    statsEl.innerHTML = '';
  }

  const body = document.getElementById('tpBody');
  if (!m.tasks) {
    body.innerHTML = `
      <div class="tp-empty">
        <div class="ic">◇</div>
        업무 인터뷰 대기 중<br>
        <span style="font-size: 12.6px; color:var(--text-3); letter-spacing:0.1em;">박상준 차장에게 전달 필요</span>
      </div>`;
  } else {
    let html = '';
    const order = [
      { key:'진행중', cls:'s-active',  label:'진행중' },
      { key:'예정',   cls:'s-routine', label:'예정' },
      { key:'보류',   cls:'s-hold',    label:'잠정중단' },
      { key:'정기',   cls:'s-routine', label:'정기' },
      { key:'상시',   cls:'s-active',  label:'상시' }
    ];
    // 알려진 status 외 그룹(예: 슬림·1차가공, 강화유리·가공조립 등)은 끝에 자동 추가
    const known = new Set(order.map(o => o.key));
    Object.keys(groups).forEach(k => {
      if (!known.has(k) && groups[k].length) order.push({ key: k, cls: 's-routine', label: k });
    });
    order.forEach(({key, cls, label}) => {
      if (groups[key] && groups[key].length) {
        html += `<div class="task-group ${cls}"><h4>${label} <span class="cnt">${groups[key].length}</span></h4>`;
        const prioRank = { h: 0, m: 1, l: 2 };
        const sorted = [...groups[key]].sort((a, b) => (prioRank[a.prio || 'l'] - prioRank[b.prio || 'l']));
        sorted.forEach(t => {
          const prio = t.prio || 'l';
          const prioLabel = prio === 'h' ? '상' : prio === 'm' ? '중' : '하';
          html += `<div class="task-item">
            <span class="tdot"></span>
            <span class="tname">${t.name}${t.detail ? ` <b>${t.detail}</b>` : ''}</span>
            <span class="prio ${prio}">${prioLabel}</span>
          </div>`;
        });
        html += `</div>`;
      }
    });
    body.innerHTML = html;
  }
  // 신규 프로젝트 패널 자동 닫음 (겹침 방지)
  const pp = document.getElementById('projPanel');
  if (pp) pp.classList.remove('show');
  taskPanel.classList.add('show');
}

// ============ EVENTS ============
document.getElementById('taskClose').addEventListener('click', () => taskPanel.classList.remove('show'));

const stageEl = document.getElementById('stage');
let isDragging = false, dragStart = null;

stageEl.addEventListener('mousedown', (e) => {
  if (e.button !== 0) return;
  if (e.target.closest('.task-panel') || e.target.closest('.controls') || e.target.closest('.topbar') || e.target.closest('.legend')) return;
  dragStart = { camX, camY, x: e.clientX, y: e.clientY };
});

window.addEventListener('mousemove', (e) => {
  if (!dragStart) return;
  const dx = e.clientX - dragStart.x, dy = e.clientY - dragStart.y;
  if (!isDragging && Math.hypot(dx, dy) > 5) { isDragging = true; stageEl.classList.add('dragging'); }
  if (isDragging) { camX = dragStart.camX + dx; camY = dragStart.camY + dy; applyCam(); }
});

window.addEventListener('mouseup', () => {
  if (isDragging) { recentlyDragged = true; setTimeout(() => recentlyDragged = false, 60); stageEl.classList.remove('dragging'); }
  isDragging = false; dragStart = null;
});

// Touch 지원 (모바일)
stageEl.addEventListener('touchstart', (e) => {
  if (e.target.closest('.task-panel') || e.target.closest('.controls') || e.target.closest('.topbar') || e.target.closest('.legend')) return;
  if (e.touches.length === 1) {
    dragStart = { camX, camY, x: e.touches[0].clientX, y: e.touches[0].clientY };
  }
}, { passive: true });
stageEl.addEventListener('touchmove', (e) => {
  if (!dragStart || e.touches.length !== 1) return;
  const dx = e.touches[0].clientX - dragStart.x, dy = e.touches[0].clientY - dragStart.y;
  if (!isDragging && Math.hypot(dx, dy) > 5) { isDragging = true; stageEl.classList.add('dragging'); }
  if (isDragging) { camX = dragStart.camX + dx; camY = dragStart.camY + dy; applyCam(); e.preventDefault(); }
}, { passive: false });
stageEl.addEventListener('touchend', () => {
  if (isDragging) { recentlyDragged = true; setTimeout(() => recentlyDragged = false, 60); stageEl.classList.remove('dragging'); }
  isDragging = false; dragStart = null;
});
// 휠 확대/축소 (마우스 포인터 기준)
stageEl.addEventListener('wheel', (e) => {
  // 패널 안에서는 스테이지 줌 막고 패널 스크롤 유지
  if (e.target.closest('.expanded') || e.target.closest('.task-panel') || e.target.closest('.proj-panel')) return;
  e.preventDefault();
  const factor = e.deltaY > 0 ? 0.9 : 1.1;
  const ns = Math.max(0.3, Math.min(3.5, camS * factor));
  const mx = e.clientX, my = e.clientY;
  const wx = (mx - camX) / camS, wy = (my - camY) / camS;
  camS = ns; camX = mx - wx * camS; camY = my - wy * camS;
  world.style.transition = 'none'; applyCam();
  requestAnimationFrame(() => world.style.transition = '');
}, { passive: false });

stageEl.addEventListener('click', (e) => {
  if (recentlyDragged) { e.stopPropagation(); return; }
  // 패널·툴바·칩바·확장 영역 안 클릭이면 닫지 않음
  if (e.target.closest('.node') || e.target.closest('.expanded') || e.target.closest('.task-panel') || e.target.closest('.proj-panel') || e.target.closest('.proj-toggle') || e.target.closest('.chip-bar') || e.target.closest('.controls') || e.target.closest('.topbar')) return;
  closeAll();
}, true);
document.getElementById('today').textContent = new Date().toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' }).toUpperCase();
function init() {
  fitView(); drawAllWires();
  setTimeout(() => { drawAllWires(); fitView(); }, 200);
  setTimeout(() => { drawAllWires(); fitView(); }, 600);
}
if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init); else init();

// ===== 편집 모드: 노드 드래그 + 위치 저장 (다음 세션에서 재구현 예정) =====
// 임시 비활성화 — editToggle 버튼이 첫 <script> 바깥에 있어 null 에러 발생했음
// 다음 세션: 토글 버튼 DOM 위치를 <script> 앞으로 이동 + DOMContentLoaded 안에서 바인딩

// 사용자 정리 디폴트 레이아웃 (localStorage 없는 신규 방문자에게 적용)
const DEFAULT_LAYOUT = {
  dev:        { x: 1953.20, y:  211.97 },
  erp:        { x: 1955.27, y:   73.72 },
  'self-mall':{ x: 2168.60, y:   72.65 },
  nas:        { x: 2111.76, y:  161.34 },
  product:    { x: 1955.17, y: 1197.86 },
  coupang:    { x: 2170.00, y:  530.63 },
  '11st':     { x: 2166.07, y:  702.26 },
  auction:    { x: 2166.07, y:  871.92 },
  gmarket:    { x: 2166.07, y: 1035.68 },
  playauto:   { x:  943.66, y:  385.90 },
  ecount:     { x:  945.16, y:  531.39 },
  call:       { x:  943.66, y:   81.97 },
  chat:       { x: 1094.58, y:   81.97 },
  prtUv:      { x: 1815.33, y: 1313.76 },
  prtExt:     { x: 1932.66, y: 1409.77 },
  prtHp:      { x: 2053.54, y: 1326.59 },
  prtEpson:   { x: 2131.16, y: 1228.03 },
  godo:       { x: 2168.03, y:  368.25 }
};
function applyDefaultLayout() {
  Object.keys(DEFAULT_LAYOUT).forEach(id => {
    const r = POS[id]; if (!r) return;
    r.x = DEFAULT_LAYOUT[id].x;
    r.y = DEFAULT_LAYOUT[id].y;
    r.el.style.left = r.x + 'px';
    r.el.style.top  = r.y + 'px';
  });
}
applyDefaultLayout();

function loadPositions() {
  try {
    const saved = JSON.parse(localStorage.getItem('hanasm.positions') || '{}');
    Object.keys(saved).forEach(id => {
      if (POS[id]) {
        POS[id].x = saved[id].x;
        POS[id].y = saved[id].y;
        POS[id].el.style.left = saved[id].x + 'px';
        POS[id].el.style.top  = saved[id].y + 'px';
      }
    });
    drawAllWires();
  } catch(e) {}
}
loadPositions();

window.addEventListener('resize', () => { fitView(); drawAllWires(); });
</script>

  all.forEach(e => {

function focusZoomTo(deptIds) {
  const pts = deptIds.map(id => POS[id]).filter(Boolean);
  if (!pts.length) return;
  const vw = window.innerWidth, vh = window.innerHeight;
  const isPanelOpen = document.getElementById('projPanel').classList.contains('show');
  const rightPanelW = isPanelOpen ? 490 : 0;
  const availW = Math.max(400, vw - rightPanelW - 80);
  const availH = vh - 180;
  const NW = 160, NH = 110;
  const xs = pts.map(p => p.x);
  const ys = pts.map(p => p.y);
  const minX = Math.min.apply(null, xs) - NW/2, maxX = Math.max.apply(null, xs) + NW/2;
  const minY = Math.min.apply(null, ys) - NH/2, maxY = Math.max.apply(null, ys) + NH/2;
  const bboxW = maxX - minX, bboxH = maxY - minY;
  let zoom = Math.min(availW / bboxW, availH / bboxH);
  zoom = Math.min(zoom, 1.25);
  zoom = Math.max(zoom, 0.45);
  const cx = (minX + maxX) / 2, cy = (minY + maxY) / 2;
  camS = zoom;
  camX = (vw - rightPanelW) / 2 - cx * camS;
  camY = vh / 2 - cy * camS;
  applyCam();
}
function focusProjectRelation(ownerDept, related=[], opts={}) {
  // 직접/유관 시각 분리: prelit-owner(파랑), prelit-rel(그레이 점선), 나머지 dim
  // opts.skipZoom = true 면 카메라 이동 없이 강조만 (hover 미리보기용)
  document.querySelectorAll('.node.prelit, .node.prelit-owner, .node.prelit-rel').forEach(n => {
    n.classList.remove('prelit','prelit-owner','prelit-rel');
  });
  document.querySelectorAll('svg.wires path.preview-wire, svg.wires path.preview-wire-rel').forEach(p => {
    p.classList.remove('preview-wire','preview-wire-rel');
  });
  if (!ownerDept && (!related || related.length === 0)) {
    document.body.classList.remove('proj-focus');
    if (!opts.skipZoom) fitView();  // focus 해제 시 전체 보기로 복원
    return;
  }
  document.body.classList.add('proj-focus');
  // 좌측 영역에 owner+related fit (hover에서는 생략)
  if (!opts.skipZoom) focusZoomTo([ownerDept, ...(related || [])].filter(Boolean));
  // 직접(주관)
  if (ownerDept && POS[ownerDept]) POS[ownerDept].el.classList.add('prelit-owner');
  // 유관
  (related || []).forEach(id => { if (POS[id]) POS[id].el.classList.add('prelit-rel'); });
  // 와이어: owner ↔ related 는 preview-wire(파랑), related ↔ related 는 preview-wire-rel(점선 회색)
  const rels = (related || []).filter(Boolean);
  if (ownerDept) {
    rels.forEach(r => {
      document.querySelectorAll(`svg.wires path[data-from="${ownerDept}"][data-to="${r}"], svg.wires path[data-from="${r}"][data-to="${ownerDept}"]`)
        .forEach(p => p.classList.add('preview-wire'));
    });
  }
  rels.forEach(a => rels.forEach(b => {
    if (a === b) return;
    document.querySelectorAll(`svg.wires path[data-from="${a}"][data-to="${b}"], svg.wires path[data-from="${b}"][data-to="${a}"]`)
      .forEach(p => p.classList.add('preview-wire-rel'));
  }));
}

// 부서 노드 확대 시 그 부서가 주관·유관인 PROJECTS 항목 표시
function renderDeptProjects(deptId) {
  const r = POS[deptId]; if (!r) return;
  const exp = r.el.querySelector('.expanded'); if (!exp) return;

  // 좌측 컬럼 한번만 wrap (이미 있으면 재사용)
  let leftCol = exp.querySelector('.left-col-wrap');
  if (!leftCol) {
    leftCol = document.createElement('div');
    leftCol.className = 'left-col-wrap';
    // expanded의 모든 직계 자식 (dept-projects-section 제외) 이동
    const movables = [...exp.children].filter(c => !c.classList.contains('dept-projects-section'));
    movables.forEach(c => leftCol.appendChild(c));
    exp.insertBefore(leftCol, exp.firstChild);
  }

  // 기존 dept-projects-section 제거
  const oldSec = exp.querySelector('.dept-projects-section');
  if (oldSec) oldSec.remove();

  const items = [];
  PCATS.forEach(cat => {
    getAllItems(cat).forEach(it => {
      const eff = getEffective(cat, it);
      if (eff.ownerDept === deptId || (eff.related && eff.related.includes(deptId))) {
        items.push({ cat, item: it });
      }
    });
  });
  if (!items.length) return;
  // 매출등급 우선 정렬 (주관 → 유관, 같은 그룹 안에서 직접 → 전환 → CS → 운영 → 장기)
  items.sort((a, b) => {
    const aOwn = getEffective(a.cat, a.item).ownerDept === deptId ? 1 : 0;
    const bOwn = getEffective(b.cat, b.item).ownerDept === deptId ? 1 : 0;
    if (aOwn !== bOwn) return bOwn - aOwn;  // 주관 먼저
    const ra = REV_RANK[a.item.revTier || 'E'];
    const rb = REV_RANK[b.item.revTier || 'E'];
    if (ra !== rb) return rb - ra;  // 매출등급 높은 순
    const pa = PRIO_RANK[a.item.prio || 'l'];
    const pb = PRIO_RANK[b.item.prio || 'l'];
    if (pa !== pb) return pb - pa;
    return (b.item.progress || 0) - (a.item.progress || 0);
  });
  const sec = document.createElement('div');
  sec.className = 'dept-projects-section';
  const lbl = document.createElement('div');
  lbl.className = 'label';
  lbl.textContent = '신규 프로젝트 · ' + items.length;
  sec.appendChild(lbl);
  // ⓐ 이 부서의 매출 영향 분포 요약 (주관+유관 합산, 주관 별도 표시)
  const _revCnt = {A:0,B:0,C:0,D:0,E:0};
  const _ownerCnt = {A:0,B:0,C:0,D:0,E:0};
  items.forEach(e => {
    const t = e.item.revTier || 'E';
    _revCnt[t]++;
    if (getEffective(e.cat, e.item).ownerDept === deptId) _ownerCnt[t]++;
  });
  const _SHORT = { A:'직접', B:'전환', C:'CS', D:'운영', E:'장기' };
  const _FULL  = { A:'직접매출', B:'전환개선', C:'CS전환', D:'운영', E:'장기기반' };
  const sumDiv = document.createElement('div');
  sumDiv.className = 'dpc-rev-summary';
  let sumHtml = '<span class="drs-label">매출 영향</span>';
  ['A','B','C','D','E'].forEach(t => {
    if (_revCnt[t] > 0) {
      const ownerNote = _ownerCnt[t] ? ' (주관 ' + _ownerCnt[t] + ')' : '';
      sumHtml += '<span class="drs-pill drs-pill-' + t + '" title="' + _FULL[t] + ' 총 ' + _revCnt[t] + '건' + ownerNote + '">' + _SHORT[t] + ' ' + _revCnt[t] + '</span>';
    }
  });
  sumDiv.innerHTML = sumHtml;
  sec.appendChild(sumDiv);
  // 주관/유관 카운트 — 헤더에 사용
  const _ownerTotal = items.filter(e => getEffective(e.cat, e.item).ownerDept === deptId).length;
  const _relTotal = items.length - _ownerTotal;
  let _prevIsOwner = null;
  let _zebraIdx = 0;  // 카드 zebra 인덱스 (그룹 바뀌면 reset)
  items.forEach(({ cat, item }) => {
    const _isOwnerCard = getEffective(cat, item).ownerDept === deptId;
    if (_prevIsOwner !== _isOwnerCard) {
      const _h = document.createElement('div');
      _h.className = 'dpc-group-head ' + (_isOwnerCard ? 'dpc-group-owner' : 'dpc-group-related');
      const _cnt = _isOwnerCard ? _ownerTotal : _relTotal;
      _h.innerHTML = '<span class="dgh-role">' + (_isOwnerCard ? '주관' : '유관') + '</span>'
                   + '<span class="dgh-cnt">' + _cnt + '건</span>'
                   + '<span class="dgh-sort">매출 영향도 순</span>';
      sec.appendChild(_h);
      _prevIsOwner = _isOwnerCard;
      _zebraIdx = 0;  // 새 그룹 시작 시 zebra reset
    }
    const k = cat + '::' + item.name;
    const ovr = (DECISIONS[k] || {});
    const dec = ovr.decision || item.decision || 'go';
    const action = getAction(cat, item);
    const efDp = getEffective(cat, item);
    const isOwner = efDp.ownerDept === deptId;
    // 매출등급 (한국어 표시, 알파벳은 코드 키)
    const DPC_REV_LABELS = { A:'직접매출', B:'전환개선', C:'CS전환', D:'운영', E:'장기기반' };
    const dpcTier = item.revTier || 'E';
    const dpcTierLabel = DPC_REV_LABELS[dpcTier] || '장기기반';
    const card = document.createElement('div');
    const zebraCls = (_zebraIdx % 2 === 0) ? 'zebra-a' : 'zebra-b';
    _zebraIdx++;
    card.className = 'dept-proj-card dec-' + dec + ' ' + action.cls + (isOwner ? ' is-owner' : ' is-related') + ' rev-' + dpcTier + ' ' + zebraCls;
    card.dataset.rev = dpcTier;
    const descBlock = item.desc ? '<div class="dpc-desc">' + formatDesc(item.desc) + '</div>' : '';
    card.innerHTML =
      '<div class="dpc-h"><span class="dpc-role">' + (isOwner ? '주관' : '유관') + '</span>'
      + '<span class="dpc-cat ' + cat + '">' + PROJECTS[cat].name + '</span>'
      + '<span class="dpc-rev dpc-rev-' + dpcTier + '" title="매출 영향도: ' + dpcTierLabel + '">' + dpcTierLabel + '</span>'
      + '</div>'
      + '<div class="dpc-name">' + item.name + '</div>'
      + '<div class="dpc-foot">'
      +   '<span class="pi-action ' + action.cls + '" data-action-key="' + k + '">' + action.label + '</span>'
      +   (item.startWhen ? '<span class="dpc-when">📅 ' + item.startWhen + '</span>' : '')
      +   '<span class="dpc-prog">' + (item.progress || 0) + '%</span>'
      + '</div>'
      + descBlock;
    // 카드 클릭 시 desc 펼침/접기
    card.addEventListener('click', (e) => {
      e.stopPropagation();
      // 부서 확대 상태에서는 카드 클릭 시 카메라/와이어 강조 안 함 (사용자 요청)
      // 단순 펼침/접기만
      card.classList.toggle('open');
    });
    sec.appendChild(card);
  });
  exp.appendChild(sec);

  // 초기 콘텐츠 높이 측정 - viewport 기준 cap 적용 (위 잘림 방지)
  requestAnimationFrame(() => {
    const h = sec.offsetHeight;
    if (h > 0) {
      const vh = window.innerHeight;
      const capped = Math.min(h, vh * 0.68);  // 화면 68% 넘으면 cap → 스크롤
      sec.style.height = capped + 'px';
      sec.style.maxHeight = capped + 'px';
    }
  });
}

// ===== GitHub 다중 PC 동기화 =====
const SYNC_REPO_OWNER = 'sangjunepark-beep';
const SYNC_REPO_NAME = 'hanasm-wire-map';
const SYNC_FILE_PATH = 'data/user-state.json';
const SYNC_RAW_URL = `https://raw.githubusercontent.com/${SYNC_REPO_OWNER}/${SYNC_REPO_NAME}/main/${SYNC_FILE_PATH}`;
const SYNC_API_URL = `https://api.github.com/repos/${SYNC_REPO_OWNER}/${SYNC_REPO_NAME}/contents/${SYNC_FILE_PATH}`;
let LAST_SYNC_SHA = '';
function getStoredPAT() { try { return localStorage.getItem('hanasm.gh.pat') || ''; } catch(e){ return ''; } }
function setStoredPAT(v) { try { localStorage.setItem('hanasm.gh.pat', v || ''); } catch(e){} }
function flashSyncBtn(cls, ms) {
  const b = document.getElementById('ppSync'); if (!b) return;
  b.classList.remove('ok','err','syncing');
  if (cls) b.classList.add(cls);
  if (ms) setTimeout(() => b.classList.remove('ok','err'), ms);
}
async function syncFetchFromGitHub(silent) {
  try {
    const url = SYNC_RAW_URL + '?t=' + Date.now();
    const r = await fetch(url, { cache: 'no-store' });
    if (!r.ok) throw new Error('fetch ' + r.status);
    const data = await r.json();
    // 서버 데이터로 localStorage 덮어쓰기
    if (data.userProjects) { USER_PROJECTS = data.userProjects; persistUserProjects(); }
    if (data.overrides) { PROJECT_OVERRIDES = data.overrides; localStorage.setItem('hanasm.projectOverrides.v3', JSON.stringify(PROJECT_OVERRIDES)); }
    if (data.actions) { PROJECT_STATE = data.actions; localStorage.setItem('hanasm.projectState.v3', JSON.stringify(PROJECT_STATE)); }
    if (data.decisions) { DECISIONS = data.decisions; localStorage.setItem('hanasm.decisions', JSON.stringify(DECISIONS)); }
    if (typeof renderProjects === 'function') renderProjects();
    if (!silent) flashSyncBtn('ok', 1500);
    return true;
  } catch (e) {
    if (!silent) flashSyncBtn('err', 2500);
    console.warn('sync fetch fail:', e);
    return false;
  }
}
async function syncPushToGitHub() {
  let pat = getStoredPAT();
  if (!pat) {
    pat = prompt('GitHub Personal Access Token (PAT) 입력\n(repo 권한 필요, 본 PC 브라우저에만 저장됨)');
    if (!pat) return;
    setStoredPAT(pat.trim());
    pat = pat.trim();
  }
  flashSyncBtn('syncing');
  // 1) 현재 파일 SHA 가져오기
  let sha = '';
  try {
    const r = await fetch(SYNC_API_URL, { headers: { 'Authorization': 'token ' + pat, 'Accept': 'application/vnd.github+json' } });
    if (r.ok) { const j = await r.json(); sha = j.sha; }
  } catch(e) {}
  // 2) PUT
  const body = {
    version: 1,
    updatedAt: new Date().toISOString(),
    updatedBy: 'web',
    userProjects: USER_PROJECTS || {},
    overrides: PROJECT_OVERRIDES || {},
    actions: PROJECT_STATE || {},
    decisions: (typeof DECISIONS !== 'undefined' ? DECISIONS : {})
  };
  const contentB64 = btoa(unescape(encodeURIComponent(JSON.stringify(body, null, 2))));
  const payload = {
    message: 'sync user-state ' + new Date().toLocaleString('ko-KR'),
    content: contentB64,
    branch: 'main'
  };
  if (sha) payload.sha = sha;
  try {
    const r = await fetch(SYNC_API_URL, {
      method: 'PUT',
      headers: { 'Authorization': 'token ' + pat, 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    if (!r.ok) throw new Error('push ' + r.status);
    flashSyncBtn('ok', 2000);
  } catch (e) {
    flashSyncBtn('err', 3000);
    if (String(e).includes('401') || String(e).includes('403')) {
      if (confirm('인증 실패. PAT를 다시 입력하시겠습니까?')) { setStoredPAT(''); syncPushToGitHub(); }
    } else {
      alert('GitHub 저장 실패: ' + e.message);
    }
  }
}
// 동기화 버튼: 클릭=push, Shift+클릭=PAT 재설정, Ctrl/Cmd+클릭=fetch
window.addEventListener('DOMContentLoaded', () => {
  const btn = document.getElementById('ppSync');
  if (btn) btn.addEventListener('click', (e) => {
    if (e.shiftKey) { setStoredPAT(''); alert('저장된 PAT 삭제. 다음 동기화 시 다시 입력하세요.'); return; }
    if (e.ctrlKey || e.metaKey) { syncFetchFromGitHub(false); return; }
    syncPushToGitHub();
  });
});

(function(){
  const chipBar = document.getElementById('chipBar');
  if (!chipBar) return;
  const STATE_KEY = 'hanasm.catFilter';
  function getOff() {
    try { return new Set(JSON.parse(localStorage.getItem(STATE_KEY) || '[]')); }
    catch(e) { return new Set(); }
  }
  function saveOff(set) { localStorage.setItem(STATE_KEY, JSON.stringify([...set])); }
  // 노드 → 카테고리 매핑 (한 노드는 한 카테고리)
  const NODE_CAT = {
    ceo: 'core', hanasm: 'core', personal: 'core', corp: 'core',
    web: 'dept', cs: 'dept', design: 'dept', dev: 'dept', fin: 'dept', sales: 'dept', factory2: 'dept', product: 'dept',
    erp: 'system', playauto: 'system', ecount: 'system', nas: 'system',
    call: 'talk', chat: 'talk',
    ig: 'sns', nblog: 'sns', yt: 'sns',
    prtEpson: 'system', prtHp: 'system', prtExt: 'system', prtUv: 'system',
    'ss-hana': 'channel', 'ss-baron': 'channel', 'ss-rocket': 'channel',
    godo: 'channel', 'self-mall': 'channel', coupang: 'channel', '11st': 'channel', auction: 'channel', gmarket: 'channel'
  };

  function applyFilter() {
    const off = getOff();
    document.querySelectorAll('#chipBar .chip').forEach(c => {
      c.classList.toggle('off', off.has(c.dataset.cat));
    });
    // 와이어
    document.querySelectorAll('svg.wires path[data-cat]').forEach(p => {
      const c = p.dataset.cat;
      const hidden = off.has(c) || (c === 'ch-web' && off.has('channel'));
      p.classList.toggle('cat-off', hidden);
    });
    // 노드
    document.querySelectorAll('.node').forEach(n => {
      const cat = NODE_CAT[n.dataset.id];
      const hidden = cat && off.has(cat);
      n.classList.toggle('cat-off', !!hidden);
    });

  chipBar.querySelectorAll('.chip').forEach(c => {
    c.addEventListener('click', () => {
      const set = getOff();
      const cat = c.dataset.cat;
      if (set.has(cat)) set.delete(cat); else set.add(cat);

      applyFilter();

})();

// ===== 편집 모드: 노드 드래그 + 위치 저장 + Undo (최대 10) =====
(function(){
  const editBtn = document.getElementById('editToggle');
  const undoBtn = document.getElementById('undoBtn');
  const undoCnt = document.getElementById('undoCnt');
  if (!editBtn) return;
  const worldEl = document.getElementById('world');
  let editMode = false;
  let nodeDrag = null;
  const UNDO_MAX = 10;
  const undoStack = [];

  function refreshUndoUi() {
    if (undoCnt) undoCnt.textContent = undoStack.length;
    if (undoBtn) {
      undoBtn.style.opacity = undoStack.length ? '1' : '0.45';
      undoBtn.style.pointerEvents = undoStack.length ? 'auto' : 'none';
    }
  }
  function setEditMode(on) {
    editMode = on;
    document.body.classList.toggle('edit-mode', on);
    editBtn.classList.toggle('active', on);
    editBtn.textContent = on ? '✓ 편집 종료' : '✎ 편집';
    if (undoBtn) undoBtn.style.display = on ? '' : 'none';
    refreshUndoUi();
  }
  editBtn.addEventListener('click', () => setEditMode(!editMode));

  function pushUndo(entry) {
    undoStack.push(entry);
    while (undoStack.length > UNDO_MAX) undoStack.shift();
    refreshUndoUi();
  }
  function doUndo() {
    if (!undoStack.length) return;
    const last = undoStack.pop();
    const r = POS[last.id];
    if (r) {
      r.x = last.x; r.y = last.y;
      r.el.style.left = r.x + 'px';
      r.el.style.top  = r.y + 'px';
      try {
        const saved = JSON.parse(localStorage.getItem('hanasm.positions') || '{}');
        saved[last.id] = { x: last.x, y: last.y };
        localStorage.setItem('hanasm.positions', JSON.stringify(saved));
      } catch(err) {}
      if (typeof drawAllWires === 'function') drawAllWires();
    }
    refreshUndoUi();
  }
  if (undoBtn) undoBtn.addEventListener('click', (e) => { e.stopPropagation(); doUndo(); });
  window.addEventListener('keydown', (e) => {
    if (!editMode) return;
    if ((e.ctrlKey || e.metaKey) && (e.key === 'z' || e.key === 'Z')) {
      e.preventDefault();
      doUndo();
    }
  });

  worldEl.addEventListener('mousedown', (e) => {
    if (!editMode) return;
    const nodeEl = e.target.closest('.node');
    if (!nodeEl) return;
    const id = nodeEl.dataset.id;
    if (!id || !POS[id]) return;
    e.stopPropagation();
    e.preventDefault();
    nodeDrag = {
      id,
      sx: e.clientX, sy: e.clientY,
      ox: POS[id].x, oy: POS[id].y,
      moved: false
    };
    nodeEl.style.zIndex = 999;
  }, true);

  window.addEventListener('mousemove', (e) => {
    if (!nodeDrag) return;
    const dx = (e.clientX - nodeDrag.sx) / camS;
    const dy = (e.clientY - nodeDrag.sy) / camS;
    if (!nodeDrag.moved && Math.hypot(dx, dy) > 1) nodeDrag.moved = true;
    const r = POS[nodeDrag.id];
    r.x = nodeDrag.ox + dx;
    r.y = nodeDrag.oy + dy;
    r.el.style.left = r.x + 'px';
    r.el.style.top  = r.y + 'px';
    if (typeof drawAllWires === 'function') drawAllWires();
  });

  window.addEventListener('mouseup', () => {
    if (!nodeDrag) return;
    if (nodeDrag.moved) {
      pushUndo({ id: nodeDrag.id, x: nodeDrag.ox, y: nodeDrag.oy });
      try {
        const saved = JSON.parse(localStorage.getItem('hanasm.positions') || '{}');
        saved[nodeDrag.id] = { x: POS[nodeDrag.id].x, y: POS[nodeDrag.id].y };
        localStorage.setItem('hanasm.positions', JSON.stringify(saved));
      } catch(err) {}
    }
    POS[nodeDrag.id].el.style.zIndex = '';
    nodeDrag = null;
  });
})();

</script>

</body>
</html>
