<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<title>HANASM · 와이어 맵 v3</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --purple-1: #c084fc; --purple-2: #a855f7; --purple-3: #7c3aed;
  --blue-1: #93c5fd;   --blue-2: #60a5fa;   --blue-3: #3b82f6;
  --cyan: #22d3ee; --pink: #f472b6; --amber: #fbbf24;
  --green: #34d399; --orange: #fb923c; --red: #f87171;
  --bg-0: #050614; --bg-1: #08091c; --bg-2: #0d0f24;
  --line: rgba(167,139,250,0.22);
  --line-2: rgba(96,165,250,0.26);
  --text-1: #f3f4fb; --text-2: #c5c9e0; --text-3: #8a8fad;
}
html, body {
  height: 100vh; width: 100vw; overflow: hidden;
  background: var(--bg-0);
  font-family: "JetBrains Mono", "Inter", "Pretendard", "Noto Sans KR", monospace, system-ui;
  color: var(--text-1);
  -webkit-font-smoothing: antialiased;
  letter-spacing: 0.01em;
  font-weight: 500;
}
body {
  background:
    radial-gradient(ellipse at 25% 30%, rgba(167,139,250,0.08), transparent 60%),
    radial-gradient(ellipse at 75% 70%, rgba(96,165,250,0.07), transparent 60%),
    radial-gradient(circle at 50% 50%, rgba(34,211,238,0.025), transparent 55%),
    linear-gradient(180deg, #050614 0%, #07091b 50%, #050614 100%);
}
/* grid bg removed for perf */

/* TOP BAR */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  padding: 16px 24px;
  display: flex; justify-content: space-between; align-items: center;
  pointer-events: none;
}
.title { display: flex; gap: 12px; align-items: center; pointer-events: auto; }
.brand-logo {
  height: 16px; width: auto; object-fit: contain;
  filter: drop-shadow(0 0 6px rgba(167,139,250,0.5)) brightness(1.15);
}
.title h1 {
  font-size: 17.7px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.18em;
  background: linear-gradient(90deg, var(--purple-1), var(--blue-1));
  -webkit-background-clip: text; background-clip: text; color: transparent;
}
.title .ver {
  font-size: 12.6px; padding: 3px 8px;
  background: rgba(167,139,250,0.15); color: var(--purple-1);
  border: 1px solid rgba(167,139,250,0.4);
  font-weight: 700; letter-spacing: 0.1em;
  clip-path: polygon(6px 0, 100% 0, 100% calc(100% - 6px), calc(100% - 6px) 100%, 0 100%, 0 6px);
}
.title .date { font-size: 13.9px; color: var(--text-3); letter-spacing: 0.05em; }
.title .v3-link {
  pointer-events: auto;
  font-size: 13.9px; font-weight: 800;
  letter-spacing: 0.10em;
  color: #fbbf24; text-decoration: none;
  padding: 6px 12px;
  background: rgba(251,191,36,0.10);
  border: 1px solid rgba(251,191,36,0.45);
  margin-left: 14px;
  clip-path: polygon(4px 0, 100% 0, 100% calc(100% - 4px), calc(100% - 4px) 100%, 0 100%, 0 4px);
  transition: background 0.15s ease, color 0.15s ease;
}
.title .v3-link:hover { background: rgba(251,191,36,0.25); color: #fff; box-shadow: 0 0 8px rgba(251,191,36,0.30); }
.hint {
  display: none;
  font-size: 13.3px; color: var(--text-2); font-weight: 500;
  background: rgba(8,9,28,0.78);
  padding: 8px 14px;
  border: 1px solid var(--line);
  pointer-events: auto;
  /* backdrop-filter removed for perf */
  letter-spacing: 0.06em; text-transform: uppercase;
  clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);
}

/* LEGEND / CONTROLS */
.legend, .controls {
  position: fixed; bottom: 18px; z-index: 100;
  background: rgba(8,9,28,0.78);
  border: 1px solid var(--line);
  padding: 12px 14px;
  font-size: 13.9px;
  /* backdrop-filter removed for perf */
  clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
}
.legend { left: 18px; }
.controls { right: 18px; display: flex; gap: 8px; align-items: center; padding: 8px 12px; }
.legend .row { display: flex; align-items: center; gap: 10px; margin: 5px 0; color: var(--text-2); font-weight: 500; letter-spacing: 0.04em; }
.legend .legend-divider { height: 1px; background: var(--line); margin: 7px 0 5px; }
.legend .legend-rev-head { font-size: 12px; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-3); margin-bottom: 2px; }
.legend .sw {
  width: 10px; height: 10px;
  background: var(--c, var(--text-3));
  box-shadow: 0 0 8px var(--c, var(--text-3));
  clip-path: polygon(3px 0, 100% 0, 100% calc(100% - 3px), calc(100% - 3px) 100%, 0 100%, 0 3px);
}
.controls button {
  background: transparent; border: 1px solid var(--line-2);
  color: var(--blue-1);
  padding: 6px 14px; font-size: 13.3px;
  font-family: inherit; cursor: pointer; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  transition: all 0.18s ease;
  clip-path: polygon(6px 0, 100% 0, 100% calc(100% - 6px), calc(100% - 6px) 100%, 0 100%, 0 6px);
}
.controls button:hover {
  background: rgba(96,165,250,0.12); color: var(--text-1);
  border-color: var(--blue-2);
  box-shadow: 0 0 16px rgba(96,165,250,0.4);
}

/* STAGE */
.stage {
  position: fixed; inset: 0; z-index: 2; overflow: hidden;
  cursor: grab;
}
.stage.dragging { cursor: grabbing; }
.stage.dragging .world { transition: none !important; }
.world {
  position: absolute; left: 0; top: 0;
  width: 2400px; height: 1400px;
  transform-origin: 0 0;
  transition: transform 0.5s cubic-bezier(.2,.7,.15,1);
}

/* WIRES */
svg.wires {
  position: absolute; left: 0; top: 0;
  width: 2400px; height: 1400px;
  pointer-events: none; overflow: visible;
}
svg.wires path {
  fill: none; stroke-linecap: round; stroke-linejoin: round;
  opacity: 0.85;
  stroke-width: 2;
  transition: opacity 0.2s;
}
svg.wires path.flow {
  stroke-dasharray: 6 8;
  animation: flow 2.5s linear infinite;
}
@keyframes flow { to { stroke-dashoffset: -28; } }
/* 와이어 hover detection용 invisible path */
svg.wires path.wire-hit { pointer-events: stroke; }
/* 와이어 hover 시 시각 강조 */
svg.wires path.wire-hover {
  opacity: 1 !important;
  stroke-width: 2.6 !important;
  filter: drop-shadow(0 0 7px currentColor);
}
/* 와이어 hover tooltip */
.wire-tooltip {
  position: fixed;
  background: rgba(5,6,20,0.96);
  border: 1px solid rgba(34,211,238,0.50);
  color: #f3f4fb;
  font-size: 15.2px;
  padding: 9px 13px;
  z-index: 250;
  pointer-events: none;
  max-width: 340px;
  line-height: 1.55;
  display: none;
  font-family: inherit;
  clip-path: polygon(6px 0, 100% 0, 100% calc(100% - 6px), calc(100% - 6px) 100%, 0 100%, 0 6px);
}
.wire-tooltip.show { display: block; }
.wire-tooltip .wt-pair {
  font-size: 12.6px; font-weight: 800;
  color: #67e8f9;
  letter-spacing: 0.10em;
  margin-bottom: 5px;
  text-transform: uppercase;
}
.wire-tooltip .wt-rel { color: #f3f4fb; }

/* NODES */
.node {
  position: absolute; cursor: pointer;
  transform: translate(-50%,-50%);
  z-index: 10; user-select: none;
}
.node .frame {
  position: relative; padding: 1.5px;
  background: linear-gradient(135deg, var(--c1, var(--blue-2)), var(--c2, var(--purple-2)));
  clip-path: polygon(12px 0%, 100% 0%, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0% 100%, 0% 12px);
  box-shadow: 0 0 12px var(--c1, var(--blue-2));
  transition: box-shadow 0.2s ease;
}
.node .core {
  display: flex; align-items: center; gap: 12px;
  background: linear-gradient(180deg, rgba(68,72,118,0.96), rgba(48,52,92,0.97));
  padding: 14px 22px;
  font-size: 18.9px; font-weight: 700;
  color: var(--text-1);
  white-space: nowrap;
  letter-spacing: 0.02em;
  clip-path: polygon(11px 0%, 100% 0%, 100% calc(100% - 11px), calc(100% - 11px) 100%, 0% 100%, 0% 11px);
  position: relative;
}

/* 1차 클릭 = 빛 */
.node.lit .frame {
  box-shadow: 0 0 14px var(--c1, var(--blue-2));
}
.node.lit { transform: translate(-50%,-50%) scale(1.04); transition: transform 0.2s ease; }
.world.has-focus svg.wires path.focus-wire {
  opacity: 1 !important;
  stroke-width: 3 !important;
}

/* 2차 클릭 = 정면 시점 (노드 frame만 3D, 패널은 평면 유지) */
.node.zoomed {
  transform: translate(-50%,-50%) scale(1.0) !important;
  z-index: 200 !important;
  transition: transform 0.55s cubic-bezier(.2,.7,.15,1);
}
.node.zoomed .frame {
  transform: perspective(700px) rotateX(8deg);
  transform-origin: center bottom;
  transition: transform 0.55s cubic-bezier(.2,.7,.15,1);
  box-shadow:
    0 0 16px var(--c1, var(--blue-2)),
    0 0 28px var(--c2, var(--purple-2)),
    0 15px 30px rgba(0,0,0,0.55);
}
/* 패널은 회전 X (글씨 정상) */
.node.zoomed .expanded {
  transform: translateY(-50%) !important;
}
.world.has-focus .node:not(.lit):not(.zoomed) {
  opacity: 0.18 !important;
  transition: opacity 0.35s ease;
}
.world.has-focus .node.lit {
  opacity: 1;
}

.node:hover { z-index: 50; }
.node:hover .frame { box-shadow: 0 0 12px var(--c1, var(--blue-2)); }
.node.prelit .frame { box-shadow: 0 0 10px var(--c1, var(--blue-2)); }
/* 프로젝트 카드 클릭 시 직접/유관 시각 분리 */
.node.prelit-owner .frame {
  outline: 3px solid #60a5fa; outline-offset: 3px;
  box-shadow: 0 0 24px #60a5fa, 0 0 8px #60a5fa inset;
}
.node.prelit-rel .frame {
  outline: 2px dashed #cbd5e1; outline-offset: 3px;
  box-shadow: 0 0 14px rgba(203,213,225,0.7);
}
.node.prelit-rel { opacity: 0.92; }
body.proj-focus .node:not(.prelit-owner):not(.prelit-rel) { opacity: 0.14; transition: opacity 0.18s; }
body.proj-focus .node.prelit-owner,
body.proj-focus .node.prelit-rel { opacity: 1; transition: opacity 0.18s; }
/* 노드 위 라벨 배지 (::before) */
.node.prelit-owner::before,
.node.prelit-rel::before {
  position: absolute;
  top: -28px; left: 50%;
  transform: translateX(-50%);
  padding: 3px 12px;
  font-size: 13.3px; font-weight: 800;
  letter-spacing: 0.10em;
  white-space: nowrap;
  z-index: 200; pointer-events: none;
  clip-path: polygon(4px 0, 100% 0, 100% calc(100% - 4px), calc(100% - 4px) 100%, 0 100%, 0 4px);
  animation: badgePop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.node.prelit-owner::before {
  content: '주관';
  background: #60a5fa; color: #fff;
  box-shadow: 0 4px 12px rgba(96,165,250,0.55);
}
.node.prelit-rel::before {
  content: '유관';
  background: #cbd5e1; color: #0f172a;
  box-shadow: 0 4px 10px rgba(203,213,225,0.45);
}
/* 노드 뒷면 펄스 하이라이트 (::after) */
.node.prelit-owner::after,
.node.prelit-rel::after {
  content: '';
  position: absolute; inset: -16px;
  z-index: -1; pointer-events: none;
  border-radius: 6px;
  clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);
}
.node.prelit-owner::after {
  background: radial-gradient(ellipse at center, rgba(96,165,250,0.45) 0%, rgba(96,165,250,0) 70%);
  animation: ownerPulse 1.3s ease-in-out infinite;
}
.node.prelit-rel::after {
  background: radial-gradient(ellipse at center, rgba(203,213,225,0.35) 0%, rgba(203,213,225,0) 70%);
  animation: relPulse 1.6s ease-in-out infinite;
}
@keyframes badgePop {
  0%   { transform: translateX(-50%) translateY(6px) scale(0.7); opacity: 0; }
  60%  { transform: translateX(-50%) translateY(-3px) scale(1.08); opacity: 1; }
  100% { transform: translateX(-50%) translateY(0) scale(1); opacity: 1; }
}
@keyframes ownerPulse {
  0%, 100% { transform: scale(1);    opacity: 0.55; }
  50%      { transform: scale(1.22); opacity: 1; }
}
@keyframes relPulse {
  0%, 100% { transform: scale(1);    opacity: 0.40; }
  50%      { transform: scale(1.15); opacity: 0.75; }
}
svg.wires path.preview-wire {
  opacity: 1 !important;
  stroke: #60a5fa !important;
  stroke-width: 3.4 !important;
  filter: drop-shadow(0 0 6px #60a5fa);
}
svg.wires path.preview-wire-rel {
  opacity: 0.7 !important;
  stroke: #cbd5e1 !important;
  stroke-width: 2.0 !important;
  stroke-dasharray: 5 4 !important;
  animation: wireDash 1.2s linear infinite;
}
@keyframes wireDash {
  to { stroke-dashoffset: -18; }
}
body.proj-focus svg.wires path:not(.preview-wire):not(.preview-wire-rel) { opacity: 0.06; transition: opacity 0.18s; }

.dot {
  width: 8px; height: 8px; flex-shrink: 0;
  background: var(--c, var(--text-3));
  box-shadow: 0 0 10px var(--c, var(--text-3));
  clip-path: polygon(2px 0, 100% 0, 100% calc(100% - 2px), calc(100% - 2px) 100%, 0 100%, 0 2px);
}

.node .sub {
  font-size: 13.9px; color: var(--text-3); font-weight: 600;
  margin-top: 7px; text-align: center;
  letter-spacing: 0.12em; text-transform: uppercase;
}

/* === Expanded (줌인 시 옆에 떠오르는 패널) === */
.expanded {
  display: none;
  position: absolute;
  left: calc(100% + 14px); top: 50%;
  transform: translateY(-50%);
  min-width: 200px; max-width: 240px;
  background: rgba(8,9,28,0.92);
  border: 1px solid var(--c1, var(--purple-2));
  padding: 14px 16px;
  /* perf */
  box-shadow: 0 18px 50px rgba(0,0,0,0.6), 0 0 24px color-mix(in srgb, var(--c1, #a855f7) 30%, transparent);
  clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
  animation: expandFly 0.45s cubic-bezier(.2,.8,.2,1);
  z-index: 5;
}
@keyframes expandFly {
  from { opacity: 0; transform: translateY(-50%) translateX(-30px) scale(0.9); }
  to   { opacity: 1; transform: translateY(-50%) translateX(0) scale(1); }
}
.node.zoomed .expanded { display: block; }
/* 부서 zoomed 시 2컬럼 분할 (좌: 멤버/기본, 우: 신규 프로젝트) */
.node.zoomed.dept .expanded {
  max-width: 620px !important;
  width: 620px !important;
  display: flex;
  align-items: flex-start;
  gap: 14px;
  max-height: 78vh;
  height: auto;
  overflow: visible;
  padding: 14px;
}
.node.zoomed.dept .expanded > .left-col-wrap {
  width: 270px; flex-shrink: 0;
  max-height: calc(78vh - 28px);
  overflow-y: auto;
}
.node.zoomed.dept .expanded > .dept-projects-section {
  flex: 1; min-width: 0;
  margin-top: 0;
  padding-top: 0;
  border-top: none;
  border-left: 1px dashed rgba(96,165,250,0.32);
  padding-left: 14px; padding-right: 6px;
  max-height: calc(68vh - 28px);
  overflow-y: auto;
  scrollbar-color: #60a5fa rgba(96,165,250,0.10);
  scrollbar-width: thin;
}
.node.zoomed.dept .expanded > .dept-projects-section::-webkit-scrollbar { width: 10px; }
.node.zoomed.dept .expanded > .dept-projects-section::-webkit-scrollbar-track { background: rgba(96,165,250,0.08); border-radius: 0; }
.node.zoomed.dept .expanded > .dept-projects-section::-webkit-scrollbar-thumb { background: #60a5fa; border-radius: 0; border: 1px solid rgba(255,255,255,0.10); }
.node.zoomed.dept .expanded > .dept-projects-section::-webkit-scrollbar-thumb:hover { background: #93c5fd; }
.node.zoomed.dept .expanded .member-grid { max-height: 36vh; overflow-y: auto; padding-right: 4px; }
.node.zoomed.dept .expanded .member-grid::-webkit-scrollbar { width: 6px; }
.node.zoomed.dept .expanded .member-grid::-webkit-scrollbar-thumb { background: rgba(167,139,250,0.30); border-radius: 3px; }
/* 모바일 - 1열로 (스크롤만) */
@media (max-width: 768px) {
  .node.zoomed.dept .expanded {
    width: 92vw !important; max-width: 92vw !important;
    flex-direction: column;
    max-height: 80vh;
  }
  .node.zoomed.dept .expanded > .left-col-wrap { width: 100%; }
  .node.zoomed.dept .expanded > .dept-projects-section {
    border-left: none;
    border-top: 1px dashed rgba(167,139,250,0.30);
    padding-left: 0; padding-top: 12px;
    margin-top: 8px;
  }
}
.expanded .label {
  font-size: 12px; color: var(--text-3);
  letter-spacing: 0.18em; text-transform: uppercase;
  font-weight: 700; margin-bottom: 8px;
}
.expanded .desc {
  font-size: 14.5px; color: var(--text-2);
  line-height: 1.55; letter-spacing: 0.02em;
  margin-bottom: 10px;
}
.desc-section {
  font-size: 12.6px; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase;
  color: #93c5fd;
  margin-top: 10px; padding: 6px 0 4px;
  border-top: 1px dashed rgba(167,139,250,0.30);
}
.desc-section:first-child { border-top: none; margin-top: 0; padding-top: 0; }
.desc-line { padding: 2px 0 2px 8px; position: relative; }
.desc-line::before {
  content: '·'; position: absolute; left: 0; top: 2px; color: rgba(167,139,250,0.5); font-weight: 700;
}
.member-grid { display: flex; flex-direction: column; gap: 5px; }
.member-chip {
  display: flex; align-items: center; justify-content: space-between;
  gap: 8px; padding: 6px 10px;
  background: rgba(167,139,250,0.06);
  border: 1px solid var(--line);
  font-size: 13.9px; color: var(--text-1); font-weight: 600;
  cursor: pointer;
  transition: all 0.18s;
  letter-spacing: 0.02em;
  clip-path: polygon(5px 0, 100% 0, 100% calc(100% - 5px), calc(100% - 5px) 100%, 0 100%, 0 5px);
}
.member-chip:hover {
  background: rgba(167,139,250,0.16);
  border-color: var(--purple-2);
  box-shadow: 0 0 12px rgba(167,139,250,0.3);
}
.member-chip .mname { display: flex; align-items: center; gap: 6px; }
.member-chip .role-tag { font-size: 11.4px; color: var(--text-3); font-weight: 600; }
.member-chip .badge {
  font-size: 11.4px; padding: 2px 7px;
  font-weight: 700; letter-spacing: 0.05em;
  text-transform: uppercase;
  clip-path: polygon(3px 0, 100% 0, 100% calc(100% - 3px), calc(100% - 3px) 100%, 0 100%, 0 3px);
}
.member-chip .badge.has  { background: rgba(34,211,238,0.18); color: var(--cyan); }
.member-chip .badge.none { background: rgba(138,143,173,0.16); color: var(--text-3); }

/* 진행중 / 예정 mini 카드 (zoomed 노드 옆에 뜸) */
.pl-item {
  display: flex; align-items: center; gap: 7px;
  padding: 5px 8px;
  background: rgba(167,139,250,0.05);
  border-left: 2px solid var(--pl-c, var(--text-3));
  font-size: 13.3px; color: var(--text-2);
  margin: 3px 0;
  letter-spacing: 0.015em;
}
.pl-item .pl-dot {
  width: 6px; height: 6px; flex-shrink: 0;
  background: var(--pl-c, var(--text-3));
  box-shadow: 0 0 5px var(--pl-c, var(--text-3));
}
.pl-item .pl-name { flex: 1; line-height: 1.3; }
.pl-item .pl-by { font-size: 11.4px; color: var(--text-3); font-weight: 600; }
.pl-item.active   { --pl-c: #34d399; }
.pl-item.planned  { --pl-c: #93c5fd; }
.ad-item {
  display: flex; align-items: center; gap: 7px;
  padding: 5px 9px;
  background: rgba(251,191,36,0.08);
  border-left: 2px solid #fbbf24;
  font-size: 13.3px; color: var(--text-2);
  margin: 3px 0; letter-spacing: 0.015em;
}
.ad-item::before { content:"●"; color:#fbbf24; font-size: 10.1px; }
.ad-item.future::before { color:#94a3b8; }
.ad-item.future { border-left-color:#94a3b8; background:rgba(148,163,184,0.06); }
.ad-item.naver   { border-left-color:#03C75A; background:rgba(3,199,90,0.10); }
.ad-badge {
  position: absolute;
  top: -28px;
  left: 50%;
  transform: translateX(-50%);
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 2px 8px;
  background: transparent;
  border: none;
  border-radius: 0;
  font-size: 13.9px;
  color: #cbd5e1;
  white-space: nowrap;
  letter-spacing: 0.02em;
  pointer-events: none;
  z-index: 3;
}
.ad-badge .ab-lbl { font-weight: 600; color: #e2e8f0; }
.ad-badge svg { display: block; flex-shrink: 0; }
.ad-badge .ab-lbl { font-weight: 700; color: #f1f5f9; }
.node.zoomed .ad-badge { display: none; }
.ad-item.naver::before { color:#03C75A; }
.ad-item.adboost { border-left-color:#FF6B00; background:rgba(255,107,0,0.10); }
.ad-item.adboost::before { color:#FF6B00; }
.ad-item.google  { border-left-color:#4285F4; background:rgba(66,133,244,0.08); }
.ad-item.google::before {
  content:""; width:8px; height:8px; border-radius:50%;
  background: conic-gradient(#4285F4 0deg 90deg, #EA4335 90deg 180deg, #FBBC05 180deg 270deg, #34A853 270deg 360deg);
}
.ad-item.coupang { border-left-color:#ED1C24; background:rgba(237,28,36,0.10); }
.ad-item.coupang::before { color:#ED1C24; }
.ad-item.esm     { border-left-color:#00ACE6; background:rgba(0,172,230,0.10); }
.ad-item.esm::before { color:#00ACE6; }
.ad-item.none    { border-left-color:#64748b; background:rgba(100,116,139,0.06); opacity:0.6; }
.ad-item.none::before { color:#64748b; content:"○"; }
.ch-item {
  display: flex; align-items: center; gap: 7px;
  padding: 5px 9px;
  background: rgba(244,114,182,0.08);
  border-left: 2px solid #f472b6;
  font-size: 13.3px; color: var(--text-2);
  margin: 3px 0; letter-spacing: 0.015em;
}
.ch-item::before { content:"●"; color:#f472b6; font-size: 10.1px; }

/* === Variants === */
.node.ceo .frame { --c1: var(--cyan); --c2: var(--purple-1); }
.node.ceo .core  { font-size: 22.8px; padding: 18px 28px; }
.node.hanasm .frame { --c1: #c084fc; --c2: #60a5fa; padding: 2px; }
.node.hanasm .core { font-size: 21.5px; padding: 16px 26px; letter-spacing: 0.05em; }

.node.biz-personal .frame { --c1: var(--blue-2); --c2: var(--cyan); }
.node.biz-personal .core  { font-size: 20.2px; padding: 15px 24px; }

.node.biz-corp .frame { --c1: var(--purple-2); --c2: var(--pink); }
.node.biz-corp .core  { font-size: 20.2px; padding: 15px 24px; }

.node.ch-personal .frame { --c1: var(--blue-1); --c2: var(--blue-3); }
.node.ch-corp .frame     { --c1: var(--purple-1); --c2: var(--purple-3); }
.node.ch-personal .core, .node.ch-corp .core { min-width: 210px; justify-content: flex-start; }

.node.dept .frame { --c1: var(--dc, var(--blue-2)); --c2: var(--dc2, var(--purple-2)); }
.node.dept .core  { font-size: 17.7px; padding: 13px 20px; }

.node.erp .frame {
  --c1: var(--cyan); --c2: var(--blue-2); padding: 2px;
  filter:
    drop-shadow(0 0 18px var(--cyan))
    drop-shadow(0 0 32px var(--blue-2))
    drop-shadow(0 0 48px var(--cyan));
}
.node.erp .core { font-size: 21.5px; padding: 16px 26px; letter-spacing: 0.06em; }

/* System nodes (Playauto, Ecount, Claude, GPT) */
.node.sys .core { font-size: 17px; padding: 12px 18px; }
.node.sys-playauto .frame { --c1: #fb923c; --c2: #f97316; }
.node.sys-ecount   .frame { --c1: #34d399; --c2: #22d3ee; }
.node.sys-ig    .frame { --c1: #E1306C; --c2: #f472b6; }
.node.sys-nblog .frame { --c1: #03C75A; --c2: #34d399; }
.node.sys-yt    .frame { --c1: #FF0000; --c2: #f87171; }
.node.sys-call  .frame { --c1: #60a5fa; --c2: #34d399; }
.node.sys-chat  .frame { --c1: #f472b6; --c2: #a855f7; }
.node.sys-nas   .frame { --c1: #22d3ee; --c2: #3b82f6; }
.node.sys-claude20 .frame { --c1: #d97706; --c2: #f97316; }
.node.sys-claude5  .frame { --c1: #a855f7; --c2: #d97706; }
.node.sys-gpt      .frame { --c1: #10b981; --c2: #22d3ee; }

/* === Dim non-focus === */
.world.has-focus .node:not(.lit):not(.zoomed) { filter: saturate(0.15) brightness(0.32); }
.world.has-focus svg.wires path:not(.focus-wire) { opacity: 0.015; }
.world.has-focus svg.wires path.focus-wire { opacity: 0.92; stroke-width: 2.4 !important; filter: drop-shadow(0 0 2px currentColor); }
.world.has-focus svg.wires .dev-region { opacity: 0.15; }

/* === Task Panel === */
.task-panel {
  position: fixed; top: 70px; left: 18px; bottom: 80px;
  width: 380px;
  background: rgba(8,9,28,0.94);
  border: 1px solid #3b82f6;
  padding: 0;
  z-index: 220;
  box-shadow: 10px 0 40px rgba(0,0,0,0.55), 0 0 30px rgba(59,130,246,0.22);
  display: flex; flex-direction: column;
  transform: translateX(-420px); opacity: 0;
  transition: all 0.4s cubic-bezier(.2,.7,.2,1);
  pointer-events: none;
  clip-path: polygon(0 16px, 16px 0, 100% 0, 100% 100%, 16px 100%, 0 calc(100% - 16px));
}
.task-panel.show { transform: translateX(0); opacity: 1; pointer-events: auto; }
.task-panel .tp-head { padding: 18px 20px 14px; border-bottom: 1px solid var(--line); }
.task-panel .tp-head .tp-name {
  font-size: 18.9px; font-weight: 800; letter-spacing: 0.04em;
  background: linear-gradient(90deg, #60a5fa, #22d3ee);
  -webkit-background-clip: text; background-clip: text; color: transparent;
  margin-bottom: 3px;
}
.task-panel .tp-head .tp-role {
  font-size: 12.6px; color: var(--text-3);
  letter-spacing: 0.15em; text-transform: uppercase; font-weight: 600;
}
.task-panel .tp-stats { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
.task-panel .tp-stats .st {
  font-size: 12px; padding: 3px 8px;
  font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase;
  clip-path: polygon(3px 0, 100% 0, 100% calc(100% - 3px), calc(100% - 3px) 100%, 0 100%, 0 3px);
}
.task-panel .tp-stats .st.active  { background: rgba(52,211,153,0.18); color: var(--green); }
.task-panel .tp-stats .st.routine { background: rgba(167,139,250,0.18); color: var(--purple-1); }
.task-panel .tp-stats .st.hold    { background: rgba(251,146,60,0.20); color: var(--orange); }
.task-panel .tp-stats .st.planned { background: rgba(138,143,173,0.20); color: var(--text-3); }

.task-panel .tp-body { flex: 1; overflow-y: auto; padding: 14px 20px 20px; }
.task-panel .tp-body::-webkit-scrollbar { width: 4px; }
.task-panel .tp-body::-webkit-scrollbar-thumb { background: var(--line-2); }
.task-panel .tp-empty {
  text-align: center; padding: 40px 20px;
  color: var(--text-3); font-size: 15.2px;
  line-height: 1.7; letter-spacing: 0.02em;
}
.task-panel .tp-empty .ic { font-size: 32.9px; margin-bottom: 12px; color: var(--purple-1); letter-spacing: 0.2em; }
.task-group { margin-bottom: 14px; }
.task-group h4 {
  font-size: 12.6px; color: var(--text-3); font-weight: 700;
  letter-spacing: 0.18em; text-transform: uppercase;
  padding: 6px 0; margin-bottom: 6px;
  border-bottom: 1px dashed var(--line);
  display: flex; justify-content: space-between; align-items: center;
}
.task-group h4 .cnt {
  font-size: 12.6px; padding: 1px 7px;
  background: rgba(255,255,255,0.05); color: var(--text-2);
  clip-path: polygon(3px 0, 100% 0, 100% calc(100% - 3px), calc(100% - 3px) 100%, 0 100%, 0 3px);
}
.task-item {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 6px 0;
  font-size: 13.9px; color: var(--text-2);
  line-height: 1.5; letter-spacing: 0.015em;
}
.task-item .tdot {
  width: 6px; height: 6px; margin-top: 5px;
  background: var(--st-c, var(--text-3));
  flex-shrink: 0;
  clip-path: polygon(2px 0, 100% 0, 100% calc(100% - 2px), calc(100% - 2px) 100%, 0 100%, 0 2px);
  box-shadow: 0 0 6px var(--st-c, var(--text-3));
}
.task-item .tname { flex: 1; }
.task-item .tname b { color: var(--text-3); font-weight: 600; font-size: 12.6px; margin-left: 6px; }
.task-item .prio {
  font-size: 11.4px; padding: 1px 5px;
  font-weight: 800; letter-spacing: 0.05em;
  flex-shrink: 0; margin-top: 3px;
  clip-path: polygon(2px 0, 100% 0, 100% calc(100% - 2px), calc(100% - 2px) 100%, 0 100%, 0 2px);
}
.task-item .prio.h { background: rgba(248,113,113,0.20); color: var(--red); }
.task-item .prio.m { background: rgba(251,191,36,0.20); color: var(--amber); }
.task-item .prio.l { background: rgba(138,143,173,0.20); color: var(--text-3); }

.task-group.s-active  .tdot, .task-group.s-active  h4 { --st-c: var(--green); color: var(--green); }
.task-group.s-routine .tdot, .task-group.s-routine h4 { --st-c: var(--purple-1); color: var(--purple-1); }
.task-group.s-hold    .tdot, .task-group.s-hold    h4 { --st-c: var(--orange); color: var(--orange); }
.task-group.s-planned .tdot, .task-group.s-planned h4 { --st-c: var(--blue-1); color: var(--blue-1); }

.task-panel .close-x {
  position: absolute; top: 14px; right: 16px;
  cursor: pointer; color: var(--text-3);
  font-size: 17.7px; padding: 4px;
}
.task-panel .close-x:hover { color: var(--text-1); }

/* === Mobile === */
@media (max-width: 768px) {
  .node .core { font-size: 15.2px; padding: 9px 14px; gap: 8px; }
  .node .sub { font-size: 11.4px; margin-top: 4px; }
  .node.ceo .core { font-size: 16.5px; padding: 11px 16px; }
  .node.biz-personal .core, .node.biz-corp .core { font-size: 15.8px; padding: 10px 16px; }
  .node.dept .core { font-size: 13.9px; padding: 9px 14px; }
  .node.erp .core { font-size: 15.8px; padding: 10px 16px; }
  .node.sys .core { font-size: 14.5px; padding: 9px 14px; }
  .topbar { padding: 8px 12px; }
  .title .date { display: none; }
  .hint { display: none; }
  .legend { font-size: 12px; padding: 8px 10px; bottom: 12px; left: 12px; }
  .legend .row { margin: 3px 0; gap: 7px; }
  .controls { padding: 6px 10px; bottom: 12px; right: 12px; }
  .controls button { padding: 5px 10px; font-size: 12px; }
  .in-progress {
    min-width: auto; max-width: calc(100vw - 24px); width: calc(100vw - 24px);
    padding: 8px 14px; bottom: 60px;
  }
  .in-progress .ip-title { font-size: 11.4px; margin-bottom: 5px; }
  .in-progress .ip-item { font-size: 13.3px; padding: 2px 0; }
  .task-panel { top: 50px; right: 8px; bottom: 60px; width: calc(100vw - 16px); }
  .members { max-width: 200px; }
  .members span { font-size: 11.4px; padding: 1px 6px; }
}

/* IN-PROGRESS BAR (하단 가운데) */
.in-progress {
  position: fixed; bottom: 18px; left: 50%;
  transform: translateX(-50%);
  z-index: 100;
  background: rgba(8,9,28,0.85);
  border: 1.5px solid rgba(251,146,60,0.5);
  padding: 12px 22px;
  min-width: 380px; max-width: 720px;
  /* backdrop-filter removed for perf */
  box-shadow: 0 0 24px rgba(251,146,60,0.20);
  clip-path: polygon(12px 0, 100% 0, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0 100%, 0 12px);
}
.in-progress .ip-title {
  font-size: 12.6px; font-weight: 800; color: var(--orange);
  letter-spacing: 0.22em; text-transform: uppercase;
  margin-bottom: 8px;
  display: flex; align-items: center; gap: 8px;
}
.in-progress .ip-title::before {
  content: ""; width: 8px; height: 8px;
  background: var(--orange); border-radius: 50%;
  box-shadow: 0 0 10px var(--orange);
  animation: ipPulse 1.5s ease-in-out infinite;
}
@keyframes ipPulse {
  0%,100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.7); }
}
.in-progress .ip-item {
  font-size: 15.2px; padding: 4px 0;
  display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
}
.in-progress .ip-num {
  font-size: 12px; font-weight: 800; color: var(--orange);
  background: rgba(251,146,60,0.15);
  padding: 2px 7px; letter-spacing: 0.05em;
  clip-path: polygon(3px 0, 100% 0, 100% calc(100% - 3px), calc(100% - 3px) 100%, 0 100%, 0 3px);
}
.in-progress .ip-name { color: var(--text-1); font-weight: 700; letter-spacing: 0.01em; }
.in-progress .ip-by {
  color: var(--text-3); font-size: 12.6px; font-weight: 600;
  letter-spacing: 0.06em; text-transform: uppercase;
}

/* === 신규 프로젝트 패널 === */
.proj-toggle {
  position: fixed; top: 16px; right: 16px; z-index: 110;
  background: rgba(8,9,28,0.8);
  border: 1px solid #a855f7;
  color: #c084fc;
  padding: 7px 12px; font-size: 12.5px;
  font-family: inherit; font-weight: 700; cursor: pointer;
  letter-spacing: 0.06em; white-space: nowrap;
  clip-path: polygon(6px 0, 100% 0, 100% calc(100% - 6px), calc(100% - 6px) 100%, 0 100%, 0 6px);
}
.proj-toggle:hover { background: rgba(167,139,250,0.18); color: #fff; }
/* ⑤ 회의 모드 토글 */
.meeting-toggle {
  position: fixed; top: 16px; right: 200px; z-index: 110;
  background: rgba(8,9,28,0.8);
  border: 1px solid rgba(167,139,250,0.40);
  color: #c084fc;
  padding: 7px 12px; font-size: 12.5px;
  font-family: inherit; font-weight: 700; cursor: pointer;
  letter-spacing: 0.06em; white-space: nowrap;
  clip-path: polygon(6px 0, 100% 0, 100% calc(100% - 6px), calc(100% - 6px) 100%, 0 100%, 0 6px);
}
.meeting-toggle:hover { background: rgba(167,139,250,0.18); color: #fff; }
body.meeting-mode .meeting-toggle {
  background: rgba(251,191,36,0.20);
  border-color: #fbbf24;
  color: #fbbf24;
  box-shadow: 0 0 14px rgba(251,191,36,0.45);
}
/* 회의 모드 — 보고용 UI 정리 (topbar, legend, controls, edit/undo 숨김. projToggle/meetingToggle 유지) */
body.meeting-mode .topbar,
body.meeting-mode .legend,
body.meeting-mode .controls,
body.meeting-mode #editToggle,
body.meeting-mode #undoBtn { display: none !important; }
body.meeting-mode { background: #000 !important; }
/* ⑦ 결정 로그 — 패널 헤더 버튼 + 모달 */
.pp-log {
  background: rgba(34,211,238,0.10);
  border: 1px solid rgba(34,211,238,0.40);
  color: #67e8f9;
  padding: 4px 9px; font-size: 13.3px; font-weight: 700;
  font-family: inherit; cursor: pointer; letter-spacing: 0.06em;
  display: inline-flex; align-items: center; gap: 5px;
  clip-path: polygon(3px 0, 100% 0, 100% calc(100% - 3px), calc(100% - 3px) 100%, 0 100%, 0 3px);
}
.pp-log:hover { background: rgba(34,211,238,0.22); color: #fff; }
.pp-log .lb-cnt {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 16px; padding: 0 5px;
  background: rgba(34,211,238,0.30); color: #fff;
  font-size: 12px; font-weight: 800;
  clip-path: polygon(2px 0, 100% 0, 100% calc(100% - 2px), calc(100% - 2px) 100%, 0 100%, 0 2px);
}
.log-modal { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.72); }
.log-modal.show { display: block; }
.log-modal-box {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  width: 560px; max-width: calc(100vw - 40px); max-height: 78vh;
  background: rgba(5,6,20,0.97);
  border: 1px solid rgba(34,211,238,0.35);
  display: flex; flex-direction: column;
  clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
}
.lm-head {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 18px;
  border-bottom: 1px solid rgba(34,211,238,0.18);
}
.lm-title { font-size: 16.5px; font-weight: 800; letter-spacing: 0.16em; color: #67e8f9; flex: 1; text-transform: uppercase; }
.lm-actions { display: flex; gap: 8px; align-items: center; }
.lm-actions button {
  background: rgba(34,211,238,0.10); border: 1px solid rgba(34,211,238,0.35);
  color: #67e8f9; font-family: inherit; cursor: pointer;
  padding: 5px 10px; font-size: 13.3px; font-weight: 800; letter-spacing: 0.06em;
  clip-path: polygon(3px 0, 100% 0, 100% calc(100% - 3px), calc(100% - 3px) 100%, 0 100%, 0 3px);
}
.lm-actions button:hover { background: rgba(34,211,238,0.22); color: #fff; }
.lm-x { cursor: pointer; font-size: 22.8px; color: #94a3b8; padding: 2px 6px; line-height: 1; }
.lm-x:hover { color: #fff; }
.lm-body { overflow-y: auto; padding: 12px 18px; flex: 1; }
.lm-row {
  padding: 9px 0;
  border-bottom: 1px dashed rgba(148,163,255,0.14);
  font-size: 15.2px; color: #c5c9e0; line-height: 1.5;
}
.lm-row:last-child { border-bottom: none; }
.lm-time {
  display: inline-block;
  color: #67e8f9; font-size: 12.6px; font-weight: 800; letter-spacing: 0.04em;
  margin-right: 8px;
}
.lm-name { color: #fff; font-weight: 800; font-size: 15.8px; }
.lm-catname { color: #8a8fad; font-size: 12.6px; font-weight: 700; margin-left: 6px; letter-spacing: 0.08em; text-transform: uppercase; }
.lm-before { color: #94a3b8; font-size: 13.9px; font-weight: 700; }
.lm-arrow { color: #fbbf24; padding: 0 5px; font-weight: 900; }
.lm-after { color: #fbbf24; font-size: 14.5px; font-weight: 800; }
.lm-empty { color: #6b7280; text-align: center; padding: 32px 16px; font-size: 15.2px; line-height: 1.7; }
/* ⑧ 카드 우클릭 컨텍스트 메뉴 */
.ctx-menu {
  display: none;
  position: fixed; z-index: 250;
  background: rgba(5,6,20,0.97);
  border: 1px solid rgba(167,139,250,0.40);
  min-width: 180px;
  clip-path: polygon(6px 0, 100% 0, 100% calc(100% - 6px), calc(100% - 6px) 100%, 0 100%, 0 6px);
  padding: 5px 0;
  box-shadow: 0 8px 28px rgba(0,0,0,0.72);
  font-family: inherit;
}
.ctx-menu.show { display: block; }
.ctx-head {
  padding: 6px 14px 9px;
  margin-bottom: 4px;
  border-bottom: 1px solid rgba(167,139,250,0.18);
  font-size: 13.9px; font-weight: 800; color: #c084fc;
  letter-spacing: 0.04em;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  max-width: 240px;
}
.ctx-item {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 14px;
  font-size: 14.5px; font-weight: 700;
  cursor: pointer;
  color: #c5c9e0;
  transition: background 0.10s ease;
}
.ctx-item:hover { background: rgba(167,139,250,0.20); color: #fff; }
.ctx-icon { width: 16px; text-align: center; opacity: 0.85; font-size: 15.2px; }
.ctx-divider { height: 1px; background: rgba(167,139,250,0.15); margin: 4px 0; }
.chip-bar {
  position: fixed; bottom: 132px; left: 18px; z-index: 105;
  display: flex; gap: 6px; flex-wrap: wrap; max-width: 60vw;
}
.chip {
  background: rgba(8,9,28,0.72); border: 1px solid var(--c, #a5b4fc); color: var(--c, #a5b4fc);
  padding: 5px 11px; font-size: 13.3px; font-weight: 700; letter-spacing: 0.10em;
  font-family: inherit; cursor: pointer; text-transform: uppercase;
  clip-path: polygon(5px 0, 100% 0, 100% calc(100% - 5px), calc(100% - 5px) 100%, 0 100%, 0 5px);
  transition: opacity 0.18s, background 0.18s;
}
.chip:hover { background: rgba(255,255,255,0.06); }
.chip.off { opacity: 0.30; }
.chip.off::before { content: '⊘ '; }
svg.wires path.cat-off { display: none !important; }
.node.cat-off { opacity: 0.08; pointer-events: none; filter: saturate(0.2) brightness(0.55); transition: opacity 0.2s, filter 0.2s; }
@keyframes nasBounceGlow {
  0%   { transform: translate(-50%, -50%) scale(1); }
  25%  { transform: translate(-50%, -56%) scale(1.05); }
  50%  { transform: translate(-50%, -50%) scale(1.02); }
  75%  { transform: translate(-50%, -53%) scale(1.04); }
  100% { transform: translate(-50%, -50%) scale(1); }
}
.node.bounce { animation: nasBounceGlow 0.7s cubic-bezier(.5,.2,.3,1.4); }
.node.bounce .frame { box-shadow: 0 0 18px var(--c1, var(--blue-2)) !important; transition: box-shadow 0.3s; }
.node.cat-off .frame { box-shadow: none !important; }
.dev-region {

/* 회의 메모 — 화면 하단 가로띠. textarea 자체가 가로띠. 박스 X, 토글 X, focus 시 자동 자라남 */
.memo-strip {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 100;
  height: 38px;
  background: rgba(8,9,28,0.85);

  overflow: hidden;
  font-family: inherit;
}
.memo-strip:focus-within {
  height: 95px;
  background: rgba(8,9,28,0.96);
  border-top-color: rgba(34,211,238,0.50);

}

  flex: 0 0 auto;
  font-size: 12px; font-weight: 700;
  color: #94a3b8; letter-spacing: 0.04em;
  white-space: nowrap;
  padding-top: 2px;

  flex: 1 1 auto;
  background: transparent;
  border: none; outline: none;
  color: #f3f4fb;
  font-family: inherit;
  font-size: 15.2px; line-height: 1.55;
  resize: none;
  padding: 0;

  transition: height 0.22s ease;

/* 매출등급 필터 + 정렬 토글 (대표 보고용) */

}

  font-family: inherit; cursor: pointer; padding: 5px 9px;
  background: rgba(8,9,28,0.62); border: 1px solid rgba(167,139,250,0.18);

.project-revfilter .rf-all.active   { color:#fff; border-color:#fff;        background: rgba(255,255,255,0.10); }
.project-revfilter .rf-A.active     { color:#fbbf24; border-color:#fbbf24;  background: rgba(251,191,36,0.18); box-shadow: 0 0 10px rgba(251,191,36,0.22); }
.project-revfilter .rf-B.active     { color:#34d399; border-color:#34d399;  background: rgba(52,211,153,0.18); }
.project-revfilter .rf-C.active     { color:#60a5fa; border-color:#60a5fa;  background: rgba(96,165,250,0.18); }
.project-revfilter .rf-D.active     { color:#c084fc; border-color:#c084fc;  background: rgba(192,132,252,0.18); }
.project-revfilter .rf-E.active     { color:#cbd5e1; border-color:#cbd5e1;  background: rgba(203,213,225,0.10); }
.project-revfilter .rf-sort {
  margin-left: auto;
  font-size: 12.6px; padding: 5px 10px;
  background: rgba(34,211,238,0.06);
  border: 1px solid rgba(34,211,238,0.25);
  color: #67e8f9;
}
.project-revfilter .rf-sort.active {
  background: rgba(34,211,238,0.18);
  border-color: #22d3ee;
  color: #fff;
  box-shadow: 0 0 8px rgba(34,211,238,0.22);
}
/* ③ 부서 노드 매출등급 미니바 */
.rev-mini-bar {
  display: flex; gap: 3px; justify-content: center; flex-wrap: wrap;
  margin-top: 5px; padding: 0 2px;
}
.node.dimmed .rev-mini-bar { opacity: 0.25; }
.rmb {
  font-size: 11.4px; font-weight: 800; letter-spacing: 0.04em;

  background: rgba(5,6,20,0.55);

.rmb-B { color:#34d399; border-color:rgba(52,211,153,0.55); background:rgba(52,211,153,0.10); }
.rmb-C { color:#60a5fa; border-color:rgba(96,165,250,0.55); background:rgba(96,165,250,0.10); }
.rmb-D { color:#c084fc; border-color:rgba(192,132,252,0.55); background:rgba(192,132,252,0.10); }
.rmb-E { color:#94a3b8; border-color:rgba(148,163,184,0.45); background:rgba(148,163,184,0.06); }
/* ⑥ 결정 상태 라인 (진행/보류/중단) — 미니바 아래 */
.dept-act-bar {
  display: flex; gap: 4px; justify-content: center; flex-wrap: wrap;
  margin-top: 4px; padding: 0 2px;
}
.node.dimmed .dept-act-bar { opacity: 0.25; }
.dab {
  font-size: 11.4px; font-weight: 800; letter-spacing: 0.04em;
  padding: 2px 6px;
  background: rgba(5,6,20,0.65);
  border: 1px solid;
  clip-path: polygon(2px 0, 100% 0, 100% calc(100% - 2px), calc(100% - 2px) 100%, 0 100%, 0 2px);
  line-height: 1.1;
  cursor: pointer; transition: transform 0.12s ease, filter 0.12s ease;
}
.dab:hover { transform: translateY(-1px) scale(1.06); filter: brightness(1.30); }
.dab-first { color:#fbbf24; border-color:rgba(251,191,36,0.65); background:rgba(251,191,36,0.14); box-shadow: 0 0 6px rgba(251,191,36,0.20); }
.dab-run   { color:#34d399; border-color:rgba(52,211,153,0.55); background:rgba(52,211,153,0.10); }
.dab-hold  { color:#fbbf24; border-color:rgba(251,191,36,0.50); background:rgba(251,191,36,0.08); }
.dab-stop  { color:#94a3b8; border-color:rgba(148,163,184,0.50); background:rgba(148,163,184,0.06); }
/* ② A등급 자동 투어 버튼 + 투어 중 카드 강조 */
.project-revfilter .rf-tour {
  font-size: 12.6px; padding: 5px 11px;
  background: rgba(251,191,36,0.10);
  border: 1px solid rgba(251,191,36,0.50);
  color: #fbbf24; font-weight: 900; letter-spacing: 0.08em;
}
.project-revfilter .rf-tour:hover {
  background: rgba(251,191,36,0.22);
  color: #fff;
}
.project-revfilter .rf-tour.on {
  background: #fbbf24; color: #050614;
  border-color: #fbbf24;
  animation: tour-pulse 1.2s ease-in-out infinite;
}
@keyframes tour-pulse {
  0%, 100% { box-shadow: 0 0 10px rgba(251,191,36,0.45); }
  50%      { box-shadow: 0 0 20px rgba(251,191,36,0.80); }
}
.proj-item.touring {
  outline: 2px solid #fbbf24;
  box-shadow: 0 0 24px rgba(251,191,36,0.50);
  background: rgba(251,191,36,0.08) !important;
  position: relative;
  z-index: 3;
}
/* "시연 중" 배지 제거 — outline + glow만으로 시각 표시 */
/* 카드 클릭으로 잠금된 상태 — 마우스 떠나도 와이어 맵 강조 유지 */
.proj-item.locked {
  outline: 2px solid #22d3ee;
  box-shadow: 0 0 16px rgba(34,211,238,0.40);
  position: relative;
  z-index: 2;
}
/* "선택됨" 배지 제거 — outline + glow만으로 시각 표시 (배지가 패널 위로 잘렸음) */

.dept-projects-section { margin-top: 10px; padding-top: 8px; border-top: 1px dashed rgba(96,165,250,0.30); }
/* 우측 신규 프로젝트 판단 보드(projPanel)가 열려있으면, 부서 expanded의 신규 프로젝트 섹션은 숨김 — 중복 방지, 보드 우선 */
body:has(.proj-panel.show) .node .dept-projects-section { display: none !important; }
.dept-projects-section .label { font-size: 12.6px; font-weight: 800; letter-spacing: 0.14em; color: #60a5fa; margin-bottom: 6px; position: sticky; top: 0; background: rgba(8,9,28,0.95); padding: 4px 0; z-index: 5; }
.dept-proj-card {

  border-left: 3px solid rgba(148,163,184,0.35);  /* 기본 회색 */

}
/* 지그재그 — 카드끼리 시각 분리 (한 줄씩 밝게/어둡게) */
.dept-proj-card.zebra-a { background: rgba(8,9,28,0.62); }
.dept-proj-card.zebra-b { background: rgba(28,32,58,0.55); }
/* 주관 = 시안 굵게, 유관 = 회색 얇게. dec-* 색은 무시 (정신없음 제거) */
.dept-proj-card.is-owner   { border-left: 4px solid #22d3ee; }
.dept-proj-card.is-related { border-left: 3px solid rgba(148,163,184,0.30); opacity: 0.92; }
.dept-proj-card.dec-go    { --dc: #22d3ee; }
.dept-proj-card.dec-hold  { --dc: #fbbf24; }
.dept-proj-card.dec-later { --dc: #94a3b8; }
.dept-proj-card .dpc-h { display: flex; gap: 7px; align-items: center; flex-wrap: wrap; margin-bottom: 4px; }
/* 부서 카드 매출등급 배지 — 톤 다운 (background 거의 없음, 텍스트 색만) */
.dpc-rev {
  font-size: 11.4px; font-weight: 700; letter-spacing: 0.06em;
  padding: 1px 6px;

  border: 1px solid rgba(255,255,255,0.08);

}
.dpc-rev-A { color:#fbbf24; }
.dpc-rev-B { color:#34d399; }
.dpc-rev-C { color:#60a5fa; }
.dpc-rev-D { color:#c084fc; }
.dpc-rev-E { color:#94a3b8; }
/* ⓐ 부서 expanded — 이 부서 매출 영향 분포 요약 */
.dpc-rev-summary {
  display: flex; flex-wrap: wrap; gap: 5px; align-items: center;
  padding: 7px 9px; margin-bottom: 8px;
  background: rgba(5,6,20,0.55);
  border: 1px solid rgba(167,139,250,0.18);
  clip-path: polygon(5px 0, 100% 0, 100% calc(100% - 5px), calc(100% - 5px) 100%, 0 100%, 0 5px);
}
.dpc-rev-summary .drs-label {
  font-size: 12px; font-weight: 800; letter-spacing: 0.12em;

}
.drs-pill {
  font-size: 12.6px; font-weight: 800; letter-spacing: 0.04em;
  padding: 2px 8px;
  background: rgba(0,0,0,0.30);
  border: 1px solid;
  clip-path: polygon(2px 0, 100% 0, 100% calc(100% - 2px), calc(100% - 2px) 100%, 0 100%, 0 2px);
}
.drs-pill-A { color:#fbbf24; border-color:rgba(251,191,36,0.65); background:rgba(251,191,36,0.16); }
.drs-pill-B { color:#34d399; border-color:rgba(52,211,153,0.55); background:rgba(52,211,153,0.10); }
.drs-pill-C { color:#60a5fa; border-color:rgba(96,165,250,0.55); background:rgba(96,165,250,0.10); }
.drs-pill-D { color:#c084fc; border-color:rgba(192,132,252,0.55); background:rgba(192,132,252,0.10); }
.drs-pill-E { color:#94a3b8; border-color:rgba(148,163,184,0.45); background:rgba(148,163,184,0.06); }
/* 부서 expanded — 주관/유관 그룹 헤더 (정렬 시각화) */
.dpc-group-head {
  display: flex; align-items: center; gap: 10px;
  margin: 12px 0 6px; padding: 5px 10px;
  font-size: 12.6px; font-weight: 800; letter-spacing: 0.16em; text-transform: uppercase;
  border-left: 3px solid;
  clip-path: polygon(3px 0, 100% 0, 100% calc(100% - 3px), calc(100% - 3px) 100%, 0 100%, 0 3px);
}
.dpc-group-head:first-of-type { margin-top: 4px; }
.dpc-group-owner {
  color: #22d3ee; border-left-color: #22d3ee;
  background: rgba(34,211,238,0.10);
}
.dpc-group-related {
  color: #94a3b8; border-left-color: rgba(148,163,184,0.5);
  background: rgba(148,163,184,0.05);

.dpc-group-head .dgh-role { font-weight: 900; }
.dpc-group-head .dgh-cnt  { font-size: 13.3px; font-weight: 700; opacity: 0.85; }

  margin-left: auto; font-size: 11.4px; font-weight: 700; opacity: 0.55;
  letter-spacing: 0.10em;
}

.dpc-role { display: none; }
.dpc-cat { font-size: 11.4px; font-weight: 700; color: #8a8fad; letter-spacing: 0.10em; text-transform: uppercase; }
.dpc-name { font-size: 13.9px; font-weight: 700; color: #f3f4fb; line-height: 1.25; margin-bottom: 3px; }
.dpc-foot { display: flex; gap: 8px; align-items: center; font-size: 12px; color: #c5c9e0; flex-wrap: wrap; }
.dpc-dec { font-weight: 700; }
.dpc-when { color: #c5c9e0; }
.dpc-prog { margin-left: auto; font-weight: 800; color: #c5c9e0; }
.dept-proj-card { cursor: pointer; transition: background 0.18s; }
.dept-proj-card:hover { background: rgba(8,9,28,0.78); }
.dpc-desc {
  display: none;
  margin-top: 8px; padding-top: 8px;
  border-top: 1px dashed rgba(167,139,250,0.22);
  font-size: 13.3px; color: #c5c9e0;
  line-height: 1.55; letter-spacing: 0.02em;

.dept-proj-card.open .dpc-desc { display: block; }
.dpc-name::after { content: ' ▾'; color: rgba(167,139,250,0.45); font-size: 11.4px; }
.dept-proj-card.open .dpc-name::after { content: ' ▴'; }
.proj-item { display: flex; flex-direction: column; gap: 6px; padding: 8px 10px; background: rgba(167,139,250,0.06); border: 1px solid rgba(167,139,250,0.18); border-left: 2px solid var(--cat-c, #a855f7); font-size: 14.5px; color: #f3f4fb; font-weight: 600; cursor: pointer; letter-spacing: 0.015em; clip-path: polygon(5px 0, 100% 0, 100% calc(100% - 5px), calc(100% - 5px) 100%, 0 100%, 0 5px); }
.proj-item .pi-row { display: flex; align-items: center; gap: 8px; min-width: 0; }
.proj-item .pi-row .pi-name { flex: 1 1 auto; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.proj-item .pi-row .pi-prio,
.proj-item .pi-row .pi-handle,
.proj-item .pi-row .pi-num { flex: 0 0 auto; }
.proj-item .pi-handle {
  cursor: grab; 
  display: inline-flex; align-items: center; justify-content: center;
  width: 26px; height: 26px;
  background: rgba(11,18,32,0.55); color: #93c5fd !important;
  font-size: 17.7px !important; font-weight: 900;
  border: 1px solid rgba(96,165,250,0.55);
  border-radius: 4px;
  transition: all 0.12s;
}
.proj-item .pi-handle:hover { background: #60a5fa; color: #0b1220 !important; transform: scale(1.05); }
.proj-item .pi-handle:active { cursor: grabbing; }
.proj-item .pi-desc { display: none; padding: 10px 10px 8px; font-size: 13.9px; color: #c5c9e0; font-weight: 500; line-height: 1.6; border-top: 1px dashed rgba(96,165,250,0.28); margin-top: 4px; white-space: normal; background: rgba(96,165,250,0.04); }
.proj-item .pi-desc br + br { content: ''; display: block; margin-top: 5px; }
.proj-item .pi-desc-label { display: inline-block; font-size: 12px; font-weight: 800; letter-spacing: 0.14em; color: #60a5fa; text-transform: uppercase; padding: 2px 8px; margin-bottom: 6px; background: rgba(96,165,250,0.12); border-left: 2px solid #60a5fa; clip-path: polygon(2px 0, 100% 0, 100% calc(100% - 2px), calc(100% - 2px) 100%, 0 100%, 0 2px); }
/* 상세내용 안 가격표 (MDF게시판 등) */

.pi-desc b { color: #f8fafc; font-weight: 800; letter-spacing: 0.02em; }
.proj-item.open .pi-desc { display: block; }
.proj-item .pi-owner { display: inline-block; font-size: 12px; font-weight: 800; letter-spacing: 0.10em; padding: 1px 6px; background: rgba(255,255,255,0.06); color: var(--cat-c, #c084fc); margin-right: 8px; vertical-align: 1px; clip-path: polygon(2px 0, 100% 0, 100% calc(100% - 2px), calc(100% - 2px) 100%, 0 100%, 0 2px); }
.proj-item:hover { background: rgba(167,139,250,0.14); }
.proj-item.sortable-ghost { opacity: 0.3; }
/* pi-handle 폰트 색상은 위 통합 정의 사용 */

.proj-item .pi-prio { font-size: 11.4px; padding: 1px 5px; font-weight: 800; clip-path: polygon(2px 0, 100% 0, 100% calc(100% - 2px), calc(100% - 2px) 100%, 0 100%, 0 2px); background: transparent !important; color: #94a3b8 !important; border: 1px solid rgba(148,163,184,0.35); }
.proj-item .pi-prio.h { background: rgba(248,113,113,0.20); color: #f87171; }
.proj-item .pi-prio.m { background: rgba(251,191,36,0.20); color: #fbbf24; }
.proj-item .pi-prio.l { background: rgba(148,163,184,0.20); color: #8a8fad; }
.cat.ad      { --cat-c: #fbbf24; }

/* ═══════════════════════════════════════════════════════════════
   BLUEPRINT DARK — 엔지니어링 도면 무드
   톤: 블랙 #050505 + 화이트 #ffffff (회색은 화이트 알파)
   ═══════════════════════════════════════════════════════════════ */

/* 1) 컬러·변수 재정의 */
:root {
  --bg-0: #050505 !important;
  --bg-1: #0a0a0a !important;
  --bg-2: #0f0f0f !important;
  --ink:  #ffffff !important;
  --ink-2: rgba(255,255,255,0.65) !important;
  --ink-3: rgba(255,255,255,0.38) !important;
  --ink-4: rgba(255,255,255,0.20) !important;
  --grid: rgba(255,255,255,0.04) !important;
  --line:   rgba(255,255,255,0.18) !important;
  --line-2: rgba(255,255,255,0.32) !important;
  --line-3: rgba(255,255,255,0.55) !important;
  --text-1: #ffffff !important;
  --text-2: rgba(255,255,255,0.65) !important;
  --text-3: rgba(255,255,255,0.38) !important;
  --purple-1: #fff; --purple-2: rgba(255,255,255,0.75); --purple-3: rgba(255,255,255,0.50);

/* 4) 사선 잘림(clip-path) 전면 제거 → 직각 박스 + 라운드 0 */
.topbar, .topbar *,
.legend, .legend *,
.task-panel, .task-panel *,
.detail, .detail *,
.hint, .hint *,
.kanban-col, .kanban-col *,
.card, .card *, .pi-card, .pi-card *, .pl-item, .pl-item *, .member-chip, .member-chip *,

/* ═══════════════════════════════════════════════════════════════
   5) 헤더 — 도면 타이틀블록 무드
   좌상단 라벨 박스, 작은 메타 텍스트, 굵은 하단 라인
   ═══════════════════════════════════════════════════════════════ */
.topbar {
  background: rgba(5,5,5,0.96) !important;
  border-bottom: 2px solid #ffffff !important;
  padding: 14px 32px !important;
  position: relative;
}
.topbar::before {
  content: "HANASM / SYS-MAP / DARK-MONO" !important;

}
.title h1 {
  font-size: 15px !important;
  font-weight: 800 !important;
  letter-spacing: 0.35em !important;
  text-transform: uppercase !important;

}
.title h1::before {
  content: "[ " !important; color: rgba(255,255,255,0.40);
}
.title h1::after {
  content: " ]" !important; color: rgba(255,255,255,0.40);
}

   6) 카드/패널 = 도면 블록 (코너 마크 + 라벨)
   ═══════════════════════════════════════════════════════════════ */
.card, .pi-card, .pl-item, .member-chip {
  background: rgba(255,255,255,0.025) !important;
  border: 1px solid rgba(255,255,255,0.18) !important;
  padding: 14px 16px !important;
  box-shadow: none !important;
  /* position: relative — v2가 이미 부여하고 있으면 유지, 아니면 추가 */
}
.card, .pi-card, .pl-item, .member-chip { position: relative; }
/* 코너 마크 (좌상·우상·좌하·우하) */
.card::before, .pi-card::before, .pl-item::before, .member-chip::before {
  content: "" !important;
  position: absolute !important;
  top: -1px; left: -1px;
  width: 8px; height: 8px;
  border-top: 2px solid #ffffff;
  border-left: 2px solid #ffffff;
  pointer-events: none;
}
.card::after, .pi-card::after, .pl-item::after, .member-chip::after {
  content: "" !important;
  position: absolute !important;
  bottom: -1px; right: -1px;
  width: 8px; height: 8px;
  border-bottom: 2px solid #ffffff;
  border-right: 2px solid #ffffff;
  pointer-events: none;
}
.card:hover, .pi-card:hover, .pl-item:hover, .member-chip:hover {
  background: rgba(255,255,255,0.08) !important;
  border-color: #ffffff !important;
}

/* 7) 컨테이너·패널 — 도면 종이 배경 위에 얇은 라인만
   ※ position 절대 강제하지 않음 (v2의 fixed 레이아웃 보존) */
.legend, .task-panel, .detail, .hint {
  background: rgba(5,5,5,0.92) !important;
  border: 1px solid rgba(255,255,255,0.22) !important;
  color: #ffffff !important;
}
/* 좌상단 라벨 — v2가 fixed/relative 무엇이든 부모를 위치 컨텍스트로 활용 */
.legend::before, .detail::before, .hint::before {
  position: absolute; top: -8px; left: 12px;
  background: #050505; padding: 0 6px;
  font-size: 9px; letter-spacing: 0.22em;
  color: rgba(255,255,255,0.55); font-weight: 700;
  z-index: 10;
  font-family: "JetBrains Mono", monospace;
}
.legend::before { content: "LEGEND"; }
.detail::before { content: "DETAIL / SPEC"; }
.hint::before { content: "NOTES"; }
.task-panel .tp-head::before {
  content: "TASKS"; display: block; font-size: 9px;
  letter-spacing: 0.22em; color: rgba(255,255,255,0.50);
  margin-bottom: 4px; font-weight: 700;
  font-family: "JetBrains Mono", monospace;
}

/* ═══════════════════════════════════════════════════════════════

.kanban-col {

}

}
.kanban-col::after {
  content: "" !important;

  border-bottom: 2px solid #ffffff;
  border-right: 2px solid #ffffff;
}
.col-head {
  background: transparent !important;

  padding: 0 0 10px 0 !important;

  font-weight: 800 !important;
  letter-spacing: 0.28em !important;
  text-transform: uppercase !important;

}
.col-body { gap: 10px !important; }

/* 9) 본문 텍스트 — 모노, 약간 작게, 줄간격 여유 */
.d-title, .pi-name, .pl-title, .name, .card-title {

  letter-spacing: 0.22em !important;

}
b, strong { color: #ffffff !important; font-weight: 800 !important; }

/* ═══════════════════════════════════════════════════════════════

[class*="pill-"], [class*="badge-"] {

function placeNode(node, x, y, cls) {
  const div = document.createElement('div');
  div.className = `node ${cls}`;
  div.dataset.id = node.id;
  div.style.left = x + 'px';
  div.style.top = y + 'px';
  if (node.color)  div.style.setProperty('--dc', node.color);
  if (node.color2) div.style.setProperty('--dc2', node.color2);

  const frame = document.createElement('div'); frame.className = 'frame';
  const core = document.createElement('div'); core.className = 'core';
  if (node.brand) {
    const dot = document.createElement('span'); dot.className = 'dot';
    dot.style.setProperty('--c', node.brand);
    core.appendChild(dot);
  }
  const txt = document.createElement('span'); txt.textContent = node.name;
  core.appendChild(txt);
  frame.appendChild(core);
  div.appendChild(frame);

  if (node.adBadge) {
    const badges = Array.isArray(node.adBadge) ? node.adBadge : [node.adBadge];
    badges.forEach((ab, idx) => {
      const b = document.createElement('div'); b.className = 'ad-badge';
      // 여러 개일 때 위로 쌓기 (배지 높이 약 32px 간격)
      b.style.top = (-28 - idx * 22) + 'px';
      let logoHtml = '';
      if (ab.logo === 'naver') {
        logoHtml = '<img src="naver.png" width="16" height="16" alt="네이버" style="display:block;">';
      } else if (ab.logo === 'npay') {
        logoHtml = '<img src="npay.png" width="36" height="16" alt="네이버페이" style="display:block;">';
      } else if (ab.logo === 'gads') {
        logoHtml = '<img src="gads.png" width="48" height="9" alt="구글 광고" style="display:block;">';
      }
      b.innerHTML = logoHtml + '<span class="ab-lbl">' + ab.label + '</span>';
      div.appendChild(b);
    });
  }

  if (node.sub) {
    const sub = document.createElement('div'); sub.className = 'sub'; sub.textContent = node.sub;
    div.appendChild(sub);
  }

  const exp = document.createElement('div'); exp.className = 'expanded';
  if (node.desc) {
    const lbl = document.createElement('div'); lbl.className = 'label'; lbl.textContent = '정보';
    exp.appendChild(lbl);
    const dscWrap = document.createElement('div'); dscWrap.className = 'desc';
    node.desc.split('\n').forEach(line => {
      const t = line.trim();
      if (!t) return;
      const row = document.createElement('div');
      if (t.startsWith('■')) {
        row.className = 'desc-section';
        row.textContent = t.replace(/^■\s*/, '');
      } else {
        row.className = 'desc-line';
        row.textContent = t;
      }
      dscWrap.appendChild(row);
    });
    exp.appendChild(dscWrap);
  }
  if (node.channels && node.channels.length) {
    const lbl = document.createElement('div'); lbl.className = 'label'; lbl.style.marginTop = '8px';
    lbl.textContent = '연결 채널 · ' + node.channels.length;
    exp.appendChild(lbl);
    node.channels.forEach(ch => {
      const it = document.createElement('div');
      it.className = 'ch-item';
      it.textContent = ch;
      exp.appendChild(it);
    });
  }
  if (node.ad && node.ad.length) {
    const lbl = document.createElement('div'); lbl.className = 'label'; lbl.style.marginTop = '8px';
    lbl.textContent = `광고 집행 · ${node.ad.length}`;
    exp.appendChild(lbl);
    node.ad.forEach(a => {
      const it = document.createElement('div');
      let cls = 'ad-item';
      if (a.startsWith('예정')) cls += ' future';
      else if (a.includes('미집행')) cls += ' none';
      else if (a.includes('구글')) cls += ' google';
      else if (a.includes('네이버')) cls += ' naver';
      else if (a.includes('ADBOOST')) cls += ' adboost';
      else if (a.includes('쿠팡')) cls += ' coupang';
      else if (a.includes('ESM') || a.includes('주력제품')) cls += ' esm';
      it.className = cls;
      it.textContent = a;
      exp.appendChild(it);
    });
  }
  if (node.members) {
    const lbl = document.createElement('div'); lbl.className = 'label';
    lbl.textContent = `구성원 · ${node.members.length}`;
    exp.appendChild(lbl);
    const grid = document.createElement('div'); grid.className = 'member-grid';
    node.members.forEach(m => {
      const chip = document.createElement('div');
      chip.className = 'member-chip';
      chip.dataset.dept = node.id;
      chip.dataset.member = m.name;
      chip.innerHTML = `<span class="mname">${m.name} <span class="role-tag">${m.role}</span></span>
                       <span class="badge ${m.tasks ? 'has' : 'none'}">${m.tasks ? '업무 ' + m.tasks.length : '수집 대기'}</span>`;
      chip.addEventListener('click', (e) => {
        e.stopPropagation();
        showTasks(node.id, m.name);
      });
      grid.appendChild(chip);
    });
    exp.appendChild(grid);
  }
  div.appendChild(exp);

  world.appendChild(div);
  POS[node.id] = { x, y, el: div, node };

  // 등장 stagger
  const idx = Object.keys(POS).length;
  div.style.animationDelay = (idx * 0.035) + 's';

  div.addEventListener('click', (e) => {
    e.stopPropagation();
    if (recentlyDragged) return;
    // 확장 박스 안(.expanded) 클릭은 zoom 토글 비활성 - 빈 영역 눌러도 닫히지 않음
    if (e.target.closest('.expanded')) return;
    nodeClick(node.id);
  });

  // 호버 미리보기 제거 (사용자 요청)
}

function nodeSize(id) {
  const el = POS[id]?.el; if (!el) return { w: 120, h: 50 };
  const frame = el.querySelector('.frame');
  if (frame) return { w: frame.offsetWidth || 120, h: frame.offsetHeight || 50 };
  return { w: el.offsetWidth || 120, h: el.offsetHeight || 50 };
}
function edge(id, side) {
  const r = POS[id]; if (!r) return { x: 0, y: 0 };
  const { w, h } = nodeSize(id);
  if (side === 'right') return { x: r.x + w/2, y: r.y };
  if (side === 'left')  return { x: r.x - w/2, y: r.y };
  if (side === 'top')   return { x: r.x, y: r.y - h/2 + 6 };
  if (side === 'bot')   return { x: r.x, y: r.y + h/2 - 6 };
  return { x: r.x, y: r.y };
}
function orthoPath(p1, p2, mode) {
  // 동적 control - 거리가 한쪽으로 치우치면 대칭, 비스듬하면 약한 비대칭
  if (mode === 'H') {
    const dx = p2.x - p1.x;
    const adx = Math.abs(dx);
    const ady = Math.abs(p2.y - p1.y);
    // 같은 높이 가까이 → 대칭 부드러운 곡선
    if (ady < 80 || adx < 220) {
      return `M${p1.x},${p1.y} C${p1.x + dx*0.42},${p1.y} ${p2.x - dx*0.42},${p2.y} ${p2.x},${p2.y}`;
    }
    // 비스듬한 경우만 약한 비대칭 (도착지 쪽 0.55)
    return `M${p1.x},${p1.y} C${p1.x + dx*0.35},${p1.y} ${p2.x - dx*0.55},${p2.y} ${p2.x},${p2.y}`;
  } else {
    const dy = p2.y - p1.y;
    const ady = Math.abs(dy);
    const adx = Math.abs(p2.x - p1.x);
    if (adx < 80 || ady < 220) {
      return `M${p1.x},${p1.y} C${p1.x},${p1.y + dy*0.42} ${p2.x},${p2.y - dy*0.42} ${p2.x},${p2.y}`;
    }
    return `M${p1.x},${p1.y} C${p1.x},${p1.y + dy*0.35} ${p2.x},${p2.y - dy*0.55} ${p2.x},${p2.y}`;
  }
}

function getNodeName(id) {

function showWireTooltip(fromId, toId, x, y) {

function moveWireTooltip(x, y) {

  if (left + rect.width > vw - 8) left = x - rect.width - 14;

function drawWire(fromId, toId, color, opts={}, cat=null) {
  const a = POS[fromId], b = POS[toId];
  if (!a || !b) return;
  const dx = b.x - a.x, dy = b.y - a.y;
  const mode = Math.abs(dy) > Math.abs(dx) * 1.2 ? 'V' : 'H';
  const fSide = mode === 'V' ? (dy > 0 ? 'bot' : 'top') : (dx > 0 ? 'right' : 'left');
  const tSide = mode === 'V' ? (dy > 0 ? 'top' : 'bot') : (dx > 0 ? 'left' : 'right');
  const dAttr = orthoPath(edge(fromId, fSide), edge(toId, tSide), mode);
  // 보이는 path
  const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  path.setAttribute('d', dAttr);
  path.setAttribute('stroke', color);
  path.style.color = color;
  if (opts.flow) path.classList.add('flow');
  if (opts.dashed) path.setAttribute('stroke-dasharray', '6 6');
  path.setAttribute('stroke-width', opts.width || 1.4);
  if (opts.opacity != null) path.style.opacity = opts.opacity;
  path.dataset.from = fromId;
  path.dataset.to = toId;
  if (cat) path.dataset.cat = cat;
  wires.appendChild(path);
  // 와이어 hover tooltip 기능은 사전 정의 보강 필요 — 일단 비활성화 (2026-05-24)
  // WIRE_REL 사전·헬퍼·CSS는 그대로 유지. 재활성화 시 hit path 생성 코드만 복구.
}
function drawRegion(x, y, w, h, color, label) {
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('fill', color + '14');
  rect.setAttribute('stroke', color);
  rect.setAttribute('stroke-width', '2.5');
  rect.setAttribute('stroke-dasharray', '14 10');
  rect.setAttribute('rx', '20');
  rect.style.opacity = '0.55';
  rect.style.filter = `drop-shadow(0 0 18px ${color})`;
  wires.appendChild(rect);

  const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  text.setAttribute('x', x + w/2); text.setAttribute('y', y - 16);
  text.setAttribute('fill', color);
  text.setAttribute('text-anchor', 'middle');
  text.setAttribute('font-size', '28');
  text.setAttribute('font-weight', '800');
  text.setAttribute('letter-spacing', '6');
  text.style.filter = `drop-shadow(0 0 12px ${color})`;
  text.textContent = label;
  wires.appendChild(text);
}

const DEV_CLUSTER = ['dev', 'erp', 'nas', 'self-mall'];
function drawDevRegion() {
  const pts = DEV_CLUSTER.map(id => POS[id]).filter(Boolean);
  if (pts.length < 2) return;
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  pts.forEach(r => {
    const { w, h } = nodeSize(r.node.id);
    minX = Math.min(minX, r.x - w/2);
    minY = Math.min(minY, r.y - h/2);
    maxX = Math.max(maxX, r.x + w/2);
    maxY = Math.max(maxY, r.y + h/2);
  });
  const padX = 40;
  const padTop = 80;
  const padBottom = 40;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', minX - padX);
  rect.setAttribute('y', minY - padTop);
  rect.setAttribute('width',  (maxX - minX) + padX*2);
  rect.setAttribute('height', (maxY - minY) + padTop + padBottom);
  rect.setAttribute('rx', 28);
  rect.setAttribute('class', 'dev-region');
  // wires SVG의 첫 자식으로 삽입 (배경 깊이)
  wires.insertBefore(rect, wires.firstChild);

  const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  text.setAttribute('x', minX - padX + 22);
  text.setAttribute('y', minY - padTop + 38);
