<main class="app"><aside class="side"><div class="head"><div class="k">PROJECT LIST</div><h2>신규 프로젝트 목록</h2><p>왼쪽에서 프로젝트를 고르면 오른쪽이 바뀝니다. 기본은 점수순입니다.</p><div id="summary" class="summary"></div><div class="tools"><input id="q" placeholder="검색"><select id="cat"><option value="all">전체</option></select></div></div><div id="list" class="list"></div></aside><section id="main" class="main"></section></main>

{id:'p9',name:'슬림업 게시판 고급 상세페이지',cat:'product',stage:'wait',owner:'디자인팀',rel:['웹팀','콘텐츠','제작실','신규몰'],size:'M',i:4,s:1,u:3,d:3,l:3,next:'실소재 이미지 기반 차별 포인트 정리',memo:'브랜드/전환율에는 좋지만 시스템성 프로젝트보다 후순위.'},
{id:'p10',name:'네이버·구글 플레이스 신뢰도 보강',cat:'content',stage:'inbox',owner:'웹팀',rel:['콘텐츠','디자인팀','CS팀'],size:'S',i:3,s:1,u:3,d:1,l:2,next:'회사 소개, 시공사진, 리뷰 유도 루틴 정리',memo:'난이도 대비 효과는 있으나 직접 매출 추적은 약할 수 있음.'},
{id:'p11',name:'제작실 최소 인원 운영 구조화',cat:'offline',stage:'hold',owner:'제작실',rel:['웹팀','ERP/DB','경영지원'],size:'XL',i:4,s:5,u:2,d:5,l:5,next:'현장 공정 데이터가 쌓인 뒤 재검토',memo:'방향은 맞지만 지금은 선행조건이 많음.'},
{id:'p12',name:'신규 프로젝트 통합 회의 체계',cat:'system',stage:'review',owner:'경영지원',rel:['대표','웹팀','개발팀','디자인팀','CS팀','제작실'],size:'S',i:3,s:4,u:5,d:2,l:2,next:'매주 결정 필요/보류/통합/실행 우선 4분류 고정',memo:'대표 프로젝트 산재를 줄이는 운영 규칙. 이 V3의 직접 목적.'}
];
let ps=JSON.parse(localStorage.getItem('hanasm_v31')||'null')||structuredClone(base), selected=ps[0].id, view='order';
const $=s=>document.querySelector(s), esc=s=>String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])), score=p=>p.i+p.s+p.u-p.d-p.l;
function filt(){let q=$('#q').value.trim().toLowerCase(),cat=$('#cat').value;return ps.filter(p=>(cat==='all'||p.cat===cat)&&(!q||[p.name,p.owner,p.memo,p.next,...p.rel].join(' ').toLowerCase().includes(q))).sort((a,b)=>score(b)-score(a))}
function render(){let f=filt(), p=ps.find(x=>x.id===selected)||f[0]||ps[0];selected=p?.id;$('#summary').innerHTML=`<div class="sum"><b>${ps.length}</b><span>전체</span></div><div class="sum"><b>${ps.filter(x=>['review','priority'].includes(x.stage)).length}</b><span>결정대상</span></div><div class="sum"><b>${ps.filter(x=>x.stage==='priority').length}</b><span>실행우선</span></div><div class="sum"><b>${ps.filter(x=>['merge','hold'].includes(x.stage)).length}</b><span>통합/보류</span></div>`;renderList(f);if(view==='order')renderOrder(f);if(view==='relation')renderRelation(p);if(view==='hold')renderHold()}
function renderList(f){$('#list').innerHTML=f.map((p,i)=>`<article class="item ${p.id===selected?'on':''}" style="--c:${C[p.cat]}" onclick="selected='${p.id}';render()"><div class="itop"><div class="rank">${i+1}</div><div><h3>${esc(p.name)}</h3><div class="meta"><span class="tag">${stages[p.stage]}</span><span class="tag">주관 ${esc(p.owner)}</span><span class="tag">${cats[p.cat]}</span></div></div><div class="score">${score(p)}</div></div></article>`).join('')}
function detail(p){return `<section class="detail"><h3>${esc(p.name)}</h3><div class="pills"><span class="pill blue">${stages[p.stage]}</span><span class="pill green">주관 ${esc(p.owner)}</span><span class="pill amber">규모 ${p.size}</span><span class="pill">점수 ${score(p)}</span></div><p>${esc(p.memo)}</p><p><b style="color:#f3f4fb">다음 액션</b> · ${esc(p.next)}</p><select class="stageSel" onchange="changeStage('${p.id}',this.value)">${Object.entries(stages).map(([k,v])=>`<option value="${k}" ${p.stage===k?'selected':''}>${v}</option>`).join('')}</select><div class="grid2"><div>${metric('매출영향',p.i)}${metric('업무절감',p.s)}${metric('긴급도',p.u)}</div><div>${metric('난이도',p.d)}${metric('부서부담',p.l)}<div class="metric"><span>공식</span><div>효과 - 부담</div><b>${score(p)}</b></div></div></div></section>`}
function metric(n,v){return `<div class="metric"><span>${n}</span><div class="bar"><i style="width:${v*20}%"></i></div><b>${v}/5</b></div>`}
function renderOrder(f){let top=f.filter(p=>['review','priority','merge'].includes(p.stage));let p=ps.find(x=>x.id===selected);$('#main').innerHTML=`<div class="k">VIEW 1</div><h2>이번 회의에서 볼 순서</h2><p>대표에게 보여줄 때는 이 화면만 보면 됩니다. 점수순으로 보되, 상태는 별도 표시합니다.</p><div class="notice"><div class="box"><div class="big">${top.length}건</div><p>오늘 결정하거나 정리해야 할 프로젝트입니다.</p></div><div class="box"><div class="big">${top.filter(x=>x.stage==='priority').length}건</div><p>바로 실행 우선으로 분류된 프로젝트입니다.</p></div></div><div class="decisionList">${top.map((x,i)=>`<div class="decision" onclick="selected='${x.id}';render()"><div class="no">${i+1}</div><div><h3>${esc(x.name)}</h3><p>주관 ${esc(x.owner)} · 관련 ${x.rel.length}개 · 다음 액션: ${esc(x.next)}</p></div><div class="badge">${stages[x.stage]}<br>점수 ${score(x)}</div></div>`).join('')}</div>${p?detail(p):''}`}
function renderRelation(p){$('#main').innerHTML=`<div class="k">VIEW 2</div><h2>프로젝트 관계 보기</h2><p>선택한 프로젝트가 어느 부서·채널·시스템을 물고 있는지만 봅니다. 파랑은 주관, 회색은 유관입니다.</p><div class="mapWrap"><div class="canvas" id="canvas"><svg id="svg" viewBox="0 0 1040 620"></svg></div></div>${detail(p)}`;drawMap(p)}
function renderHold(){let groups=[['wait','대기'],['merge','통합 필요'],['hold','보류/폐기']];$('#main').innerHTML=`<div class="k">VIEW 3</div><h2>지금 안 할 것 / 묶어야 할 것</h2><p>회의에서 제일 중요한 건 실행보다도 정리입니다. 이 화면은 프로젝트 난립을 줄이는 용도입니다.</p><div class="columns">${groups.map(g=>`<section class="col"><h3>${g[1]}</h3>${ps.filter(p=>p.stage===g[0]).sort((a,b)=>score(b)-score(a)).map(p=>`<article class="item" style="--c:${C[p.cat]}" onclick="selected='${p.id}';view='relation';setTab();render()"><h3>${esc(p.name)}</h3><div class="meta"><span class="tag">주관 ${esc(p.owner)}</span><span class="tag">점수 ${score(p)}</span></div><p class="head p">${esc(p.memo)}</p></article>`).join('')||'<p>없음</p>'}</section>`).join('')}</div>`}
function nn(id){return nodes.find(x=>x[0]===id||x[1]===id)}function line(a,b,cls){let p=document.createElementNS('http://www.w3.org/2000/svg','path'),m=(a[4]+b[4])/2;p.setAttribute('d',`M ${a[4]} ${a[5]} C ${m} ${a[5]}, ${m} ${b[5]}, ${b[4]} ${b[5]}`);p.setAttribute('class',cls);return p}
function drawMap(p){let c=$('#canvas'),s=$('#svg'),h=nn('프로젝트허브'),o=nn(p.owner);nodes.forEach(x=>{let d=document.createElement('div');let cls='node '+x[3];if(x[0]===p.owner)cls+=' owner';else if(p.rel.includes(x[0]))cls+=' related';else if(!['대표','프로젝트허브'].includes(x[0]))cls+=' dim';d.className=cls;d.style.left=x[4]+'px';d.style.top=x[5]+'px';d.innerHTML=`<div><b>${esc(x[1])}</b><small>${esc(x[2])}</small></div>`;c.appendChild(d);if(x[0]!=='프로젝트허브')s.appendChild(line(h,x,'wire'))});if(o)s.appendChild(line(h,o,'wire own'));p.rel.forEach(id=>{let r=nn(id);if(r)s.appendChild(line(o||h,r,'wire rel'))})}
function changeStage(id,st){let p=ps.find(x=>x.id===id);if(p){p.stage=st;localStorage.setItem('hanasm_v31',JSON.stringify(ps));render()}}
function setTab(){document.querySelectorAll('.tabs button').forEach(b=>b.classList.toggle('on',b.dataset.view===view))}
Object.entries(cats).forEach(([k,v])=>$('#cat').insertAdjacentHTML('beforeend',`<option value="${k}">${v}</option>`));$('#q').oninput=render;$('#cat').onchange=render;document.querySelectorAll('.tabs button').forEach(b=>b.onclick=()=>{view=b.dataset.view;setTab();render()});render();
</script>
</body>
</html>
