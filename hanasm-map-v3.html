let view='order',selected=null,local=JSON.parse(localStorage.getItem('hanasm_v32_stage')||'{}');
const $=s=>document.querySelector(s), esc=s=>String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
function flat(){let a=[];Object.keys(PROJECTS).forEach(cat=>PROJECTS[cat].items.forEach((p,i)=>a.push({...p,cat,id:cat+'_'+i})));return a}
function pDecision(p){return local[p.id]||p.decision||(p.status==='stop'?'stop':'go')}
function score(p){let pr={h:30,m:20,l:10}[p.prio]||10,dec={go:20,later:8,hold:4,stop:0}[pDecision(p)]||0,prog=Math.min(20,Math.round((p.progress||0)/5));return pr+dec+prog}
function filtered(){let q=$('#q').value.trim().toLowerCase(),cat=$('#cat').value;return flat().filter(p=>(cat==='all'||p.cat===cat)&&(!q||[p.name,p.owner,p.ownerDept,p.desc,p.startWhen,...(p.related||[])].join(' ').toLowerCase().includes(q))).sort((a,b)=>score(b)-score(a))}
function render(){let f=filtered(),all=flat();if(!selected&&f[0])selected=f[0].id;let p=all.find(x=>x.id===selected)||f[0];selected=p?.id;$('#summary').innerHTML=`<div class=sum><b>${all.length}</b><span>V2 프로젝트</span></div><div class=sum><b>${all.filter(x=>pDecision(x)==='go').length}</b><span>진행</span></div><div class=sum><b>${all.filter(x=>['hold','later'].includes(pDecision(x))).length}</b><span>보류</span></div><div class=sum><b>${all.filter(x=>x.status==='stop').length}</b><span>중단</span></div>`;renderList(f);if(view==='order')renderOrder(f,p);if(view==='relation')renderRelation(p);if(view==='hold')renderHold()}
function renderList(f){$('#list').innerHTML=f.map((p,i)=>`<article class="item ${p.id===selected?'on':''}" style="--c:${C[p.cat]}" onclick="selected='${p.id}';render()"><div class=itop><div class=rank>${i+1}</div><div><h3>${esc(p.name)}</h3><div class=meta><span class=tag>${catName[p.cat]}</span><span class=tag>주관 ${deptName[p.ownerDept]||p.ownerDept||'-'}</span><span class=tag>${p.progress||0}%</span></div></div><div class=score>${score(p)}</div></div></article>`).join('')}
function detail(p){if(!p)return'';let dec=pDecision(p);return `<section class=detail><h3>${esc(p.name)}</h3><div class=pills><span class="pill blue">${catName[p.cat]}</span><span class="pill green">주관 ${deptName[p.ownerDept]||p.ownerDept||'-'}</span><span class="pill amber">담당 ${esc(p.owner||'-')}</span><span class=pill>${stages[dec]||dec}</span><span class=pill>진행률 ${p.progress||0}%</span></div><p>${p.desc}</p><p><b style="color:#fff">시기</b> · ${esc(p.startWhen||'-')}</p><select class=stageSel onchange="local['${p.id}']=this.value;localStorage.setItem('hanasm_v32_stage',JSON.stringify(local));render()"><option value=go ${dec==='go'?'selected':''}>진행</option><option value=hold ${dec==='hold'?'selected':''}>보류</option><option value=later ${dec==='later'?'selected':''}>보류</option><option value=stop ${dec==='stop'?'selected':''}>중단</option></select><div class=grid2><div>${metric('우선도',p.prio==='h'?5:p.prio==='m'?3:1)}${metric('진행률',Math.round((p.progress||0)/20))}</div><div>${metric('관련부서',(p.related||[]).length)}<div class=metric><span>점수</span><div class=bar><i style="width:${Math.min(100,score(p))}%"></i></div><b>${score(p)}</b></div></div></div></section>`}
function metric(n,v){let w=Math.min(100,(v||0)*20);return `<div class=metric><span>${n}</span><div class=bar><i style="width:${w}%"></i></div><b>${v||0}</b></div>`}
function renderOrder(f,p){let targets=f.filter(x=>pDecision(x)==='go'||pDecision(x)==='later').slice(0,18);$('#main').innerHTML=`<div class=k>VIEW 1</div><h2>결정 순서</h2><p>V2의 신규 프로젝트를 우선도·진행상태·진행률 기준으로 정렬했습니다. 샘플이 아니라 기존 데이터 기준입니다.</p><div class=notice><div class=box><div class=big>${targets.length}건</div><p>회의에서 검토할 진행/보류 후보입니다.</p></div><div class=box><div class=big>${flat().filter(x=>x.prio==='h').length}건</div><p>V2 기준 우선도 상 프로젝트입니다.</p></div></div><div class=decisionList>${targets.map((x,i)=>`<div class=decision onclick="selected='${x.id}';render()"><div class=no>${i+1}</div><div><h3>${esc(x.name)}</h3><p>${catName[x.cat]} · 주관 ${deptName[x.ownerDept]||x.ownerDept||'-'} · 관련 ${(x.related||[]).map(r=>deptName[r]||r).join(', ')||'-'}</p></div><div class=badge>${stages[pDecision(x)]||pDecision(x)}<br>${x.progress||0}% · ${score(x)}</div></div>`).join('')}</div>${detail(p)}`}
function renderHold(){let groups=[['hold','보류'],['later','보류'],['stop','중단']];$('#main').innerHTML=`<div class=k>VIEW 3</div><h2>보류 / 중단 정리</h2><p>대표 신규 프로젝트가 산재되지 않도록 지금 안 할 것과 재검토할 것을 분리합니다.</p><div class=columns>${groups.map(([k,n])=>`<section class=col><h3>${n}</h3>${flat().filter(p=>pDecision(p)===k||p.status===k).map(p=>`<article class=item style="--c:${C[p.cat]}" onclick="selected='${p.id}';view='relation';setTab();render()"><h3>${esc(p.name)}</h3><div class=meta><span class=tag>${catName[p.cat]}</span><span class=tag>${p.progress||0}%</span></div></article>`).join('')||'<p>없음</p>'}</section>`).join('')}</div>`}
function nn(id){return nodes.find(x=>x[0]===id)}function curve(a,b,cls){let p=document.createElementNS('http://www.w3.org/2000/svg','path'),m=(a[4]+b[4])/2;p.setAttribute('d',`M ${a[4]} ${a[5]} C ${m} ${a[5]}, ${m} ${b[5]}, ${b[4]} ${b[5]}`);p.setAttribute('class','wire '+cls);return p}
function renderRelation(p){$('#main').innerHTML=`<div class=k>VIEW 2</div><h2>사업자 / 몰 / 부서 관계</h2><p>V2 구조처럼 하나사인몰에서 개인사업자·법인사업자로 갈라지고, 각 몰/채널로 파생됩니다. 선택 프로젝트의 주관/유관 부서는 하이라이트됩니다.</p><div class=mapWrap><div class=canvas id=canvas><svg id=svg viewBox="0 0 1120 660"></svg></div></div>${detail(p)}`;drawMap(p)}
function drawMap(p){let c=$('#canvas'),s=$('#svg');baseWires.forEach(w=>{let a=nn(w[0]),b=nn(w[1]);if(a&&b)s.appendChild(curve(a,b,w[2]))});nodes.forEach(x=>{let cls='node '+x[3];if(p&&x[0]===p.ownerDept)cls+=' owner';else if(p&&(p.related||[]).includes(x[0]))cls+=' related';else if(p&&['web','cs','design','dev','fin','product','factory2'].includes(x[0]))cls+=' dim';let d=document.createElement('div');d.className=cls;d.style.left=x[4]+'px';d.style.top=x[5]+'px';d.innerHTML=`<div><b>${esc(x[1])}</b><small>${esc(x[2])}</small></div>`;c.appendChild(d)});if(p){let o=nn(p.ownerDept);(p.related||[]).forEach(r=>{let rr=nn(r);if(o&&rr)s.appendChild(curve(o,rr,'rel'))});let h=nn('hanasm');if(o)s.appendChild(curve(h,o,'own'))}}
function setTab(){document.querySelectorAll('.tabs button').forEach(b=>b.classList.toggle('on',b.dataset.view===view))}
Object.entries(catName).forEach(([k,v])=>$('#cat').insertAdjacentHTML('beforeend',`<option value="${k}">${v}</option>`));$('#q').oninput=render;$('#cat').onchange=render;document.querySelectorAll('.tabs button').forEach(b=>b.onclick=()=>{view=b.dataset.view;setTab();render()});render();
</script>
