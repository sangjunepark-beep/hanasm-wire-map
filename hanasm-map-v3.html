function drawWires(){let s=$('#svg');s.innerHTML='';let h=n('프로젝트허브');nodes.filter(x=>x[0]!=='프로젝트허브').forEach(x=>s.appendChild(path(h,x,'wire')))}
function filtered(){let q=$('#q').value.trim().toLowerCase(), cat=$('#cat').value;return ps.filter(p=>(cat==='all'||p.cat===cat)&&(!q||[p.name,p.owner,p.memo,p.next,p.cat,...p.rel].join(' ').toLowerCase().includes(q)))}
function render(){let f=filtered();$('#summary').innerHTML=`<div class="sum"><b>${f.length}</b><span>전체</span></div><div class="sum"><b>${f.filter(p=>['review','priority','merge'].includes(p.stage)).length}</b><span>결정필요</span></div><div class="sum"><b>${f.filter(p=>p.stage==='priority').length}</b><span>실행우선</span></div><div class="sum"><b>${f.filter(p=>['merge','hold'].includes(p.stage)).length}</b><span>통합/보류</span></div>`;renderBoard(f);renderMeeting(f);renderFocus();highlight()}
function renderBoard(f){let b=$('#board');b.innerHTML='';stages.forEach(st=>{let items=f.filter(p=>p.stage===st[0]).sort((a,b)=>score(b)-score(a)), col=document.createElement('section');col.className='col';col.dataset.stage=st[0];col.innerHTML=`<div class="colHead"><div><h3>${st[1]}</h3><div class="hint">${st[2]}</div></div><span class="cnt">${items.length}</span></div>`;items.forEach(p=>col.appendChild(card(p)));col.ondragover=e=>{e.preventDefault();col.classList.add('drop')};col.ondragleave=()=>col.classList.remove('drop');col.ondrop=e=>{e.preventDefault();col.classList.remove('drop');let p=ps.find(x=>x.id===e.dataTransfer.getData('text'));if(p){p.stage=st[0];localStorage.setItem('hanasm_v3',JSON.stringify(ps));selected=p.id;render()}};b.appendChild(col)})}
function card(p){let c=document.createElement('article');c.className='card'+(p.id===selected?' on':'');c.draggable=true;c.style.setProperty('--cat',C[p.cat]);c.innerHTML=`<div class="cardTop"><h4>${esc(p.name)}</h4><div class="score">${score(p)}</div></div><div class="desc">${esc(p.memo)}</div><div class="chips"><span class="mini ownMini">주관 ${esc(p.owner)}</span><span class="mini">규모 ${p.size}</span><span class="mini">${cats[p.cat]}</span><span class="mini">유관 ${p.rel.length}</span></div>`;c.onclick=()=>{selected=p.id;render()};c.ondragstart=e=>e.dataTransfer.setData('text',p.id);return c}
function renderMeeting(f){let list=f.filter(p=>['review','priority','merge','hold'].includes(p.stage)).sort((a,b)=>score(b)-score(a));$('#meeting').innerHTML=list.map((p,i)=>`<div class="meetItem" onclick="selected='${p.id}';render()"><div class="rank">${i+1}</div><div><h3>${esc(p.name)}</h3><p>주관 ${esc(p.owner)} · 관련 ${p.rel.map(esc).join(', ')} · 다음 액션: ${esc(p.next)}</p></div><div class="decision">${stages.find(s=>s[0]===p.stage)[1]}<br>점수 ${score(p)}</div></div>`).join('')}
function renderFocus(){let p=ps.find(x=>x.id===selected), f=$('#focus');if(!p){f.innerHTML='<div class="empty">우측 프로젝트 카드를 선택하면 판단 근거가 요약됩니다.</div>';return}f.innerHTML=`<h3>${esc(p.name)}</h3><div class="pills"><span class="pill blue">${stages.find(s=>s[0]===p.stage)[1]}</span><span class="pill green">주관 ${esc(p.owner)}</span><span class="pill amber">규모 ${p.size}</span><span class="pill">점수 ${score(p)}</span></div><p>${esc(p.memo)}</p><p><b style="color:#f3f4fb">다음 액션</b> · ${esc(p.next)}</p>${[['매출영향',p.i],['업무절감',p.s],['긴급도',p.u],['난이도',p.d],['부서부담',p.l]].map(r=>`<div class="scoreRow"><span>${r[0]}</span><div class="bar"><i style="width:${r[1]*20}%"></i></div><b>${r[1]}/5</b></div>`).join('')}`}
function highlight(){document.querySelectorAll('.node').forEach(x=>x.classList.remove('dim','owner','related'));drawWires();let p=ps.find(x=>x.id===selected);if(!p)return;document.querySelectorAll('.node').forEach(x=>{if(x.dataset.id===p.owner)x.classList.add('owner');else if(p.rel.includes(x.dataset.id))x.classList.add('related');else if(!['대표','프로젝트허브'].includes(x.dataset.id))x.classList.add('dim')});let s=$('#svg'), h=n('프로젝트허브'), o=n(p.owner);if(o)s.appendChild(path(h,o,'wire own'));p.rel.forEach(id=>{let r=n(id);if(r)s.appendChild(path(o||h,r,'wire rel'))})}
Object.entries(cats).forEach(([k,v])=>$('#cat').insertAdjacentHTML('beforeend',`<option value="${k}">${v}</option>`));drawNodes();render();$('#q').oninput=render;$('#cat').onchange=render;$('#reset').onclick=()=>{localStorage.removeItem('hanasm_v3');ps=structuredClone(base);selected=null;render()};document.querySelectorAll('.modes button[data-mode]').forEach(btn=>btn.onclick=()=>{document.querySelectorAll('.modes button[data-mode]').forEach(b=>b.classList.remove('on'));btn.classList.add('on');document.body.className=btn.dataset.mode==='board'?'boardMode':btn.dataset.mode==='meeting'?'meetingMode':''});
</script>
</body>
</html>
