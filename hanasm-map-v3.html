{name:'디자인팀 CS 발주 미스 페널티제',prio:'h',progress:15,status:'active',ownerDept:'cs',related:['design'],decision:'go',startWhen:'즉시 집계',owner:'디자인팀',desc:'CS에서 디자인팀으로 넘어가는 발주 정보가 부정확해 일이 2~3번 반복되는 만성 이슈를 끊기 위함. 디자인팀이 잘못된 발주 건 체크·집계 → 개선사항 논의 → 개선율 낮으면 페널티 적용.'},

let view='order',expanded={},local=JSON.parse(localStorage.getItem('hanasm_v33_decision')||'{}'),ORDER=JSON.parse(localStorage.getItem('hanasm_v33_order')||'[]');
const $=s=>document.querySelector(s), esc=s=>String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
function flat(){let a=[];Object.keys(PROJECTS).forEach(cat=>PROJECTS[cat].items.forEach((p,i)=>a.push({...p,cat,id:cat+'_'+i})));return a}
function dec(p){return local[p.id]||p.decision||(p.status==='stop'?'stop':'go')}
function score(p){let pr={h:30,m:20,l:10}[p.prio]||10,d={go:22,later:10,hold:5,stop:0}[dec(p)]||0,prog=Math.min(20,Math.round((p.progress||0)/5));return pr+d+prog}
function ensureOrder(){let ids=flat().map(p=>p.id);if(!ORDER.length){ORDER=flat().sort((a,b)=>score(b)-score(a)).map(p=>p.id)}ORDER=ORDER.filter(id=>ids.includes(id));ids.forEach(id=>{if(!ORDER.includes(id))ORDER.push(id)});saveOrder()}
function saveOrder(){localStorage.setItem('hanasm_v33_order',JSON.stringify(ORDER))}
function ordered(){ensureOrder();let map=new Map(flat().map(p=>[p.id,p]));return ORDER.map(id=>map.get(id)).filter(Boolean)}
function filtered(){let q=$('#q').value.trim().toLowerCase(),cat=$('#cat').value;return ordered().filter(p=>(cat==='all'||p.cat===cat)&&(!q||[p.name,p.owner,p.ownerDept,p.desc,p.startWhen,...(p.related||[])].join(' ').toLowerCase().includes(q)))}
let selected=ORDER[0]||null;
function render(){let all=flat(),f=filtered();if(!selected&&f[0])selected=f[0].id;let p=all.find(x=>x.id===selected)||f[0];selected=p?.id;$('#summary').innerHTML=`<div class=sum><b>${all.length}</b><span>전체</span></div><div class=sum><b>${all.filter(x=>dec(x)==='go').length}</b><span>진행</span></div><div class=sum><b>${all.filter(x=>['hold','later'].includes(dec(x))).length}</b><span>보류</span></div><div class=sum><b>${all.filter(x=>x.status==='stop'||dec(x)==='stop').length}</b><span>중단</span></div>`;renderDetail(p);if(view==='order')renderOrder(f);if(view==='relation')renderRelation(p);if(view==='hold')renderHold()}
function renderDetail(p){if(!p){$('#detail').innerHTML='<div class=empty>선택된 프로젝트 없음</div>';return}let r=(p.related||[]).map(x=>deptName[x]||x).join(', ')||'없음';$('#detail').innerHTML=`<div class=detailCard><h3>${esc(p.name)}</h3><div class=pills><span class="pill blue">${catName[p.cat]}</span><span class="pill green">주관 ${deptName[p.ownerDept]||p.ownerDept||'-'}</span><span class="pill amber">담당 ${esc(p.owner||'-')}</span><span class=pill>${decName[dec(p)]||dec(p)}</span><span class=pill>${p.progress||0}%</span></div><div class=desc>${p.desc}</div><p class=desc><b style="color:#fff">시기</b> · ${esc(p.startWhen||'-')}<br><b style="color:#fff">유관</b> · ${esc(r)}</p><select class=stageSel onchange="setDecision('${p.id}',this.value)"><option value=go ${dec(p)==='go'?'selected':''}>진행</option><option value=later ${dec(p)==='later'?'selected':''}>보류</option><option value=hold ${dec(p)==='hold'?'selected':''}>보류</option><option value=stop ${dec(p)==='stop'?'selected':''}>중단</option></select>${metric('우선도',p.prio==='h'?5:p.prio==='m'?3:1)}${metric('진행률',Math.round((p.progress||0)/20))}${metric('관련부서',(p.related||[]).length)}<div class=metric><span>점수</span><div class=bar><i style="width:${Math.min(100,score(p))}%"></i></div><b>${score(p)}</b></div></div>`}
function metric(n,v){let w=Math.min(100,(v||0)*20);return `<div class=metric><span>${n}</span><div class=bar><i style="width:${w}%"></i></div><b>${v||0}</b></div>`}
function renderOrder(f){$('#main').innerHTML=`<div class=viewHead><div class=note><div class=k>VIEW 1</div><h2>결정순서 편집</h2><p>여기가 실제 순서 정하는 화면입니다. 왼쪽은 상세 패널이고, 이 목록이 결정 순서입니다. ↑/↓로 순서를 바꾸고, 상세 버튼으로 원문을 바로 펼칩니다.</p></div><div class=hintBox>사용법: 프로젝트 클릭 → 왼쪽 상세 확인 → 필요하면 상세 펼침 → ↑/↓로 순서 변경 → 상태를 진행/보류/중단으로 변경</div></div><div class=orderList>${f.map((p,i)=>row(p,i)).join('')}</div>`}
function row(p,i){let is=selected===p.id,open=expanded[p.id];return `<article class="row ${is?'on':''}" style="--c:${C[p.cat]}" onclick="selectProject('${p.id}')"><div class=rank>${i+1}</div><div class=rtitle><h3>${esc(p.name)}</h3><div class=meta><span class=tag>${catName[p.cat]}</span><span class=tag>주관 ${deptName[p.ownerDept]||p.ownerDept||'-'}</span><span class=tag>담당 ${esc(p.owner||'-')}</span><span class=tag>${p.progress||0}%</span></div></div><select class=decisionSel onclick="event.stopPropagation()" onchange="setDecision('${p.id}',this.value)"><option value=go ${dec(p)==='go'?'selected':''}>진행</option><option value=later ${dec(p)==='later'?'selected':''}>보류</option><option value=hold ${dec(p)==='hold'?'selected':''}>보류</option><option value=stop ${dec(p)==='stop'?'selected':''}>중단</option></select><div class=actions onclick="event.stopPropagation()"><button onclick="moveVisible('${p.id}',-1)">↑</button><button onclick="moveVisible('${p.id}',1)">↓</button><button onclick="toggleDetail('${p.id}')">상세</button></div>${open?`<div class=inlineDetail>${p.desc}</div>`:''}</article>`}
function setDecision(id,v){local[id]=v;localStorage.setItem('hanasm_v33_decision',JSON.stringify(local));render()}
function selectProject(id){selected=id;render()}
function toggleDetail(id){expanded[id]=!expanded[id];selected=id;render()}
function moveVisible(id,dir){let vis=filtered().map(p=>p.id),i=vis.indexOf(id),j=i+dir;if(i<0||j<0||j>=vis.length)return;let a=ORDER.indexOf(vis[i]),b=ORDER.indexOf(vis[j]);[ORDER[a],ORDER[b]]=[ORDER[b],ORDER[a]];saveOrder();selected=id;render()}
function affectedMalls(p){let t=[p.name,p.desc,p.startWhen,catName[p.cat]].join(' '),hits=[];let add=(biz,id,name)=>hits.push({biz,id,name});if(/로켓|DTF|스마트스토어|네이버/.test(t))add('personal','ss-rocket','로켓출력공장 / 스마트스토어');if(/신규몰|자사몰|\.kr|회원가입|자료실|대형 단지|파일 업로드|통합 상담/.test(t))add('corp','self-mall','신규몰 .kr');if(/고도몰|\.com/.test(t))add('corp','godo','고도몰 .com');if(/쿠팡/.test(t))add('corp','coupang','쿠팡');if(/G마켓|옥션|조달|공공기관/.test(t))add('corp','gmarket','G마켓/옥션');if(/11번가/.test(t))add('corp','11st','11번가');if(/플레이오토/.test(t))add('system','playauto','플레이오토');if(/ERP|공정|매칭코드|이카운트/.test(t))add('system','erp','ERP/DB');if(!hits.length)hits.push({biz:'common',id:'common',name:'직접 특정몰 없음'});return hits}
function renderRelation(p){if(!p){$('#main').innerHTML='';return}let malls=affectedMalls(p),rels=p.related||[];$('#main').innerHTML=`<div class=viewHead><div class=note><div class=k>VIEW 2</div><h2>선택 프로젝트 관계만 보기</h2><p>전체 맵을 다 보여주지 않습니다. 선택한 프로젝트가 물고 있는 사업자/몰/부서/시스템만 남겨서 봅니다.</p></div><div class=hintBox>현재 선택: ${esc(p.name)}<br>주관 ${deptName[p.ownerDept]||p.ownerDept||'-'} / 유관 ${rels.length}개 / 영향몰 ${malls.length}개</div></div><div class=relationWrap><section class=panel><h3>사업자 / 몰 영향</h3><div class=bizFlow><div class=bizRow><span class="box root">하나사인몰</span></div><div class=bizRow><span class=arrow>├─</span><span class="box personal ${malls.some(m=>m.biz==='personal')?'hit':''}">개인사업자</span>${malls.filter(m=>m.biz==='personal').map(m=>`<span class="box hit">${esc(m.name)}</span>`).join('')}</div><div class=bizRow><span class=arrow>└─</span><span class="box corp ${malls.some(m=>m.biz==='corp')?'hit':''}">법인사업자</span>${malls.filter(m=>m.biz==='corp').map(m=>`<span class="box hit">${esc(m.name)}</span>`).join('')}</div><div class=bizRow>${malls.filter(m=>m.biz==='system'||m.biz==='common').map(m=>`<span class="box ${m.biz==='common'?'':'hit'}">${esc(m.name)}</span>`).join('')}</div></div></section><section class=panel><h3>부서 / 시스템 관계</h3><div class=deptMap><div class=projectNode>${esc(p.name)}</div><div class=deptCol><h4>주관</h4><span class="deptChip owner">${deptName[p.ownerDept]||p.ownerDept||'-'}</span></div><div class=deptCol><h4>유관</h4>${rels.map(r=>`<span class="deptChip rel">${deptName[r]||r}</span>`).join('')||'<span class=empty>없음</span>'}</div><div class=deptCol><h4>연결 의미</h4><span class=deptChip>주관부서가 실행 책임</span><span class=deptChip>유관부서는 데이터·상담·디자인·개발 영향</span></div></div></section></div>${renderImpact(p,malls)}${detailBlock(p)}`}
function renderImpact(p,malls){return `<section class=panel style="margin-top:14px"><h3>한눈에 보는 유기적 연결</h3><div class=impactList><div class=impact><b>프로젝트</b><br>${esc(p.name)}</div><div class=impact><b>주관</b><br>${deptName[p.ownerDept]||p.ownerDept||'-'}</div><div class=impact><b>유관부서</b><br>${(p.related||[]).map(r=>deptName[r]||r).join(', ')||'없음'}</div><div class=impact><b>영향몰/시스템</b><br>${malls.map(m=>m.name).join(', ')}</div><div class=impact><b>현재 판단</b><br>${decName[dec(p)]||dec(p)} / ${p.progress||0}%</div></div></section>`}
function detailBlock(p){return `<section class=panel style="margin-top:14px"><h3>상세내용</h3><div class=desc>${p.desc}</div></section>`}
function renderHold(){let all=ordered(),holds=all.filter(p=>['hold','later'].includes(dec(p))),stops=all.filter(p=>dec(p)==='stop'||p.status==='stop'),groups=mergeGroups(all);$('#main').innerHTML=`<div class=viewHead><div class=note><div class=k>VIEW 3</div><h2>보류·통합 정리</h2><p>이 화면은 “뭘 안 할지”와 “어떤 프로젝트끼리 묶을지”만 보기 위한 화면입니다.</p></div><div class=hintBox>보류=${holds.length}건 / 중단=${stops.length}건 / 통합후보=${groups.length}그룹</div></div><div class=columns><section class=col><h3>보류</h3>${holds.map(mini).join('')||'<div class=empty>없음</div>'}</section><section class=col><h3>중단</h3>${stops.map(mini).join('')||'<div class=empty>없음</div>'}</section><section class=col><h3>통합 후보</h3>${groups.map(g=>`<div class=mergeGroup><h4>${g.label}</h4>${g.items.map(x=>`<div class=miniCard onclick="selected='${x.id}';view='relation';setTab();render()"><h4>${esc(x.name)}</h4><p>${catName[x.cat]} · ${x.progress||0}%</p></div>`).join('')}</div>`).join('')||'<div class=empty>없음</div>'}</section></div>`}
function mini(p){return `<div class=miniCard style="--c:${C[p.cat]}" onclick="selected='${p.id}';render()"><h4>${esc(p.name)}</h4><p>${catName[p.cat]} · 주관 ${deptName[p.ownerDept]||p.ownerDept||'-'} · ${p.progress||0}%</p></div>`}
function mergeGroups(all){let m={};all.forEach(p=>{let k=p.cat+'_'+p.ownerDept;m[k]=m[k]||{label:`${catName[p.cat]} / ${deptName[p.ownerDept]||p.ownerDept||'-'}`,items:[]};m[k].items.push(p)});return Object.values(m).filter(g=>g.items.length>=2).sort((a,b)=>b.items.length-a.items.length)}
Object.entries(catName).forEach(([k,v])=>$('#cat').insertAdjacentHTML('beforeend',`<option value="${k}">${v}</option>`));$('#q').oninput=render;$('#cat').onchange=render;document.querySelectorAll('.tabs button').forEach(b=>b.onclick=()=>{view=b.dataset.view;setTab();render()});function setTab(){document.querySelectorAll('.tabs button').forEach(b=>b.classList.toggle('on',b.dataset.view===view))}ensureOrder();selected=ORDER[0];render();
</script>
</body>
</html>
