<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HANASM Wire Map V3 · Two Pane Decision View</title>
<style>
*{box-sizing:border-box}html,body{margin:0;height:100%;overflow:hidden;background:#050614;color:#f3f4fb;font-family:Pretendard,'Noto Sans KR',system-ui,sans-serif}button,input,select{font:inherit}button{cursor:pointer}.top{height:62px;display:flex;align-items:center;justify-content:space-between;padding:0 18px;background:rgba(5,6,20,.96);border-bottom:1px solid rgba(148,163,255,.18)}.brand{display:flex;gap:12px;align-items:center}.logo{height:18px;filter:drop-shadow(0 0 7px rgba(167,139,250,.45)) brightness(1.15)}.ver{font-size:11px;font-weight:900;background:#22d3ee;color:#06111f;padding:4px 9px;clip-path:polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px)}h1{font-size:13px;letter-spacing:.14em;margin:0;background:linear-gradient(90deg,#22d3ee,#a855f7);-webkit-background-clip:text;color:transparent}.topBtns{display:flex;gap:8px}.topBtns button{border:1px solid rgba(96,165,250,.35);background:rgba(8,10,29,.75);color:#a5acc8;font-size:12px;font-weight:800;padding:8px 12px}.topBtns button:hover{background:rgba(96,165,250,.16);color:#fff}.app{height:calc(100% - 62px);display:grid;grid-template-columns:minmax(620px,1.15fr) minmax(430px,.85fr);gap:14px;padding:14px;background:radial-gradient(circle at 18% 20%,rgba(168,85,247,.14),transparent 34%),radial-gradient(circle at 75% 75%,rgba(34,211,238,.10),transparent 35%),#050614}.panel{position:relative;overflow:hidden;background:rgba(8,10,29,.78);border:1px solid rgba(148,163,255,.22);clip-path:polygon(14px 0,100% 0,100% calc(100% - 14px),calc(100% - 14px) 100%,0 100%,0 14px)}.head{padding:16px;border-bottom:1px solid rgba(148,163,255,.14)}.k{font-size:10px;font-weight:900;color:#22d3ee;letter-spacing:.15em}.head h2{margin:5px 0 0;font-size:18px}.head p{margin:6px 0 0;color:#a5acc8;font-size:12px;line-height:1.5}.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-top:12px}.sum{border:1px solid rgba(148,163,255,.16);background:rgba(255,255,255,.04);padding:8px;text-align:center}.sum b{display:block;font-size:20px}.sum span{font-size:10px;color:#a5acc8;font-weight:800}.tools{display:grid;grid-template-columns:minmax(180px,1fr) 130px 130px;gap:7px;margin-top:10px}.tools input,.tools select{width:100%;background:rgba(5,6,20,.62);border:1px solid rgba(148,163,255,.22);color:#f3f4fb;padding:8px;font-size:12px}.order,.detail{height:calc(100% - 172px);overflow:auto;padding:12px}.orderCard{border:1px solid rgba(148,163,255,.18);border-left:4px solid var(--c,#60a5fa);background:rgba(17,24,55,.78);margin-bottom:11px;padding:12px;clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px)}.orderCard.on{box-shadow:0 0 0 2px rgba(96,165,250,.45),0 0 20px rgba(96,165,250,.24)}.orderTop{display:grid;grid-template-columns:42px 1fr auto;gap:10px;align-items:start}.rank{height:36px;display:grid;place-items:center;background:rgba(34,211,238,.14);color:#22d3ee;font-weight:950;font-size:17px}.orderCard h3{margin:0;font-size:15px;line-height:1.35}.brief{font-size:12px;color:#cbd5e1;line-height:1.55;margin-top:8px}.actions{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end}.actions button{background:rgba(5,6,20,.65);border:1px solid rgba(148,163,255,.22);color:#cbd5e1;font-size:12px;font-weight:900;padding:6px 8px}.actions button:hover,.actions button.active{border-color:#60a5fa;color:#fff;background:rgba(96,165,250,.16)}.tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px}.tag{font-size:9.5px;color:#a5acc8;border:1px solid rgba(148,163,255,.13);background:rgba(255,255,255,.04);padding:3px 6px}.relationInline{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}.relBox{border:1px solid rgba(148,163,255,.14);background:rgba(255,255,255,.035);padding:8px;font-size:11.5px;color:#cbd5e1;line-height:1.5}.relBox b{color:#fff}.descFold{margin-top:10px;border-top:1px dashed rgba(96,165,250,.26);padding-top:10px;color:#cbd5e1;font-size:12px;line-height:1.65}.descFold table,.fullDesc table{width:100%;border-collapse:collapse;margin-top:8px;font-size:11px}.descFold th,.descFold td,.fullDesc th,.fullDesc td{border-bottom:1px dashed rgba(255,255,255,.1);padding:5px 7px}.detailCard{border:1px solid rgba(96,165,250,.28);background:rgba(8,10,29,.72);padding:14px}.detailCard h3{margin:0 0 10px;font-size:18px;line-height:1.35}.pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}.pill{font-size:10px;font-weight:900;border:1px solid rgba(148,163,255,.18);color:#a5acc8;padding:4px 7px}.blue{color:#60a5fa;border-color:rgba(96,165,250,.5)}.green{color:#34d399;border-color:rgba(52,211,153,.5)}.amber{color:#fbbf24;border-color:rgba(251,191,36,.55)}.fullDesc{font-size:12.5px;color:#dbe2ef;line-height:1.7;white-space:normal}.infoGrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0}.info{border:1px solid rgba(148,163,255,.16);background:rgba(255,255,255,.035);padding:9px;font-size:12px;line-height:1.55}.info b{color:#fff}.bizTree{display:grid;gap:8px;margin-top:12px}.bizRow{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.box{display:inline-flex;align-items:center;justify-content:center;min-height:32px;padding:7px 10px;border:1px solid rgba(148,163,255,.18);background:rgba(255,255,255,.04);font-size:12px;font-weight:800}.box.root{border-color:#22d3ee;color:#22d3ee}.box.personal{border-color:#60a5fa;color:#60a5fa}.box.corp{border-color:#a855f7;color:#c084fc}.box.hit{background:rgba(34,211,238,.12);border-color:#22d3ee;color:#fff;box-shadow:0 0 12px rgba(34,211,238,.22)}.warn{margin-top:12px;border:1px solid rgba(251,191,36,.22);background:rgba(251,191,36,.06);padding:10px;color:#fbbf24;font-size:12px;line-height:1.55}.mapModal{display:none;position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.76)}.mapModal.show{display:block}.mapBox{position:absolute;inset:42px;background:#050614;border:1px solid rgba(96,165,250,.35)}.mapBox iframe{width:100%;height:100%;border:0}.close{position:absolute;right:16px;top:10px;z-index:2;background:#60a5fa;color:#06111f;border:0;font-weight:900;padding:8px 12px}.sourceFrame{display:none}.empty{color:#747b99;padding:16px;font-size:13px}@media(max-width:1180px){.app{grid-template-columns:1fr}.panel{min-height:300px}.order,.detail{height:auto;max-height:520px}.relationInline,.infoGrid,.summary{grid-template-columns:1fr 1fr}.tools{grid-template-columns:1fr}.top{height:auto;min-height:62px;display:block;padding:10px}.topBtns{margin-top:8px}}@media(max-width:680px){.orderTop{grid-template-columns:36px 1fr}.actions{grid-column:2/3;justify-content:flex-start}.relationInline,.summary,.infoGrid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header class="top"><div class="brand"><img class="logo" src="https://www.hanasignmall.kr/image/common/hana_logo2.png" alt="HANASIGNMALL"><span class="ver">V3</span><h1>DECISION ORDER · V2 DATA LIVE</h1></div><div class="topBtns"><button id="openMap">V2 원본맵 열기</button><button id="resetOrder">순서 초기화</button></div></header>
<main class="app">
<section class="panel"><div class="head"><div class="k">DECISION ORDER</div><h2>결정순서</h2><p>중복 목록을 제거했습니다. 이 화면 하나에서 검색·필터·순서변경·원문확인·관계요약을 처리합니다.</p><div id="summary" class="summary"></div><div class="tools"><input id="q" placeholder="프로젝트명 / 담당 / 내용 검색"><select id="cat"><option value="all">전체 카테고리</option></select><select id="state"><option value="all">전체 상태</option><option value="go">진행</option><option value="hold">보류/중단</option></select></div></div><div id="order" class="order"></div></section>
<section class="panel"><div class="head"><div class="k">SELECTED DETAIL</div><h2>선택 프로젝트 원문/관계</h2><p>왼쪽 카드를 선택하면 이곳에서 원문 상세와 사업자·몰·부서 영향을 크게 봅니다.</p></div><div id="detail" class="detail"></div></section>
</main>
<iframe id="sourceFrame" class="sourceFrame" src="./hanasm-map-v2.html"></iframe>
<div id="mapModal" class="mapModal"><button class="close" id="closeMap">닫기</button><div class="mapBox"><iframe id="mapFrame" src="./hanasm-map-v2.html"></iframe></div></div>
<script>
const CAT_COLOR={ad:'#fbbf24',ai:'#c084fc',product:'#34d399',system:'#60a5fa',offline:'#fb923c'};
const DEPT={web:'웹팀',cs:'CS팀',design:'디자인팀',dev:'개발팀',fin:'경영지원',sales:'외부영업',product:'제작실',factory2:'2공장'};
let PROJECTS=null, cats={}, items=[], ORDER=[], selected='', expanded={}, projectState={}, loadError='';
const $=s=>document.querySelector(s), esc=s=>String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
function safeEval(expr){const w=$('#sourceFrame').contentWindow;try{return w.eval(expr)}catch(e){console.warn('eval fail',expr,e);return undefined}}
function loadFromV2(){try{PROJECTS=safeEval('PROJECTS');if(!PROJECTS)throw new Error('PROJECTS not accessible');try{projectState=safeEval('PROJECT_STATE')||{}}catch(e){};cats=Object.fromEntries(Object.keys(PROJECTS).map(k=>[k,PROJECTS[k].name||k]));items=[];Object.keys(PROJECTS).forEach(cat=>{(PROJECTS[cat].items||[]).forEach((p,i)=>items.push({...p,cat,id:cat+'::'+p.name,idx:i}))});loadError='';initCatOptions();initOrder();render()}catch(e){loadError='V2 데이터 로드 실패: '+e.message;renderError()}}
function initCatOptions(){const sel=$('#cat');if(sel.dataset.ready)return;Object.keys(cats).forEach(k=>sel.insertAdjacentHTML('beforeend',`<option value="${esc(k)}">${esc(cats[k])}</option>`));sel.dataset.ready='1'}
function initOrder(){const ids=items.map(x=>x.id);try{ORDER=JSON.parse(localStorage.getItem('hanasm.v3.live.order')||'[]')}catch(e){ORDER=[]}if(!ORDER.length){ORDER=items.map(x=>x.id)}ORDER=ORDER.filter(id=>ids.includes(id));ids.forEach(id=>{if(!ORDER.includes(id))ORDER.push(id)});if(!selected)selected=ORDER[0]||'';saveOrder()}
function saveOrder(){localStorage.setItem('hanasm.v3.live.order',JSON.stringify(ORDER))}
function ordered(){const m=new Map(items.map(x=>[x.id,x]));return ORDER.map(id=>m.get(id)).filter(Boolean)}
function actionLabel(p){const k=p.cat+'::'+p.name;const st=projectState&&projectState[k]&&projectState[k].action;return st||p.decision||p.status||'go'}
function actionKo(v){return {go:'진행',hold:'보류',later:'보류',stop:'중단',active:'진행'}[v]||v}
function filtered(){const q=$('#q').value.trim().toLowerCase(), cat=$('#cat').value, st=$('#state').value;return ordered().filter(p=>{const a=actionLabel(p);const stateOk=st==='all'||(st==='go'&&(a==='go'||a==='active'))||(st==='hold'&&/(hold|later|stop)/.test(a));return (cat==='all'||p.cat===cat)&&stateOk&&(!q||[p.name,p.owner,p.ownerDept,p.startWhen,p.desc,(p.related||[]).join(' ')].join(' ').toLowerCase().includes(q))})}
function shortText(html,n){const d=document.createElement('div');d.innerHTML=html||'';let t=d.textContent.replace(/\s+/g,' ').trim();return t.length>n?t.slice(0,n)+'…':t}
function relText(p){return (p.related||[]).map(x=>DEPT[x]||x).join(', ')||'없음'}
function malls(p){const t=[p.name,p.desc,p.startWhen,cats[p.cat]].join(' '),h=[];const add=(biz,name)=>h.push({biz,name});if(/하나몰|더바른|스마트스토어|로켓|네이버|DTF/.test(t))add('personal','개인사업자/스마트스토어 계열');if(/신규몰|자사몰|\.kr|회원가입|자료실|대형 단지|파일 업로드|통합 상담/.test(t))add('corp','법인사업자/신규몰 .kr');if(/고도몰|\.com/.test(t))add('corp','고도몰 .com');if(/쿠팡/.test(t))add('corp','쿠팡');if(/G마켓|옥션|조달|공공기관/.test(t))add('corp','G마켓/옥션');if(/11번가/.test(t))add('corp','11번가');if(/ERP|공정|매칭코드|이카운트/.test(t))add('system','ERP/DB');if(/플레이오토/.test(t))add('system','플레이오토');return h.length?h:[{biz:'none',name:'원문상 특정몰 직접 명시 없음'}]}
function render(){const all=items, f=filtered(), p=all.find(x=>x.id===selected)||f[0]||all[0];selected=p?p.id:'';$('#summary').innerHTML=`<div class=sum><b>${all.length}</b><span>전체</span></div><div class=sum><b>${f.length}</b><span>현재보기</span></div><div class=sum><b>${all.filter(x=>/^(go|active)$/.test(actionLabel(x))).length}</b><span>진행</span></div><div class=sum><b>${all.filter(x=>/(hold|later|stop)/.test(actionLabel(x))).length}</b><span>보류/중단</span></div>`;renderOrder(f);renderDetail(p)}
function renderOrder(f){$('#order').innerHTML=f.map((p,i)=>card(p,i)).join('')||'<div class=empty>표시할 프로젝트가 없습니다.</div>'}
function card(p,i){const open=expanded[p.id], ms=malls(p).map(m=>m.name).join(', ');return `<article class="orderCard ${p.id===selected?'on':''}" style="--c:${CAT_COLOR[p.cat]||'#60a5fa'}" onclick="selected='${esc(p.id)}';render()"><div class=orderTop><div class=rank>${i+1}</div><div><h3>${esc(p.name)}</h3><div class=brief>${esc(shortText(p.desc,220))}</div><div class=tags><span class=tag>${esc(cats[p.cat])}</span><span class=tag>담당 ${esc(p.owner||'-')}</span><span class=tag>${actionKo(actionLabel(p))}</span><span class=tag>${p.progress||0}%</span></div></div><div class=actions onclick="event.stopPropagation()"><button onclick="moveProject('${esc(p.id)}',-1)">↑</button><button onclick="moveProject('${esc(p.id)}',1)">↓</button><button class="${open?'active':''}" onclick="toggle('${esc(p.id)}')">원문</button><button onclick="showMap('${esc(p.id)}')">맵</button></div></div><div class=relationInline><div class=relBox><b>주관</b> ${esc(DEPT[p.ownerDept]||p.ownerDept||'-')}<br><b>유관</b> ${esc(relText(p))}</div><div class=relBox><b>몰/시스템 영향</b><br>${esc(ms)}</div></div>${open?`<div class=descFold>${p.desc||''}</div>`:''}</article>`}
function renderDetail(p){if(!p){$('#detail').innerHTML='<div class=empty>선택된 프로젝트가 없습니다.</div>';return}const ms=malls(p);$('#detail').innerHTML=`<div class=detailCard><h3>${esc(p.name)}</h3><div class=pills><span class="pill blue">${esc(cats[p.cat])}</span><span class="pill green">주관 ${esc(DEPT[p.ownerDept]||p.ownerDept||'-')}</span><span class="pill amber">담당 ${esc(p.owner||'-')}</span><span class=pill>${actionKo(actionLabel(p))}</span><span class=pill>${p.progress||0}%</span></div><div class=infoGrid><div class=info><b>시기</b><br>${esc(p.startWhen||'-')}</div><div class=info><b>유관부서</b><br>${esc(relText(p))}</div></div><div class=bizTree><div class=bizRow><span class="box root">하나사인몰</span></div><div class=bizRow><span class="box personal ${ms.some(x=>x.biz==='personal')?'hit':''}">개인사업자</span>${ms.filter(x=>x.biz==='personal').map(x=>`<span class="box hit">${esc(x.name)}</span>`).join('')}</div><div class=bizRow><span class="box corp ${ms.some(x=>x.biz==='corp')?'hit':''}">법인사업자</span>${ms.filter(x=>x.biz==='corp').map(x=>`<span class="box hit">${esc(x.name)}</span>`).join('')}</div><div class=bizRow>${ms.filter(x=>x.biz==='system'||x.biz==='none').map(x=>`<span class="box ${x.biz==='none'?'':'hit'}">${esc(x.name)}</span>`).join('')}</div></div><div class=warn>몰 영향은 V2 원문 키워드 기준 보조 표시입니다. V2 원본 몰/부서 구조는 맵 버튼으로 그대로 확인합니다.</div><h3 style="margin-top:16px">원문 상세</h3><div class=fullDesc>${p.desc||''}</div></div>`}
function toggle(id){expanded[id]=!expanded[id];selected=id;render()}
function moveProject(id,dir){const f=filtered().map(p=>p.id), i=f.indexOf(id), j=i+dir;if(i<0||j<0||j>=f.length)return;const a=ORDER.indexOf(f[i]), b=ORDER.indexOf(f[j]);[ORDER[a],ORDER[b]]=[ORDER[b],ORDER[a]];selected=id;saveOrder();render()}
function showMap(id){selected=id;const p=items.find(x=>x.id===id);$('#mapModal').classList.add('show');setTimeout(()=>{try{const w=$('#mapFrame').contentWindow;w.eval(`focusProjectRelation(${JSON.stringify(p.ownerDept||'')}, ${JSON.stringify(p.related||[])})`)}catch(e){console.warn(e)}},600)}
function renderError(){document.body.innerHTML='<div style="padding:24px;color:#fff"><h2>V3 로드 실패</h2><p>'+esc(loadError)+'</p><p>V2 원본 링크를 확인하세요.</p></div>'}
$('#q').oninput=render;$('#cat').onchange=render;$('#state').onchange=render;$('#resetOrder').onclick=()=>{localStorage.removeItem('hanasm.v3.live.order');ORDER=[];initOrder();render()};$('#openMap').onclick=()=>{$('#mapModal').classList.add('show')};$('#closeMap').onclick=()=>{$('#mapModal').classList.remove('show')};$('#sourceFrame').addEventListener('load',()=>setTimeout(loadFromV2,700));setTimeout(()=>{if(!PROJECTS)loadFromV2()},1800);
</script>
</body>
</html>
