<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HANASM 업무 전개맵 v3</title>
<style>
:root {
  --bg: #f3f5f7;
  --panel: #ffffff;
  --panel-soft: #f8fafc;
  --line: #d7dde5;
  --line-strong: #aeb8c6;
  --text: #17202a;
  --muted: #667085;
  --dark: #111827;
  --blue: #2563eb;
  --green: #15803d;
  --amber: #b7791f;
  --red: #b91c1c;
  --purple: #7c3aed;
  --teal: #0f766e;
}
* { box-sizing: border-box; }
html, body { margin: 0; min-height: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: "Pretendard", "Noto Sans KR", "Segoe UI", system-ui, sans-serif;
  font-size: 14px;
  letter-spacing: 0;
}
button, input, select, textarea { font: inherit; }
button, select { cursor: pointer; }
.app { min-height: 100vh; display: grid; grid-template-rows: auto 1fr; }
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 18px;
  min-height: 62px;
  padding: 12px 20px;
  background: var(--dark);
  color: #fff;
  border-bottom: 1px solid #0b1220;
}
.brand { display: flex; align-items: baseline; gap: 10px; min-width: 280px; }
.brand h1 { margin: 0; font-size: 18px; font-weight: 900; }
.brand .ver { color: #93c5fd; font-size: 12px; font-weight: 900; }
.stats { display: flex; gap: 8px; align-items: center; justify-content: flex-end; flex-wrap: wrap; }
.stat {
  display: inline-flex;
  gap: 6px;
  align-items: center;
  padding: 5px 9px;
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.14);
  color: #dbeafe;
  font-size: 12px;
  font-weight: 800;
}
.layout {
  display: grid;
  grid-template-columns: 230px minmax(0, 1fr) 370px;
  min-height: 0;
}
.side {
  background: var(--panel);
  border-right: 1px solid var(--line);
  padding: 16px 14px;
  overflow: auto;
}
.side-section { margin-bottom: 20px; }
.side-title {
  margin: 0 0 9px;
  color: var(--muted);
  font-size: 11px;
  font-weight: 900;
  letter-spacing: .08em;
}
.steps { display: grid; gap: 7px; }
.step {
  display: grid;
  grid-template-columns: 23px 1fr;
  gap: 8px;
  align-items: center;
  padding: 8px;
  background: var(--panel-soft);
  border: 1px solid var(--line);
}
.step-num {
  width: 23px;
  height: 23px;
  display: grid;
  place-items: center;
  background: var(--dark);
  color: #fff;
  font-size: 11px;
  font-weight: 900;
}
.step-main { font-size: 13px; font-weight: 900; }
.step-sub { margin-top: 2px; color: var(--muted); font-size: 11px; line-height: 1.35; }
.view-buttons, .quick-filters { display: grid; gap: 8px; }
.view-buttons button,
.quick-filters button,
.toolbar button,
.action-btn {
  border: 1px solid var(--line-strong);
  background: var(--panel);
  color: var(--text);
  padding: 8px 10px;
  font-weight: 900;
}
.view-buttons button.active,
.quick-filters button.active {
  background: var(--dark);
  color: #fff;
  border-color: var(--dark);
}
.main {
  min-width: 0;
  padding: 16px;
  overflow: auto;
}
.toolbar {
  display: grid;
  grid-template-columns: minmax(240px, 1fr) 145px 145px 145px 145px auto;
  gap: 8px;
  margin-bottom: 14px;
}
.toolbar input, .toolbar select {
  min-width: 0;
  border: 1px solid var(--line-strong);
  background: var(--panel);
  padding: 8px 10px;
}
.map-head {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 12px;
  align-items: center;
  margin-bottom: 12px;
}
.axis-line { height: 1px; background: var(--line-strong); }
.center-node {
  min-width: 180px;
  padding: 12px 18px;
  text-align: center;
  background: var(--dark);
  color: #fff;
  border: 1px solid var(--dark);
  font-weight: 900;
}
.board-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
  margin: 0 0 10px;
}
.board-meta h2 { margin: 0; font-size: 16px; }
.board-meta span { color: var(--muted); font-size: 12px; font-weight: 800; }
.axis-board {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  align-items: start;
}
.axis {
  background: var(--panel);
  border: 1px solid var(--line);
  min-height: 240px;
}
.axis.personal { border-top: 4px solid var(--blue); }
.axis.corp { border-top: 4px solid var(--purple); }
.axis-head {
  display: flex;
  justify-content: space-between;
  gap: 10px;
  align-items: center;
  padding: 11px 12px;
  border-bottom: 1px solid var(--line);
  background: var(--panel-soft);
}
.axis-head h3 { margin: 0; font-size: 15px; font-weight: 900; }
.axis-head p { margin: 3px 0 0; color: var(--muted); font-size: 12px; }
.axis-body { padding: 10px; display: grid; gap: 9px; }
.section-title {
  margin: 10px 0 6px;
  color: var(--muted);
  font-size: 11px;
  font-weight: 900;
  letter-spacing: .08em;
}
.card {
  background: var(--panel);
  border: 1px solid var(--line);
  border-left: 5px solid var(--line-strong);
  padding: 10px;
}
.card:first-child { margin-top: 0; }
.card.selected { outline: 2px solid var(--dark); outline-offset: 0; }
.card[data-action="먼저"] { border-left-color: var(--red); }
.card[data-action="진행"] { border-left-color: var(--green); }
.card[data-action="대기"] { border-left-color: var(--blue); }
.card[data-action="보류"] { border-left-color: var(--amber); }
.card[data-action="제거"] { border-left-color: #6b7280; opacity: .72; }
.card[data-action="통합"] { border-left-color: var(--purple); }
.card-top {
  display: flex;
  justify-content: space-between;
  gap: 8px;
  align-items: flex-start;
}
.card h4 {
  margin: 0;
  font-size: 14px;
  line-height: 1.36;
  font-weight: 900;
}
.badge-row {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin: 8px 0;
}
.badge {
  display: inline-flex;
  align-items: center;
  min-height: 22px;
  padding: 3px 7px;
  background: #eef2f6;
  border: 1px solid var(--line);
  color: var(--muted);
  font-size: 11px;
  font-weight: 900;
}
.badge.type-current { color: var(--teal); background: #ecfdf5; border-color: #99f6e4; }
.badge.type-ax { color: var(--purple); background: #f5f3ff; border-color: #ddd6fe; }
.badge.type-new { color: var(--blue); background: #eff6ff; border-color: #bfdbfe; }
.badge.type-system { color: #334155; background: #f1f5f9; border-color: #cbd5e1; }
.badge.need { color: var(--amber); background: #fffbeb; border-color: #fde68a; }
.badge.remove { color: #6b7280; background: #f3f4f6; border-color: #d1d5db; }
.meta {
  display: grid;
  gap: 4px;
  color: var(--muted);
  font-size: 12px;
  line-height: 1.45;
}
.card-controls {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  margin-top: 9px;
}
.card-controls select {
  width: 100%;
  min-width: 0;
  border: 1px solid var(--line);
  background: #fff;
  padding: 6px;
  font-size: 12px;
  font-weight: 800;
}
.progress {
  height: 6px;
  background: #e5e7eb;
  margin-top: 8px;
  overflow: hidden;
}
.progress span { display: block; height: 100%; background: var(--dark); }
.lane-board {
  display: grid;
  grid-template-columns: repeat(6, minmax(230px, 1fr));
  gap: 10px;
  align-items: start;
  min-width: 1420px;
}
.dept-board {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 10px;
}
.lane, .dept-box {
  background: var(--panel-soft);
  border: 1px solid var(--line);
}
.lane-head, .dept-head {
  padding: 9px 10px;
  border-bottom: 1px solid var(--line);
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-weight: 900;
}
.lane-body, .dept-body { padding: 8px; display: grid; gap: 8px; }
.detail {
  background: var(--panel);
  border-left: 1px solid var(--line);
  padding: 16px;
  overflow: auto;
  min-width: 0;
}
.detail h2 { margin: 0 0 8px; font-size: 18px; line-height: 1.35; }
.detail-empty {
  padding: 18px;
  border: 1px dashed var(--line-strong);
  background: var(--panel-soft);
  color: var(--muted);
}
.detail-section {
  border-top: 1px solid var(--line);
  padding-top: 13px;
  margin-top: 13px;
}
.detail-section h3 {
  margin: 0 0 8px;
  color: var(--muted);
  font-size: 12px;
  font-weight: 900;
  letter-spacing: .08em;
}
.relation-flow {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  align-items: center;
}
.arrow { color: var(--muted); font-weight: 900; }
.chip {
  display: inline-flex;
  align-items: center;
  min-height: 24px;
  padding: 4px 8px;
  background: #eef2ff;
  border: 1px solid #c7d2fe;
  color: #3730a3;
  font-size: 12px;
  font-weight: 900;
}
.field-grid { display: grid; gap: 8px; }
.field label {
  display: block;
  margin-bottom: 4px;
  color: var(--muted);
  font-size: 12px;
  font-weight: 900;
}
.field input, .field select, .field textarea {
  width: 100%;
  border: 1px solid var(--line-strong);
  background: #fff;
  color: var(--text);
  padding: 8px;
}
.field textarea { min-height: 72px; resize: vertical; }
.copy-box {
  width: 100%;
  min-height: 180px;
  border: 1px solid var(--line-strong);
  padding: 10px;
  background: #0b1020;
  color: #e5e7eb;
  font-family: Consolas, "Courier New", monospace;
  font-size: 12px;
}
.small-note { color: var(--muted); font-size: 12px; line-height: 1.5; }
.empty { padding: 10px; color: var(--muted); font-size: 12px; border: 1px dashed var(--line); background: #fff; }
@media (max-width: 1180px) {
  .layout { grid-template-columns: 200px minmax(0, 1fr); }
  .detail { grid-column: 1 / -1; border-left: none; border-top: 1px solid var(--line); }
  .toolbar { grid-template-columns: 1fr 1fr 1fr; }
}
@media (max-width: 760px) {
  .topbar { flex-direction: column; align-items: flex-start; }
  .layout { display: block; }
  .side { border-right: none; border-bottom: 1px solid var(--line); }
  .toolbar { grid-template-columns: 1fr; }
  .axis-board { grid-template-columns: 1fr; }
  .lane-board { min-width: 0; grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand">
      <h1>하나사인몰 업무 전개맵</h1>
      <span class="ver">v3</span>
    </div>
    <div class="stats" id="stats"></div>
  </header>

  <div class="layout">
    <aside class="side">
      <section class="side-section">
        <p class="side-title">대표 회의 흐름</p>
        <div class="steps">
          <div class="step"><span class="step-num">1</span><div><div class="step-main">다 펼침</div><div class="step-sub">AX, 타 업무, 신규 프로젝트를 한 판에 올림</div></div></div>
          <div class="step"><span class="step-num">2</span><div><div class="step-main">사업축 확인</div><div class="step-sub">개인사업자 / 법인사업자 흐름으로 나눔</div></div></div>
          <div class="step"><span class="step-num">3</span><div><div class="step-main">부서 관계</div><div class="step-sub">주관, 유관, 막힘을 같이 봄</div></div></div>
          <div class="step"><span class="step-num">4</span><div><div class="step-main">판단</div><div class="step-sub">먼저, 대기, 보류, 제거, 통합 결정</div></div></div>
          <div class="step"><span class="step-num">5</span><div><div class="step-main">액션</div><div class="step-sub">다음 행동과 목표 시점 확정</div></div></div>
        </div>
      </section>

      <section class="side-section">
        <p class="side-title">보기 방식</p>
        <div class="view-buttons" id="viewButtons">
          <button type="button" data-view="axis" class="active">사업축 전개</button>
          <button type="button" data-view="dept">부서 관계</button>
          <button type="button" data-view="action">판단 상태</button>
          <button type="button" data-view="decision">결정 내역</button>
        </div>
      </section>

      <section class="side-section">
        <p class="side-title">빠른 보기</p>
        <div class="quick-filters" id="quickFilters">
          <button type="button" data-filter="all" class="active">전체</button>
          <button type="button" data-filter="먼저">먼저 할 것</button>
          <button type="button" data-filter="보류">보류</button>
          <button type="button" data-filter="제거">제거 후보</button>
          <button type="button" data-filter="미정">판단 미정</button>
        </div>
      </section>

      <section class="side-section">
        <p class="side-title">공유</p>
        <button type="button" class="action-btn" id="exportBtn">결정 내용 내보내기</button>
        <p class="small-note">이 화면에서 바꾼 값은 현재 브라우저에 저장됩니다. 회의 후에는 내보내기로 정리본을 확인하세요.</p>
      </section>
    </aside>

    <main class="main">
      <div class="toolbar">
        <input id="search" type="search" placeholder="업무, AX, 프로젝트, 부서, 담당자 검색" />
        <select id="axisFilter"></select>
        <select id="typeFilter"></select>
        <select id="deptFilter"></select>
        <select id="actionFilter"></select>
        <button type="button" id="resetBtn">필터 해제</button>
      </div>

      <div class="map-head">
        <div class="axis-line"></div>
        <div class="center-node">하나사인몰</div>
        <div class="axis-line"></div>
      </div>

      <div class="board-meta">
        <h2 id="boardTitle">사업축 전개</h2>
        <span id="boardCount"></span>
      </div>
      <section id="board"></section>
    </main>

    <aside class="detail" id="detail"></aside>
  </div>
</div>

<template id="exportTemplate">
  <div>
    <h2>결정 내용 내보내기</h2>
    <p class="small-note">판단 상태, 다음 액션, 막힘, 목표 시점만 회의 후 정리해도 바로 쓸 수 있게 JSON으로 뽑습니다.</p>
    <textarea id="exportText" class="copy-box" readonly></textarea>
  </div>
</template>

const STORAGE_KEY = "hanasm.v3.workmap";
let state = {};
let selectedId = BASE_ITEMS[0].id;
let view = "axis";
let quickFilter = "all";

function loadState() {
  try { state = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}"); }
  catch (e) { state = {}; }
}
function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}
function itemById(id) {
  const base = BASE_ITEMS.find(item => item.id === id);
  return base ? { ...base, ...(state[id] || {}) } : null;
}
function items() {
  return BASE_ITEMS.map(item => itemById(item.id));
}
function setItem(id, field, value) {
  state[id] = { ...(state[id] || {}), [field]: value };
  saveState();
  render();
}
function deptName(id) { return DEPTS[id] || id; }
function axisName(id) { return AXES[id]?.label || id; }
function esc(value) {
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}
function options(list, selected, labels = {}) {
  return list.map(value => `<option value="${esc(value)}"${value === selected ? " selected" : ""}>${esc(labels[value] || value)}</option>`).join("");
}
function filteredItems() {
  const q = document.getElementById("search")?.value.trim().toLowerCase() || "";
  const axis = document.getElementById("axisFilter")?.value || "전체 사업축";
  const type = document.getElementById("typeFilter")?.value || "전체 유형";
  const dept = document.getElementById("deptFilter")?.value || "전체 부서";
  const action = document.getElementById("actionFilter")?.value || "전체 판단";
  return items().filter(item => {
    const hay = [
      item.title, item.type, item.owner, item.nextAction, item.blocker, item.memo,
      axisName(item.axis), deptName(item.ownerDept), ...item.related.map(deptName)
    ].join(" ").toLowerCase();
    if (q && !hay.includes(q)) return false;
    if (axis !== "전체 사업축" && item.axis !== axis) return false;
    if (type !== "전체 유형" && item.type !== type) return false;
    if (dept !== "전체 부서" && item.ownerDept !== dept && !item.related.includes(dept)) return false;
    if (action !== "전체 판단" && item.action !== action) return false;
    if (quickFilter !== "all" && item.action !== quickFilter) return false;
    return true;
  });
}
function renderFilters() {
  const axis = document.getElementById("axisFilter");
  if (axis.dataset.ready) return;
  axis.innerHTML = options(["전체 사업축", ...Object.keys(AXES)], "전체 사업축", {
    personal: "개인사업자",
    corp: "법인사업자",
    both: "공통 기반"
  });
  document.getElementById("typeFilter").innerHTML = options(["전체 유형", ...TYPES], "전체 유형");
  const deptIds = [...new Set(BASE_ITEMS.flatMap(item => [item.ownerDept, ...item.related]))];
  document.getElementById("deptFilter").innerHTML = options(["전체 부서", ...deptIds], "전체 부서",
    Object.fromEntries(deptIds.map(id => [id, deptName(id)])));
  document.getElementById("actionFilter").innerHTML = options(["전체 판단", ...ACTIONS], "전체 판단");
  axis.dataset.ready = "1";
}
function renderStats(list = items()) {
  const first = list.filter(item => item.action === "먼저").length;
  const undecided = list.filter(item => item.action === "미정").length;
  const hold = list.filter(item => item.action === "보류").length;
  const remove = list.filter(item => item.action === "제거").length;
  document.getElementById("stats").innerHTML = [
    `<span class="stat">전체 ${list.length}</span>`,
    `<span class="stat">먼저 ${first}</span>`,
    `<span class="stat">미정 ${undecided}</span>`,
    `<span class="stat">보류 ${hold}</span>`,
    `<span class="stat">제거 ${remove}</span>`
  ].join("");
}
function badgeType(type) {
  if (type === "현재 업무") return "type-current";
  if (type === "AX/자동화") return "type-ax";
  if (type === "신규 프로젝트") return "type-new";
  if (type === "시스템") return "type-system";
  return "";
}
function card(item) {
  const selected = item.id === selectedId ? " selected" : "";
  const related = item.related.length ? item.related.map(deptName).join(", ") : "없음";
  const need = item.action === "미정" ? `<span class="badge need">판단 필요</span>` : "";
  return `
    <article class="card${selected}" data-id="${esc(item.id)}" data-action="${esc(item.action)}">
      <div class="card-top">
        <h4>${esc(item.title)}</h4>
        <span class="badge ${item.action === "제거" ? "remove" : ""}">${esc(item.action)}</span>
      </div>
      <div class="badge-row">
        <span class="badge ${badgeType(item.type)}">${esc(item.type)}</span>
        <span class="badge">${esc(axisName(item.axis))}</span>
        ${need}
      </div>
      <div class="meta">
        <div>주관: ${esc(deptName(item.ownerDept))} · ${esc(item.owner)}</div>
        <div>유관: ${esc(related)}</div>
        <div>목표: ${esc(item.target || "미정")}</div>
      </div>
      <div class="progress"><span style="width:${Number(item.progress) || 0}%"></span></div>
      <div class="card-controls">
        <select data-id="${esc(item.id)}" data-field="action">${options(ACTIONS, item.action)}</select>
        <select data-id="${esc(item.id)}" data-field="axis">${options(Object.keys(AXES), item.axis, { personal: "개인사업자", corp: "법인사업자", both: "공통 기반" })}</select>
      </div>
    </article>
  `;
}
function groupedCards(list, groups, className) {
  return groups.map(group => {
    const groupItems = list.filter(item => group.match(item));
    return `
      <section class="${className}">
        <div class="${className === "lane" ? "lane-head" : "dept-head"}">
          <span>${esc(group.label)}</span><span>${groupItems.length}</span>
        </div>
        <div class="${className === "lane" ? "lane-body" : "dept-body"}">${groupItems.map(card).join("") || `<div class="empty">없음</div>`}</div>
      </section>
    `;
  }).join("");
}
function renderBoard() {
  const list = filteredItems();
  const board = document.getElementById("board");
  const title = document.getElementById("boardTitle");
  document.getElementById("boardCount").textContent = `${list.length}개 표시`;

  if (view === "dept") {
    title.textContent = "부서 관계";
    board.className = "dept-board";
    const deptIds = [...new Set(BASE_ITEMS.flatMap(item => [item.ownerDept, ...item.related]))];
    board.innerHTML = groupedCards(list, deptIds.map(id => ({
      label: deptName(id),
      match: item => item.ownerDept === id || item.related.includes(id)
    })), "dept-box");
    return;
  }

  if (view === "action") {
    title.textContent = "판단 상태";
    board.className = "lane-board";
    board.innerHTML = groupedCards(list, ACTIONS.map(action => ({
      label: action,
      match: item => item.action === action
    })), "lane");
    return;
  }

  if (view === "decision") {
    title.textContent = "결정 내역";
    board.className = "lane-board";
    const groups = ["먼저", "진행", "대기", "보류", "제거", "통합"];
    board.innerHTML = groupedCards(list, groups.map(action => ({
      label: action,
      match: item => item.action === action
    })), "lane");
    return;
  }

  title.textContent = "사업축 전개";
  board.className = "axis-board";
  const personal = list.filter(item => item.axis === "personal" || item.axis === "both");
  const corp = list.filter(item => item.axis === "corp" || item.axis === "both");
  board.innerHTML = `
    <section class="axis personal">
      <div class="axis-head"><div><h3>개인사업자</h3><p>${AXES.personal.sub}</p></div><strong>${personal.length}</strong></div>
      <div class="axis-body">${renderAxisSections(personal)}</div>
    </section>
    <section class="axis corp">
      <div class="axis-head"><div><h3>법인사업자</h3><p>${AXES.corp.sub}</p></div><strong>${corp.length}</strong></div>
      <div class="axis-body">${renderAxisSections(corp)}</div>
    </section>
  `;
}
function renderAxisSections(list) {
  return TYPES.map(type => {
    const group = list.filter(item => item.type === type);
    if (!group.length) return "";
    return `<div class="section-title">${esc(type)}</div>${group.map(card).join("")}`;
  }).join("") || `<div class="empty">없음</div>`;
}
function renderDetail() {
  const pane = document.getElementById("detail");
  const item = itemById(selectedId);
  if (!item) {
    pane.innerHTML = `<div class="detail-empty">항목을 선택하세요.</div>`;

    ? item.related.map(id => `<span class="chip">${esc(deptName(id))}</span>`).join(`<span class="arrow">→</span>`)
    : `<span class="small-note">유관 부서 없음</span>`;
  pane.innerHTML = `
    <h2>${esc(item.title)}</h2>
    <div class="badge-row">
      <span class="badge ${badgeType(item.type)}">${esc(item.type)}</span>
      <span class="badge">${esc(axisName(item.axis))}</span>
      <span class="badge">${esc(item.action)}</span>
    </div>

    <section class="detail-section">
      <h3>부서 관계</h3>
      <div class="relation-flow">
        <span class="chip">사업축: ${esc(axisName(item.axis))}</span>
        <span class="arrow">→</span>
        <span class="chip">주관: ${esc(deptName(item.ownerDept))}</span>
        ${item.related.length ? `<span class="arrow">→</span>${related}` : ""}

        </div>
        <div class="field">
          <label>사업축</label>
          <select data-detail="${esc(item.id)}" data-field="axis">${options(Object.keys(AXES), item.axis, { personal: "개인사업자", corp: "법인사업자", both: "공통 기반" })}</select>
        </div>
        <div class="field">
          <label>목표 시점</label>
          <input data-detail="${esc(item.id)}" data-field="target" value="${esc(item.target)}" />

    <section class="detail-section">
      <h3>액션 / 막힘</h3>
      <div class="field-grid">
        <div class="field">
          <label>다음 액션</label>
          <textarea data-detail="${esc(item.id)}" data-field="nextAction">${esc(item.nextAction)}</textarea>
        </div>
        <div class="field">
          <label>막힘 / 확인 필요</label>
          <textarea data-detail="${esc(item.id)}" data-field="blocker">${esc(item.blocker)}</textarea>
        </div>
      </div>
    </section>

    <section class="detail-section">
      <h3>원문 메모</h3>
      <p class="small-note">${esc(item.memo)}</p>
    </section>
  `;

function renderExport() {
  const pane = document.getElementById("detail");
  const tpl = document.getElementById("exportTemplate").content.cloneNode(true);
  pane.innerHTML = "";
  pane.appendChild(tpl);
  const data = items().map(item => ({
    title: item.title,
    axis: axisName(item.axis),
    type: item.type,
    action: item.action,
    ownerDept: deptName(item.ownerDept),
    related: item.related.map(deptName),
    owner: item.owner,
    target: item.target,
    nextAction: item.nextAction,
    blocker: item.blocker
  }));
  document.getElementById("exportText").value = JSON.stringify(data, null, 2);
}
function render() {
  renderFilters();
  const list = filteredItems();
  renderStats(list);
  renderBoard();
  renderDetail();
  bindDynamic();
}
function bindDynamic() {
  document.querySelectorAll(".card").forEach(el => {
    el.addEventListener("click", event => {
      if (event.target.closest("select")) return;
      selectedId = el.dataset.id;
      render();
    });
  });
  document.querySelectorAll("select[data-id]").forEach(el => {
    el.addEventListener("change", () => setItem(el.dataset.id, el.dataset.field, el.value));
  });
  document.querySelectorAll("[data-detail]").forEach(el => {
    el.addEventListener("change", () => setItem(el.dataset.detail, el.dataset.field, el.value));
  });
}
function bindStatic() {
  document.querySelectorAll("#viewButtons button").forEach(btn => {
    btn.addEventListener("click", () => {
      view = btn.dataset.view;
      document.querySelectorAll("#viewButtons button").forEach(b => b.classList.toggle("active", b === btn));
      render();
    });
  });
  document.querySelectorAll("#quickFilters button").forEach(btn => {
    btn.addEventListener("click", () => {
      quickFilter = btn.dataset.filter;
      document.querySelectorAll("#quickFilters button").forEach(b => b.classList.toggle("active", b === btn));
      render();
    });
  });
  ["search", "axisFilter", "typeFilter", "deptFilter", "actionFilter"].forEach(id => {
    const el = document.getElementById(id);
    el.addEventListener(id === "search" ? "input" : "change", render);
  });
  document.getElementById("resetBtn").addEventListener("click", () => {
    document.getElementById("search").value = "";
    document.getElementById("axisFilter").value = "전체 사업축";
    document.getElementById("typeFilter").value = "전체 유형";
    document.getElementById("deptFilter").value = "전체 부서";
    document.getElementById("actionFilter").value = "전체 판단";
    quickFilter = "all";
    document.querySelectorAll("#quickFilters button").forEach(b => b.classList.toggle("active", b.dataset.filter === "all"));
    render();
  });
  document.getElementById("exportBtn").addEventListener("click", renderExport);
}
loadState();
bindStatic();
render();
</script>
</body>
</html>
