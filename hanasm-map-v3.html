<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HANASM 프로젝트 결정판 v3</title>
<style>
:root {
  --bg: #f4f6f8;
  --panel: #ffffff;
  --panel-2: #f9fafb;
  --line: #d8dee6;
  --line-strong: #b7c0cc;
  --text: #17202a;
  --muted: #657180;
  --soft: #eef2f6;
  --blue: #2563eb;
  --teal: #0f766e;
  --green: #15803d;
  --amber: #b7791f;
  --red: #b91c1c;
  --purple: #7c3aed;
  --shadow: 0 8px 20px rgba(20, 29, 41, 0.08);
}
* { box-sizing: border-box; }
html, body { margin: 0; min-height: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: "Pretendard", "Noto Sans KR", "Segoe UI", system-ui, sans-serif;
  font-size: 14px;
  letter-spacing: 0;
}
button, input, select, textarea { font: inherit; }
button, select { cursor: pointer; }
.app {
  min-height: 100vh;
  display: grid;
  grid-template-rows: auto 1fr;
}
.topbar {
  min-height: 62px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 18px;
  padding: 12px 20px;
  background: #111827;
  color: #f9fafb;
  border-bottom: 1px solid #0f172a;
}
.brand {
  display: flex;
  align-items: baseline;
  gap: 10px;
  min-width: 260px;
}
.brand h1 {
  margin: 0;
  font-size: 17px;
  font-weight: 800;
}
.brand .ver {
  color: #93c5fd;
  font-size: 12px;
  font-weight: 800;
}
.top-stats {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: flex-end;
}
.stat {
  display: inline-flex;
  gap: 6px;
  align-items: center;
  padding: 5px 9px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.12);
  color: #dbeafe;
  font-size: 12px;
  font-weight: 700;
}
.layout {
  display: grid;
  grid-template-columns: 230px minmax(0, 1fr) 360px;
  gap: 0;
  min-height: 0;
}
.side {
  border-right: 1px solid var(--line);
  background: var(--panel);
  padding: 16px 14px;
}
.side-section { margin-bottom: 20px; }
.side-title {
  margin: 0 0 9px;
  color: var(--muted);
  font-size: 11px;
  font-weight: 800;
  letter-spacing: .08em;
}
.step-list {
  display: grid;
  gap: 7px;
}
.step {
  display: grid;
  grid-template-columns: 22px 1fr;
  gap: 8px;
  align-items: center;
  padding: 8px;
  background: var(--panel-2);
  border: 1px solid var(--line);
}
.step-num {
  width: 22px;
  height: 22px;
  display: grid;
  place-items: center;
  background: #111827;
  color: white;
  font-size: 11px;
  font-weight: 800;
}
.step-main { font-size: 13px; font-weight: 800; }
.step-sub { color: var(--muted); font-size: 11px; margin-top: 2px; }
.filter-stack {
  display: grid;
  gap: 8px;
}
.filter-stack button,
.toolbar button,
.action-btn {
  border: 1px solid var(--line-strong);
  background: var(--panel);
  color: var(--text);
  padding: 8px 10px;
  font-weight: 800;
}
.filter-stack button.active,
.toolbar button.active {
  border-color: #111827;
  background: #111827;
  color: #fff;
}
.content {
  min-width: 0;
  padding: 16px;
  overflow: auto;
}
.toolbar {
  display: grid;
  grid-template-columns: minmax(220px, 1fr) 150px 150px 150px auto auto;
  gap: 8px;
  margin-bottom: 14px;
}
.toolbar input,
.toolbar select {
  border: 1px solid var(--line-strong);
  background: var(--panel);
  padding: 8px 10px;
  min-width: 0;
}
.board-title {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 0 0 10px;
}
.board-title h2 {
  margin: 0;
  font-size: 16px;
}
.board-title span {
  color: var(--muted);
  font-size: 12px;
  font-weight: 700;
}
.project-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 10px;
}
.lane-board {
  display: grid;
  grid-template-columns: repeat(6, minmax(230px, 1fr));
  gap: 10px;
  align-items: start;
  min-width: 1420px;
}
.purpose-board {
  display: grid;
  grid-template-columns: repeat(4, minmax(260px, 1fr));
  gap: 10px;
}
.lane,
.purpose-group {
  background: var(--panel-2);
  border: 1px solid var(--line);
  min-height: 120px;
}
.lane-head,
.purpose-head {
  padding: 9px 10px;
  border-bottom: 1px solid var(--line);
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-weight: 900;
}
.lane-body,
.purpose-body {
  padding: 8px;
  display: grid;
  gap: 8px;
}
.project-card {
  background: var(--panel);
  border: 1px solid var(--line);
  border-left: 4px solid var(--blue);
  padding: 10px;
}
.project-card.selected {
  outline: 2px solid #111827;
  outline-offset: 0;
}
.project-card.need {
  border-left-color: var(--amber);
}
.project-card.hold {
  border-left-color: var(--red);
}
.card-top {
  display: flex;
  justify-content: space-between;
  gap: 10px;
  align-items: flex-start;
  margin-bottom: 7px;
}
.card-title {
  margin: 0;
  font-size: 14px;
  line-height: 1.35;
  font-weight: 900;
}
.badge-row {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
  margin: 7px 0;
}
.badge {
  display: inline-flex;
  align-items: center;
  min-height: 22px;
  padding: 3px 7px;
  background: var(--soft);
  color: var(--muted);
  border: 1px solid var(--line);
  font-size: 11px;
  font-weight: 800;
}
.badge.go { color: var(--green); background: #ecfdf3; border-color: #bbf7d0; }
.badge.hold { color: var(--amber); background: #fffbeb; border-color: #fde68a; }
.badge.later { color: var(--blue); background: #eff6ff; border-color: #bfdbfe; }
.badge.stop { color: var(--red); background: #fef2f2; border-color: #fecaca; }
.meta {
  display: grid;
  gap: 5px;
  color: var(--muted);
  font-size: 12px;
  line-height: 1.45;
}
.card-controls {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  margin-top: 9px;
}
.card-controls select {
  width: 100%;
  min-width: 0;
  border: 1px solid var(--line);
  background: #fff;
  padding: 6px;
  font-size: 12px;
  font-weight: 700;
}
.progress {
  height: 6px;
  background: #e5e7eb;
  margin-top: 9px;
  overflow: hidden;
}
.progress span {
  display: block;
  height: 100%;
  background: #111827;
}
.detail {
  border-left: 1px solid var(--line);
  background: var(--panel);
  min-width: 0;
  padding: 16px;
  overflow: auto;
}
.detail h2 {
  margin: 0 0 8px;
  font-size: 18px;
  line-height: 1.35;
}
.detail-empty {
  color: var(--muted);
  padding: 18px;
  border: 1px dashed var(--line-strong);
  background: var(--panel-2);
}
.detail-section {
  border-top: 1px solid var(--line);
  padding-top: 13px;
  margin-top: 13px;
}
.detail-section h3 {
  margin: 0 0 8px;
  font-size: 12px;
  color: var(--muted);
  letter-spacing: .08em;
}
.field-grid {
  display: grid;
  gap: 8px;
}
.field label {
  display: block;
  margin-bottom: 4px;
  color: var(--muted);
  font-size: 12px;
  font-weight: 800;
}
.field input,
.field select,
.field textarea {
  width: 100%;
  border: 1px solid var(--line-strong);
  background: #fff;
  color: var(--text);
  padding: 8px;
}
.field textarea { min-height: 74px; resize: vertical; }
.relation {
  display: grid;
  gap: 8px;
}
.relation-row {
  display: grid;
  grid-template-columns: 70px 1fr;
  gap: 8px;
  align-items: start;
}
.relation-label {
  color: var(--muted);
  font-size: 12px;
  font-weight: 800;
  padding-top: 4px;
}
.chip-list {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.dept-chip {
  padding: 5px 8px;
  background: #eef2ff;
  border: 1px solid #c7d2fe;
  color: #3730a3;
  font-size: 12px;
  font-weight: 800;
}
.copy-box {
  width: 100%;
  min-height: 160px;
  border: 1px solid var(--line-strong);
  padding: 10px;
  background: #0b1020;
  color: #e5e7eb;
  font-family: Consolas, "Courier New", monospace;
  font-size: 12px;
}
.small-note {
  color: var(--muted);
  font-size: 12px;
  line-height: 1.5;
}
.hidden { display: none !important; }
@media (max-width: 1180px) {
  .layout { grid-template-columns: 190px minmax(0, 1fr); }
  .detail { grid-column: 1 / -1; border-left: none; border-top: 1px solid var(--line); }
  .toolbar { grid-template-columns: 1fr 1fr 1fr; }
}
@media (max-width: 760px) {
  .topbar { align-items: flex-start; flex-direction: column; }
  .layout { display: block; }
  .side { border-right: none; border-bottom: 1px solid var(--line); }
  .toolbar { grid-template-columns: 1fr; }
  .purpose-board { grid-template-columns: 1fr; }
  .lane-board { min-width: 0; grid-template-columns: 1fr; }
}
</style>
</head>

<div class="app">
  <header class="topbar">
    <div class="brand">
      <h1>HANASM 프로젝트 결정판</h1>
      <span class="ver">v3</span>
    </div>
    <div class="top-stats" id="topStats"></div>
  </header>

  <div class="layout">
    <aside class="side">
      <section class="side-section">
        <p class="side-title">회의 순서</p>
        <div class="step-list">
          <div class="step"><span class="step-num">1</span><div><div class="step-main">펼침</div><div class="step-sub">신규 프로젝트 전부 보기</div></div></div>
          <div class="step"><span class="step-num">2</span><div><div class="step-main">묶음</div><div class="step-sub">목적별로 재분류</div></div></div>
          <div class="step"><span class="step-num">3</span><div><div class="step-main">밀도</div><div class="step-sub">총력/집중/진행/준비</div></div></div>
          <div class="step"><span class="step-num">4</span><div><div class="step-main">액션</div><div class="step-sub">다음 행동과 막힘 정리</div></div></div>
          <div class="step"><span class="step-num">5</span><div><div class="step-main">일정</div><div class="step-sub">목표 시점 확정</div></div></div>
        </div>
      </section>
      <section class="side-section">
        <p class="side-title">보기</p>
        <div class="filter-stack" id="viewButtons">
          <button type="button" data-view="all" class="active">전체 펼침</button>
          <button type="button" data-view="density">투입 밀도</button>
          <button type="button" data-view="purpose">목적 묶음</button>
          <button type="button" data-view="decision">대표 결정</button>
        </div>
      </section>
      <section class="side-section">
        <p class="side-title">공유</p>
        <button type="button" class="action-btn" id="exportBtn">결정 내용 내보내기</button>
        <p class="small-note">브라우저에서 바꾼 값은 이 PC에 저장됩니다. 공유 전에는 내보내기로 결정 내용을 확인하세요.</p>
      </section>
    </aside>

    <main class="content">
      <div class="toolbar">
        <input id="searchInput" type="search" placeholder="프로젝트, 부서, 담당자 검색" />
        <select id="purposeFilter"></select>
        <select id="densityFilter"></select>
        <select id="deptFilter"></select>
        <button type="button" id="resetFilters">필터 해제</button>
        <button type="button" id="clearSelection">선택 해제</button>
      </div>
      <div class="board-title">
        <h2 id="boardHeading">전체 펼침</h2>
        <span id="boardCount"></span>
      </div>
      <section id="board"></section>
    </main>

    <aside class="detail" id="detailPane"></aside>
  </div>
</div>

<template id="exportTemplate">
  <div>
    <h2>결정 내용 내보내기</h2>
    <p class="small-note">아래 JSON에는 회의 중 변경한 목적 묶음, 투입 밀도, 결정 상태, 다음 액션, 막힘, 목표 시점이 들어갑니다.</p>
    <textarea class="copy-box" id="exportText" readonly></textarea>
  </div>
</template>

    density: "미정",
    sourceCat: "시스템·자사몰",
    ownerDept: "web",
    related: ["dev"],
    owner: "박상준",
    status: "진행",
    progress: 80,
    decision: "GO",
    target: "5월 마지막 주 운영 시작",
    nextAction: "운영 시작 전 지표 입력 기준과 팀장 대시보드 확인",
    blocker: "기존 노션 업무표와 전환 기준 정리 필요",
    desc: "웹팀 전용 KPI 적용 업무표. 팀장이 대시보드로 팀원 업무 진척도·지연도에 따른 KPI 지수 정리 가능."
  },
  {
    id: "playauto-master-product",
    name: "플레이오토 마스터 상품 (채널 옵션 별도)",
    purpose: "광고/유입",
    density: "미정",
    sourceCat: "시스템·자사몰",
    ownerDept: "web",
    related: ["cs"],
    owner: "박상준",
    status: "검토",
    progress: 20,
    decision: "LATER",
    target: "검토 단계",
    nextAction: "개인사업자 판매채널 확대 여부와 연결해 판단",
    blocker: "마스터 상품이어도 채널별 옵션은 별도 조절 필요",
    desc: "마스터 상품 등록은 통합 작업 장점이 있으나 각 채널별 옵션은 별도 조절해야 함."
  }
];

const STORAGE_KEY = "hanasm.v3.decisions";
let state = {};
let currentView = "all";
let selectedId = PROJECTS[0]?.id || null;

function loadState() {
  try { state = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}"); }
  catch (e) { state = {}; }
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function getProject(id) {
  const base = PROJECTS.find(p => p.id === id);
  if (!base) return null;
  return { ...base, ...(state[id] || {}) };
}

function allProjects() {
  return PROJECTS.map(p => getProject(p.id));
}

function setProjectValue(id, key, value) {
  state[id] = { ...(state[id] || {}), [key]: value };
  saveState();
  render();
}

function labelDept(id) {
  return DEPT_NAME[id] || id;
}

function decisionClass(decision) {
  if (decision === "GO") return "go";
  if (decision === "HOLD") return "hold";
  if (decision === "LATER") return "later";
  return "hold";
}

function statusClass(status) {
  return status === "스톱" ? "stop" : "";
}

function isDecisionNeeded(project) {
  return project.decision !== "GO" || project.density === "미정" || project.density === "보류";
}

function filteredProjects() {
  const q = document.getElementById("searchInput")?.value.trim().toLowerCase() || "";
  const purpose = document.getElementById("purposeFilter")?.value || "전체 목적";
  const density = document.getElementById("densityFilter")?.value || "전체 밀도";
  const dept = document.getElementById("deptFilter")?.value || "전체 부서";
  return allProjects().filter(p => {
    const hay = [p.name, p.owner, p.sourceCat, p.desc, p.nextAction, p.blocker, labelDept(p.ownerDept), ...p.related.map(labelDept)].join(" ").toLowerCase();
    if (q && !hay.includes(q)) return false;
    if (purpose !== "전체 목적" && p.purpose !== purpose) return false;
    if (density !== "전체 밀도" && p.density !== density) return false;
    if (dept !== "전체 부서" && p.ownerDept !== dept && !p.related.includes(dept)) return false;
    return true;
  });
}

function optionHtml(options, selected) {
  return options.map(opt => `<option value="${escapeHtml(opt)}"${opt === selected ? " selected" : ""}>${escapeHtml(opt)}</option>`).join("");
}

function escapeHtml(value) {
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function renderStats(projects = allProjects()) {
  const total = projects.length;
  const undecided = projects.filter(p => p.density === "미정").length;
  const need = projects.filter(isDecisionNeeded).length;
  const go = projects.filter(p => p.decision === "GO").length;
  document.getElementById("topStats").innerHTML = [
    `<span class="stat">전체 ${total}</span>`,
    `<span class="stat">GO ${go}</span>`,
    `<span class="stat">결정 필요 ${need}</span>`,
    `<span class="stat">밀도 미정 ${undecided}</span>`
  ].join("");
}

function renderFilters() {
  const purpose = document.getElementById("purposeFilter");
  const density = document.getElementById("densityFilter");
  const dept = document.getElementById("deptFilter");
  if (!purpose.dataset.ready) {
    purpose.innerHTML = optionHtml(["전체 목적", ...PURPOSES], "전체 목적");
    density.innerHTML = optionHtml(["전체 밀도", ...DENSITIES], "전체 밀도");
    const deptIds = [...new Set(PROJECTS.flatMap(p => [p.ownerDept, ...p.related]))];
    dept.innerHTML = optionHtml(["전체 부서", ...deptIds], "전체 부서")
      .replaceAll(/<option value="([^"]+)">\1<\/option>/g, (m, id) => `<option value="${id}">${escapeHtml(labelDept(id))}</option>`);
    purpose.dataset.ready = "1";
  }
}

function projectCard(project) {
  const need = isDecisionNeeded(project);
  const selected = project.id === selectedId ? " selected" : "";
  const cls = need ? " need" : project.decision === "HOLD" ? " hold" : "";
  const related = project.related.length ? project.related.map(labelDept).join(", ") : "없음";
  return `
    <article class="project-card${selected}${cls}" data-id="${escapeHtml(project.id)}">
      <div class="card-top">
        <h3 class="card-title">${escapeHtml(project.name)}</h3>
        <span class="badge ${decisionClass(project.decision)}">${escapeHtml(project.decision)}</span>
      </div>
      <div class="badge-row">
        <span class="badge">${escapeHtml(project.purpose)}</span>
        <span class="badge">${escapeHtml(project.density)}</span>
        <span class="badge ${statusClass(project.status)}">${escapeHtml(project.status)}</span>
      </div>
      <div class="meta">
        <div>주관: ${escapeHtml(labelDept(project.ownerDept))} · ${escapeHtml(project.owner)}</div>
        <div>유관: ${escapeHtml(related)}</div>
        <div>목표: ${escapeHtml(project.target || "미정")}</div>
      </div>
      <div class="progress"><span style="width:${Number(project.progress) || 0}%"></span></div>
      <div class="card-controls">
        <select data-id="${escapeHtml(project.id)}" data-field="purpose">${optionHtml(PURPOSES, project.purpose)}</select>
        <select data-id="${escapeHtml(project.id)}" data-field="density">${optionHtml(DENSITIES, project.density)}</select>
        <select data-id="${escapeHtml(project.id)}" data-field="decision">${optionHtml(DECISIONS, project.decision)}</select>
        <button type="button" class="action-btn" data-select="${escapeHtml(project.id)}">상세</button>
      </div>
    </article>
  `;
}

function renderBoard() {
  const projects = filteredProjects();
  const board = document.getElementById("board");
  document.getElementById("boardCount").textContent = `${projects.length}개 표시`;
  const headings = {
    all: "전체 펼침",
    density: "투입 밀도",
    purpose: "목적 묶음",
    decision: "대표 결정"
  };
  document.getElementById("boardHeading").textContent = headings[currentView] || "전체 펼침";

  if (currentView === "density") {
    board.className = "lane-board";
    board.innerHTML = DENSITIES.map(d => {
      const items = projects.filter(p => p.density === d);
      return `<section class="lane"><div class="lane-head"><span>${escapeHtml(d)}</span><span>${items.length}</span></div><div class="lane-body">${items.map(projectCard).join("") || emptyLane()}</div></section>`;
    }).join("");
    return;
  }

  if (currentView === "purpose") {
    board.className = "purpose-board";
    board.innerHTML = PURPOSES.map(purpose => {
      const items = projects.filter(p => p.purpose === purpose);
      return `<section class="purpose-group"><div class="purpose-head"><span>${escapeHtml(purpose)}</span><span>${items.length}</span></div><div class="purpose-body">${items.map(projectCard).join("") || emptyLane()}</div></section>`;
    }).join("");
    return;
  }

  if (currentView === "decision") {
    const groups = ["결정필요", "GO", "HOLD", "LATER"];
    board.className = "lane-board";
    board.innerHTML = groups.map(group => {
      const items = group === "결정필요" ? projects.filter(isDecisionNeeded) : projects.filter(p => p.decision === group);
      return `<section class="lane"><div class="lane-head"><span>${escapeHtml(group)}</span><span>${items.length}</span></div><div class="lane-body">${items.map(projectCard).join("") || emptyLane()}</div></section>`;
    }).join("");
    return;
  }

  board.className = "project-grid";
  board.innerHTML = projects.map(projectCard).join("") || emptyLane();
}

function emptyLane() {
  return `<div class="small-note">표시할 프로젝트 없음</div>`;
}

function renderDetail() {
  const pane = document.getElementById("detailPane");
  const project = getProject(selectedId);
  if (!project) {
    pane.innerHTML = `<div class="detail-empty">프로젝트를 선택하세요.</div>`;
    return;
  }
  const related = project.related.length
    ? project.related.map(id => `<span class="dept-chip">${escapeHtml(labelDept(id))}</span>`).join("")
    : `<span class="small-note">유관 부서 없음</span>`;

  pane.innerHTML = `
    <h2>${escapeHtml(project.name)}</h2>
    <div class="badge-row">
      <span class="badge">${escapeHtml(project.sourceCat)}</span>
      <span class="badge ${decisionClass(project.decision)}">${escapeHtml(project.decision)}</span>
      <span class="badge">${escapeHtml(project.density)}</span>
    </div>

    <section class="detail-section">
      <h3>판단 필드</h3>
      <div class="field-grid">
        <div class="field">
          <label>목적 묶음</label>
          <select data-detail="${escapeHtml(project.id)}" data-field="purpose">${optionHtml(PURPOSES, project.purpose)}</select>
        </div>
        <div class="field">
          <label>투입 밀도</label>
          <select data-detail="${escapeHtml(project.id)}" data-field="density">${optionHtml(DENSITIES, project.density)}</select>
        </div>
        <div class="field">
          <label>대표 결정</label>
          <select data-detail="${escapeHtml(project.id)}" data-field="decision">${optionHtml(DECISIONS, project.decision)}</select>
        </div>
      </div>
    </section>

    <section class="detail-section">
      <h3>관계</h3>
      <div class="relation">
        <div class="relation-row"><div class="relation-label">주관</div><div><span class="dept-chip">${escapeHtml(labelDept(project.ownerDept))}</span></div></div>
        <div class="relation-row"><div class="relation-label">유관</div><div class="chip-list">${related}</div></div>
        <div class="relation-row"><div class="relation-label">담당</div><div>${escapeHtml(project.owner || "미정")}</div></div>
      </div>
    </section>

    <section class="detail-section">
      <h3>결정 메모</h3>
      <div class="field-grid">
        <div class="field">
          <label>다음 액션</label>
          <textarea data-detail="${escapeHtml(project.id)}" data-field="nextAction">${escapeHtml(project.nextAction || "")}</textarea>
        </div>
        <div class="field">
          <label>막힘 / 확인 필요</label>
          <textarea data-detail="${escapeHtml(project.id)}" data-field="blocker">${escapeHtml(project.blocker || "")}</textarea>
        </div>
        <div class="field">
          <label>목표 시점</label>
          <input data-detail="${escapeHtml(project.id)}" data-field="target" value="${escapeHtml(project.target || "")}" />
        </div>
      </div>
    </section>

    <section class="detail-section">
      <h3>원문 메모</h3>
      <p class="small-note">${escapeHtml(project.desc)}</p>
    </section>
  `;
}

function renderExport() {
  const pane = document.getElementById("detailPane");
  const tpl = document.getElementById("exportTemplate").content.cloneNode(true);
  pane.innerHTML = "";
  pane.appendChild(tpl);
  const exportData = allProjects().map(p => ({
    id: p.id,
    name: p.name,
    purpose: p.purpose,
    density: p.density,
    decision: p.decision,
    ownerDept: labelDept(p.ownerDept),
    related: p.related.map(labelDept),
    owner: p.owner,
    target: p.target,
    nextAction: p.nextAction,
    blocker: p.blocker
  }));
  document.getElementById("exportText").value = JSON.stringify(exportData, null, 2);
}

function render() {
  renderFilters();
  const projects = filteredProjects();
  renderStats(projects);
  renderBoard();
  renderDetail();
  bindDynamicEvents();
}

function bindDynamicEvents() {
  document.querySelectorAll(".project-card").forEach(card => {
    card.addEventListener("click", e => {
      if (e.target.closest("select") || e.target.closest("button")) return;
      selectedId = card.dataset.id;
      render();
    });
  });
  document.querySelectorAll("[data-select]").forEach(btn => {
    btn.addEventListener("click", () => {
      selectedId = btn.dataset.select;
      render();
    });
  });
  document.querySelectorAll("select[data-id]").forEach(select => {
    select.addEventListener("change", () => setProjectValue(select.dataset.id, select.dataset.field, select.value));
  });
  document.querySelectorAll("[data-detail]").forEach(input => {
    const handler = () => setProjectValue(input.dataset.detail, input.dataset.field, input.value);
    input.addEventListener(input.tagName === "TEXTAREA" || input.tagName === "INPUT" ? "change" : "change", handler);
  });
}

function bindStaticEvents() {
  document.querySelectorAll("#viewButtons button").forEach(btn => {
    btn.addEventListener("click", () => {
      currentView = btn.dataset.view;
      document.querySelectorAll("#viewButtons button").forEach(b => b.classList.toggle("active", b === btn));
      render();
    });
  });
  ["searchInput", "purposeFilter", "densityFilter", "deptFilter"].forEach(id => {
    document.getElementById(id).addEventListener(id === "searchInput" ? "input" : "change", render);
  });
  document.getElementById("resetFilters").addEventListener("click", () => {
    document.getElementById("searchInput").value = "";
    document.getElementById("purposeFilter").value = "전체 목적";
    document.getElementById("densityFilter").value = "전체 밀도";
    document.getElementById("deptFilter").value = "전체 부서";
    render();
  });
  document.getElementById("clearSelection").addEventListener("click", () => {
    selectedId = null;
    render();
  });
  document.getElementById("exportBtn").addEventListener("click", renderExport);
}

loadState();
bindStaticEvents();
render();
</script>
</body>
</html>
